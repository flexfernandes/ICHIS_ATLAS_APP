#gfcr .cg-node.selected{background:#1e3a8a!important;border-color:#3b82f6!important}
#gfcr .cg-name{color:#94a3b8!important}
#gfcr .cg-node.selected .cg-name{color:#93c5fd!important}
#gfcr .cg-desc{color:#2d4a6d!important}
#gfcr .cg-order{background:#0f1e33!important;border-color:#162035!important;color:#4b6a94!important}
/* Badges */
#gfcr .badge-draft{background:#1e293b;color:#64748b;border:1px solid #334155}
#gfcr .badge-dev{background:#1e3a8a;color:#93c5fd;border:none}
#gfcr .badge-test{background:#7c2d12;color:#fed7aa;border:none}
#gfcr .badge-submetido{background:#312e81;color:#c7d2fe;border:none}
#gfcr .badge-obsoleto{background:#713f12;color:#fde68a;border:none}
#gfcr .badge-arquivado{background:#7f1d1d;color:#fca5a5;border:none}
#gfcr .badge-type{background:#2d1b69;color:#c4b5fd;border:none}
#gfcr .badge-group{background:#1e3a8a;color:#93c5fd;border:none}
/* View cards */
#gfcr .cr-desc-card{background:#0d1526;border-color:#162035}
#gfcr .cr-desc-hdr{background:#0b1320;border-color:#162035;color:#4b6a94}
#gfcr .cr-desc-body{color:#94a3b8}
#gfcr .cr-bottom-card{background:#0d1526;border-color:#162035}
#gfcr .cr-bottom-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.35)}
#gfcr .cr-bottom-hdr{color:#2d4a6d}
#gfcr .cr-bottom-body{color:#e2e8f0}
#gfcr .cr-tech-strip{background:#0b1320;border-color:#162035}
#gfcr .cr-tech-chip{background:#0d1526;border-color:#162035;color:#4b6a94}
#gfcr .cr-tech-sep{background:#162035}
#gfcr .cr-tag{background:#1a2540;color:#60a5fa}
/* VK cards (view mode) */
#gfcr .vk-green,#gfcr .vk-blue,#gfcr .vk-purple,
#gfcr .vk-amber,#gfcr .vk-slate,#gfcr .vk-teal{background:#0d1526;border-color:#162035}
#gfcr .vk-card-icon{background:#0f1e33!important;color:#4b6a94!important}
#gfcr .vk-card-lbl{color:#2d4a6d!important}
#gfcr .vk-card-val{color:#94a3b8!important}
#gfcr .vk-section{color:#2d4a6d}
#gfcr .vk-section::after{background:#162035}
/* Reference URL */
#gfcr .ref-url-card{background:#0d1526;border-color:#162035}
#gfcr .ref-url-card-hdr{background:#0b1320;border-color:#162035;color:#4b6a94}
#gfcr .ref-url-card-body{background:#0d1526;color:#38bdf8}
#gfcr .ref-url-card-empty{color:#2d4a6d}
#gfcr .ref-url-actions{background:#0b1320;border-color:#162035}
/* Versioning */
#gfcr .vk-ver-hdr{background:#0a1f14;border-color:#1a3a26}
#gfcr .vk-ver-main{color:#4ade80}
#gfcr .vk-ver-label{color:#4ade80}
/* Scrollbar */
#gfcr .gfcr-tab-body::-webkit-scrollbar-thumb{background:#1e3a5f!important}
/* Natural Studio — ocultar cabeçalho superior da página */
#gfcr-main.ns-mode .gfcr-det-hdr,
#gfcr-main.ns-mode .ver-panel,
#gfcr-main.ns-mode .gfcr-toolbar{display:none!important}

/* ── Natural Studio — file section wrapper ────────── */
.ns-file-section{flex-shrink:0;max-height:220px;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid #1a2540}
.ns-file-section .ns-gallery{flex:1;overflow-y:auto;padding:12px 20px 14px;min-height:0}

/* ── Natural Studio — AI interface ───────────────── */
.ns-ai-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:#080e1c}
.ns-ai-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 20px;border-bottom:1px solid #0d1a30;flex-shrink:0}
.ns-ai-hdr-title{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#2d4a6d}
.ns-ai-chat{flex:1;overflow-y:auto;min-height:0;display:flex;align-items:center;justify-content:center}
.ns-ai-chat::-webkit-scrollbar{width:4px}
.ns-ai-chat::-webkit-scrollbar-thumb{background:#1a2540;border-radius:4px}
.ns-ai-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 20px;text-align:center}
.ns-ai-welcome-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,rgba(109,40,217,.22),rgba(37,99,235,.18));border:1px solid rgba(99,102,241,.22);display:flex;align-items:center;justify-content:center;color:#818cf8;margin-bottom:2px}
.ns-ai-welcome-title{font-size:14px;font-weight:700;color:#f1f5f9;letter-spacing:-.2px}
.ns-ai-welcome-sub{font-size:11.5px;color:#334155;line-height:1.5}
.ns-ai-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px}
.ns-ai-chip{padding:5px 12px;background:#0d1526;border:1px solid #1e3a5f;border-radius:20px;color:#60a5fa;font-size:11px;cursor:pointer;transition:all 150ms;white-space:nowrap;font-family:var(--font)}
.ns-ai-chip:hover{background:#162035;border-color:#3b82f6;color:#93c5fd}
.ns-ai-input-area{padding:8px 16px 12px;flex-shrink:0;background:#080e1c}
.ns-ai-input-box{background:#0d1526;border:1px solid #1a2540;border-radius:11px;overflow:hidden;transition:border-color 150ms}
.ns-ai-input-box:focus-within{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.ns-ai-textarea{width:100%;background:transparent;border:none;outline:none;padding:10px 14px 5px;font-size:13px;color:#e2e8f0;resize:none;font-family:var(--font);line-height:1.6;min-height:40px;max-height:100px}
.ns-ai-textarea::placeholder{color:#2d4a6d}
.ns-ai-input-actions{display:flex;align-items:center;justify-content:space-between;padding:5px 10px 7px}
.ns-ai-icon-btn{width:27px;height:27px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;cursor:pointer;color:#334155;border-radius:6px;transition:all 120ms}
.ns-ai-icon-btn:hover{background:#162035;color:#64748b}
.ns-ai-model-badge{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;color:#1e3a5f;background:#0a1020;border:1px solid #0f1e33;border-radius:20px;padding:2px 8px;margin-left:4px;font-family:var(--mono)}
.ns-ai-btn-send{width:31px;height:31px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6d28d9,#2563eb);border:none;border-radius:8px;color:#fff;cursor:pointer;transition:opacity 150ms;flex-shrink:0}
.ns-ai-btn-send:hover{opacity:.85}
</style>
{% endblock %}

{% block page_content %}
<div id="gfcr">

  <header class="gfcr-hdr">
    <div class="gfcr-hdr-logo">GF</div>
    <div>
      <div class="gfcr-hdr-title">GF Content Registry</div>
    </div>
    <div class="gfcr-hdr-sub">Registro Central de Conteúdos</div>
    <div class="gfcr-hdr-sep"></div>
    <a class="gfcr-hdr-atlas" href="/gf-atlas">
      <i data-lucide="layout-dashboard" style="width:13px;height:13px"></i>
      Wiki Hub
    </a>
    <div class="gfcr-hdr-user">
      <div class="gfcr-hdr-avatar" id="gfcr-avatar">GF</div>
      <span id="gfcr-username">...</span>
    </div>
  </header>

  <div class="gfcr-body">

    <aside class="gfcr-sb" id="gfcr-sb">
      <div class="gfcr-sb-top">
        <div class="gfcr-sb-search">
          <i data-lucide="search" style="width:14px;height:14px"></i>
          <input type="text" placeholder="Buscar registros..." id="gfcr-search" autocomplete="off">
        </div>
      </div>
      <div class="gfcr-sb-filters" id="gfcr-filters">
        <span class="gfcr-sb-filter active" data-status="">Todos</span>
        <span class="gfcr-sb-filter" data-status="Draft">Draft</span>
        <span class="gfcr-sb-filter" data-status="Em Teste">Em Teste</span>
        <span class="gfcr-sb-filter" data-status="Submetido">Submetidos</span>
        <span class="gfcr-sb-filter" data-status="Obsoleto">Obsoletos</span>
      </div>
      <div class="gfcr-sb-list" id="gfcr-list">
        <div class="gfcr-loading"><div class="spinner"></div><span>Carregando...</span></div>
      </div>
      <div class="gfcr-sb-foot">
        <button class="btn-new-cr" id="btn-new-cr">
          <i data-lucide="plus" style="width:15px;height:15px"></i>
          Novo Registro
        </button>
      </div>
    </aside>

    <main class="gfcr-main" id="gfcr-main">
      <div class="gfcr-loading" style="flex:1">
        <div class="spinner"></div>
        <span>Inicializando...</span>
      </div>
    </main>

  </div>
</div>

<div id="gfcr-toast"></div>

<script>
/* ════════════════════════════════════════════════════
   GF Content Registry App
   ════════════════════════════════════════════════════ */

const TABS = [
  { id:'settings',       label:'Settings',         icon:'settings-2' },
  { id:'natural_studio', label:'Natural Studio',   icon:'sparkles', viewOnly:true },
];

const STATUS_COLORS = {
  'Draft':'draft','Em Desenvolvimento':'dev','Em Teste':'test',
  'Submetido':'submetido','Obsoleto':'obsoleto','Arquivado':'arquivado'
};
const STATUSES = ['Draft','Em Desenvolvimento','Em Teste','Submetido','Obsoleto','Arquivado'];

const ITEM_TYPES = ['WEB_PAGE','REPORT','DASHBOARD','PDF','HTML','DOCUMENT','APPLICATION','WORKFLOW','EXTERNAL_LINK','API','SCRIPT','OTHER'];
const ITEM_TYPE_LABELS = {'WEB_PAGE':'Web Page','REPORT':'Relatório','DASHBOARD':'Dashboard','PDF':'PDF','HTML':'HTML','DOCUMENT':'Documento','APPLICATION':'Aplicação','WORKFLOW':'Workflow','EXTERNAL_LINK':'Link Externo','API':'API','SCRIPT':'Script','OTHER':'Outro'};
const ITEM_TYPE_ICONS  = {'WEB_PAGE':'globe','REPORT':'bar-chart-2','DASHBOARD':'layout-dashboard','PDF':'file-text','HTML':'code-2','DOCUMENT':'file','APPLICATION':'app-window','WORKFLOW':'git-merge','EXTERNAL_LINK':'external-link','API':'zap','SCRIPT':'terminal','OTHER':'more-horizontal'};

const REQUIRED_FIELDS = [
  ['title','Título'],['internal_name','Internal Name'],
  ['item_type','Tipo do Item'],['content_group','Grupo de Conteúdo'],
  ['access_group','Grupo de Acesso'],['skill','Skill'],
];

const LUCIDE_ICONS = [
  'activity','alert-circle','alert-triangle','align-left','anchor','app-window',
  'archive','arrow-down','arrow-left','arrow-right','arrow-up','award',
  'bar-chart','bar-chart-2','bell','bookmark','book-open','box','braces','briefcase',
  'building','calculator','calendar','check','check-circle','clipboard','clipboard-list',
  'clock','cloud','code','code-2','copy','cpu','credit-card','database',
  'download','edit','edit-2','external-link','eye','factory','file','file-check',
  'file-code','file-plus','file-text','filter','flag','folder','gauge',
  'git-branch','git-merge','globe','hash','heart','help-circle','home',
  'image','inbox','info','key','landmark','layers','layout','layout-dashboard',
  'link','link-2','list','lock','mail','map','message-circle','minus',
  'monitor','more-horizontal','move','network','package','palette','percent',
  'phone','pie-chart','play','plus','printer','receipt','refresh-cw',
  'route','save','search','send','server','settings','settings-2','share-2',
  'shield','shield-check','shopping-cart','sliders','star','tag','target',
  'terminal','trash-2','trending-up','truck','type','unlock',
  'upload','user','users','wrench','x','x-circle','zap','zoom-in','zoom-out'
];

class GFContentRegistryApp {
  constructor() {
    this.records         = [];
    this.selected        = null;
    this.mode            = 'empty';
    this.activeTab       = 0;
    this.editData        = {};
    this.filterQ         = '';
    this.filterSt        = '';
    this._saving         = false;
    this._contentGroups  = [];
    this._accessGroups   = [];
    this._skills         = [];
    this._webPages       = [];
    this._cgExpanded     = new Set();
    this._cgSearchQuery  = '';
  }

  async init() {
    try { this._setupUser(); }    catch(e) {}
    try { this._bindSidebar(); } catch(e) {}
    try { this._bindDocClick(); } catch(e) {}
    await Promise.all([
      this._loadRecords().catch(() => { this.records = []; try { this._renderList(); } catch(_) {} }),
      this._loadLinkOptions().catch(() => {})
    ]);
    try { this._renderEmpty(); } catch(e) {
      const $m = document.getElementById('gfcr-main');
      if ($m) $m.innerHTML = `<div style="padding:40px;color:#dc2626">Erro ao inicializar: ${e.message}</div>`;
    }
    if (window.lucide) try { lucide.createIcons({ attrs:{ style:'display:block' } }); } catch(e) {}
  }

  _setupUser() {
    const full = frappe.session.user_fullname || frappe.session.user || 'Usuário';
    const init = full.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase() || 'GF';
    const $av = document.getElementById('gfcr-avatar');
    const $un = document.getElementById('gfcr-username');
    if ($av) $av.textContent = init;
    if ($un) $un.textContent = full.split(' ')[0];
  }

  // ── Load Records ──────────────────────────────────
  _loadRecords() {
    return new Promise((resolve) => {
      const done = (data) => {
        clearTimeout(timer);
        this.records = data || [];
        try { this._renderList(); } catch(e) {}
        resolve();
      };
      const timer = setTimeout(() => done([]), 6000);
      try {
        frappe.call({
          method: 'frappe.client.get_list',
          args: {
            doctype: 'GF Content Registry',
            fields: ['name','title','internal_name','item_type','status','version',
                     'content_group','skill','description','tags','modified'],
            order_by: 'modified desc',
            limit_page_length: 2000
          },
          callback: (r) => done((r && r.message) ? r.message : []),
          error:    ()  => done([])
        });
      } catch(e) { done([]); }
    });
  }

  // ── Load Link Options ─────────────────────────────
  _loadLinkOptions() {
    const load = (doctype, fields) => new Promise(resolve => {
      frappe.call({
        method: 'frappe.client.get_list',
        args: { doctype, fields, order_by: 'name asc', limit_page_length: 2000 },
        callback: r => resolve((r && r.message) || []),
        error: () => resolve([])
      });
    });
    return Promise.all([
      load('GF Content Group', ['name','display_name','parent_group','description','icon','sort_order']),
      load('GF Access Group',  ['name','display_name']),
      load('GF Skill',         ['name','skill_name']),
      load('Web Page',         ['name','title']),
    ]).then(([cg, ag, sk, wp]) => {
      this._contentGroups = cg;
      this._accessGroups  = ag;
      this._skills        = sk;
      this._webPages      = wp;
      // Expande todos os nós raiz por padrão
      this._cgExpanded = new Set(cg.filter(n => !n.parent_group).map(n => n.name));
    });
  }

  // ── Bind Sidebar ──────────────────────────────────
  _bindSidebar() {
    document.getElementById('gfcr-search').addEventListener('input', e => {
      this.filterQ = e.target.value.toLowerCase().trim();
      this._renderList();
    });
    document.getElementById('gfcr-filters').addEventListener('click', e => {
      const f = e.target.closest('.gfcr-sb-filter');
      if (!f) return;
      document.querySelectorAll('.gfcr-sb-filter').forEach(x=>x.classList.remove('active'));
      f.classList.add('active');
      this.filterSt = f.dataset.status;
      this._renderList();
    });
    document.getElementById('btn-new-cr').addEventListener('click', () => this._startNew());
  }

  // Fecha icon picker ao clicar fora
  _bindDocClick() {
    document.addEventListener('click', (e) => {
      const wrap = document.getElementById('icon-picker-wrap');
      if (wrap && !wrap.contains(e.target)) this._closeIconPicker();
    });
  }

  // ── Render list ───────────────────────────────────
  _renderList() {
    const $list = document.getElementById('gfcr-list');
    if (!$list) return;
    let items = this.records || [];
    if (this.filterQ) {
      items = items.filter(r =>
        (r.title||'').toLowerCase().includes(this.filterQ) ||
        (r.internal_name||'').toLowerCase().includes(this.filterQ) ||
        (r.item_type||'').toLowerCase().includes(this.filterQ) ||
        (r.tags||'').toLowerCase().includes(this.filterQ) ||
        (r.description||'').toLowerCase().includes(this.filterQ)
      );
    }
    if (this.filterSt) items = items.filter(r => r.status === this.filterSt);
    if (!items.length) {
      $list.innerHTML = `<div class="gfcr-sb-empty">Nenhum registro encontrado.</div>`;
      return;
    }
    $list.innerHTML = items.map(r => {
      const stCls  = STATUS_COLORS[r.status] || 'draft';
      const active = this.selected && this.selected.name === r.name ? ' active' : '';
      const typeIcon = ITEM_TYPE_ICONS[r.item_type] || 'file';
      const typeLbl  = ITEM_TYPE_LABELS[r.item_type] || (r.item_type||'');
      return `<div class="cr-card${active}" data-name="${this._esc(r.name)}"
                   onclick="app.selectRecord('${this._esc(r.name)}')">
        <div class="cr-card-top">
          <div class="cr-card-name">${this._esc(r.title||r.name)}</div>
          <div class="cr-card-meta">v${this._esc(r.version||'1.0.0')}</div>
        </div>
        <div class="cr-card-badges">
          <span class="badge badge-type"><i data-lucide="${typeIcon}" style="width:9px;height:9px;margin-right:3px"></i>${this._esc(typeLbl)}</span>
          ${r.status ? `<span class="badge badge-${stCls}">${this._esc(r.status)}</span>` : ''}
        </div>
        <div class="cr-card-desc">${this._esc(r.description||r.internal_name||'')}</div>
      </div>`;
    }).join('');
    if (window.lucide) try { lucide.createIcons({ attrs:{ style:'display:block' } }); } catch(e) {}
  }

  // ── Select record ─────────────────────────────────
  selectRecord(name) {
    const $main = document.getElementById('gfcr-main');
    $main.innerHTML = `<div class="gfcr-loading" style="flex:1"><div class="spinner"></div><span>Carregando...</span></div>`;
    frappe.call({
      method: 'frappe.client.get',
      args: { doctype:'GF Content Registry', name },
      callback: (r) => {
        if (r && r.message) {
          this.selected  = r.message;
          this.activeTab = 0;
          this.mode      = 'view';
          this._renderView();
          this._markActive(name);
        } else {
          this._toast('Registro não encontrado.','error');
          this._renderEmpty();
        }
      },
      error: () => { this._toast('Erro ao carregar o registro.','error'); this._renderEmpty(); }
    });
  }

  _markActive(name) {
    document.querySelectorAll('.cr-card').forEach(c => c.classList.toggle('active', c.dataset.name === name));
  }

  // ── Render empty ──────────────────────────────────
  _renderEmpty() {
    const $main = document.getElementById('gfcr-main');
    $main.classList.remove('ns-mode');
    $main.innerHTML = `
      <div class="gfcr-empty">
        <div class="gfcr-empty-icon"><i data-lucide="book-open" style="width:32px;height:32px"></i></div>
        <h2>Registro de Conteúdos</h2>
        <p>Selecione um registro na lista ou crie um novo para começar.</p>
        <button class="btn-primary" onclick="app._startNew()">
          <i data-lucide="plus" style="width:15px;height:15px"></i> Criar Novo Registro
        </button>
      </div>`;
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this.selected = null;
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._syncNewBtn();
  }

  // ── Render view ───────────────────────────────────
  _renderView() {
    const s = this.selected;
    const isLocked = s.status === 'Obsoleto' || s.status === 'Arquivado';
    const isDraft  = !isLocked && s.status !== 'Submetido';
    const stCls    = STATUS_COLORS[s.status] || 'draft';
    const typeIcon = ITEM_TYPE_ICONS[s.item_type] || 'file';
    const typeLbl  = ITEM_TYPE_LABELS[s.item_type] || (s.item_type||'');
    const modified = s.modified ? s.modified.substring(0,16).replace('T',' ') : '—';
    const $main = document.getElementById('gfcr-main');

    $main.innerHTML = `
      <div class="gfcr-det-hdr">
        <div class="gfcr-det-hdr-top">
          <div class="gfcr-det-hdr-icon">
            <i data-lucide="${typeIcon}" style="width:22px;height:22px"></i>
          </div>
          <div class="gfcr-det-hdr-info">
            <div class="gfcr-det-hdr-name">${this._esc(s.title||s.name)}</div>
            <div class="gfcr-det-hdr-meta">
              <span class="badge badge-${stCls}">${this._esc(s.status||'Draft')}</span>
              ${s.item_type ? `<span class="badge badge-type">${this._esc(typeLbl)}</span>` : ''}
              ${s.content_group ? `<span class="badge badge-group">${this._esc(s.content_group)}</span>` : ''}
              <span class="sep">·</span>
              <span style="font-family:var(--mono);font-size:11px">v${this._esc(s.version||'1.0.0')}</span>
              <span class="sep">·</span>
              <span style="font-family:var(--mono);font-size:11px;color:#64748b">${this._esc(s.internal_name||s.name)}</span>
            </div>
          </div>
        </div>
        ${s.description ? `<div class="gfcr-det-hdr-desc">${this._esc(s.description)}</div>` : ''}
      </div>

      <div class="ver-panel">
        <div class="ver-panel-item"><i data-lucide="tag" style="width:12px;height:12px"></i><span>Versão</span><strong>v${this._esc(s.version||'1.0.0')}</strong></div>
        <div class="ver-panel-item"><i data-lucide="activity" style="width:12px;height:12px"></i><span>Status</span><strong>${this._esc(s.status||'—')}</strong></div>
        <div class="ver-panel-item"><i data-lucide="clock" style="width:12px;height:12px"></i><span>Modificado</span><strong>${modified}</strong></div>
        ${s.skill ? `<div class="ver-panel-item"><i data-lucide="zap" style="width:12px;height:12px"></i><span>Skill</span><strong>${this._esc(s.skill)}</strong></div>` : ''}
        ${s.content_group ? `<div class="ver-panel-item"><i data-lucide="folder" style="width:12px;height:12px"></i><span>Grupo</span><strong>${this._esc(s.content_group)}</strong></div>` : ''}
      </div>

      <div class="gfcr-toolbar">
        ${isLocked ? `
          <div class="cr-locked-notice">
            <i data-lucide="lock" style="width:13px;height:13px"></i>
            Este registro está <strong>&nbsp;${this._esc(s.status)}&nbsp;</strong> — somente duplicação é permitida.
          </div>
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act" onclick="app._duplicateRecord()"><i data-lucide="copy" style="width:13px;height:13px"></i> Duplicar</button>
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act btn-outline" onclick="app._startNew()"><i data-lucide="plus" style="width:13px;height:13px"></i> Novo Registro</button>
        ` : `
          <button class="btn-act btn-primary" onclick="app._startEdit()"><i data-lucide="edit-2" style="width:13px;height:13px"></i> Editar</button>
          ${isDraft ? `<button class="btn-act btn-accent" onclick="app._submitRecord()"><i data-lucide="send" style="width:13px;height:13px"></i> Submeter</button>` : ''}
          <button class="btn-act" onclick="app._duplicateRecord()"><i data-lucide="copy" style="width:13px;height:13px"></i> Duplicar</button>
          ${s.status === 'Submetido' ? `
          <button class="btn-act" onclick="app._newRevision()"><i data-lucide="git-branch" style="width:13px;height:13px"></i> Nova Revisão</button>
          <button class="btn-act btn-warn" onclick="app._markObsolete()"><i data-lucide="archive" style="width:13px;height:13px"></i> Marcar Obsoleto</button>
          ` : ''}
          ${isDraft ? `
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act btn-danger" onclick="app._deleteRecord()"><i data-lucide="trash-2" style="width:13px;height:13px"></i> Excluir</button>
          ` : ''}
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act btn-outline" onclick="app._startNew()"><i data-lucide="plus" style="width:13px;height:13px"></i> Novo Registro</button>
        `}
      </div>

      ${this._buildTabBar()}
      <div class="gfcr-tab-body" id="gfcr-tab-body">${this._renderTabContent(this.activeTab)}</div>`;

    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this._syncNewBtn();
    const $viewBody = document.getElementById('gfcr-tab-body');
    if ($viewBody) {
      this._applyTabClass($viewBody, this.activeTab);
      if (this.activeTab === 1) this._nsInit();
    }
  }

  // ── Tab bar ───────────────────────────────────────
  _buildTabBar() {
    const isView = this.mode === 'view';
    return `<div class="gfcr-tabs">${TABS.map((t,i) => {
      if (t.viewOnly && !isView) return '';
      const active = i === this.activeTab ? ' active' : '';
      const nsStyle = t.id === 'natural_studio'
        ? ';background:linear-gradient(90deg,rgba(109,40,217,.08),rgba(37,99,235,.08))'
        : '';
      return `<div class="gfcr-tab${active}" data-tab-idx="${i}"
        style="${nsStyle}" onclick="app._switchTab(${i})">
        <i data-lucide="${t.icon}" style="width:11px;height:11px"></i>${t.label}
      </div>`;
    }).join('')}</div>`;
  }

  _switchTab(idx) {
    this.activeTab = idx;
    document.querySelectorAll('.gfcr-tab').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.tabIdx) === idx);
    });
    const $body = document.getElementById('gfcr-tab-body');
    if ($body) {
      this._applyTabClass($body, idx);
      $body.innerHTML = (this.mode==='edit'||this.mode==='new')
        ? this._renderTabForm(idx)
        : this._renderTabContent(idx);
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
      if (idx === 1 && this.mode === 'view') this._nsInit();
    }
  }

  // ── Tab content (view) ────────────────────────────
  _renderTabContent(idx) {
    switch(idx) {
      case 0: {
        const s = this.selected || {};
        const v = (f) => { const x = s[f]; return (x !== undefined && x !== null) ? x : ''; };
        const stCls    = STATUS_COLORS[v('status')] || 'draft';
        const typeIcon = ITEM_TYPE_ICONS[v('item_type')] || 'file';
        const typeLbl  = ITEM_TYPE_LABELS[v('item_type')] || v('item_type');
        const tags     = (v('tags')||'').split(',').map(t=>t.trim()).filter(Boolean);
        const url      = v('route_url');
        const fullUrl  = url ? (/^https?:\/\//.test(url) ? url : location.origin + url) : '';
        const icon     = v('icon');
        const color    = v('color');
        const ver      = v('version') || '1.0.0';
        const sortOrder = s.sort_order;
        const hasSort  = sortOrder !== '' && sortOrder !== null && sortOrder !== undefined;
        const row = (lbl, html) =>
          `<div class="cfg-row"><div class="cfg-row-lbl">${lbl}</div><div class="cfg-row-val">${html}</div></div>`;
        return `<div class="cfg-wrap">
          <div class="cfg-section">
            <div class="cfg-section-hdr"><i data-lucide="info" style="width:11px;height:11px"></i>Identificação</div>
            <div class="cfg-rows">
              ${row('Título', v('title') ? `<span style="font-size:14px;font-weight:600;color:#f1f5f9">${this._esc(v('title'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Internal Name', `<span style="font-family:var(--mono);font-size:12px;color:#38bdf8">${this._esc(v('internal_name')||'—')}</span>`)}
              ${row('Tipo', typeLbl ? `<span style="display:inline-flex;align-items:center;gap:5px;color:#94a3b8"><i data-lucide="${typeIcon}" style="width:12px;height:12px;color:#60a5fa;flex-shrink:0"></i>${this._esc(typeLbl)}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Status', v('status') ? `<span class="cfg-badge cfg-badge-${stCls}">${this._esc(v('status'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Descrição', v('description') ? `<span style="color:#94a3b8;white-space:pre-wrap;line-height:1.6">${this._esc(v('description'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Tags', tags.length ? tags.map(t=>`<span class="cfg-tag">${this._esc(t)}</span>`).join('') : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
            </div>
          </div>
          <div class="cfg-section">
            <div class="cfg-section-hdr"><i data-lucide="link-2" style="width:11px;height:11px"></i>Vínculos</div>
            <div class="cfg-rows">
              ${row('Grupo de Conteúdo', v('content_group') ? `<span>${this._esc(v('content_group'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Grupo de Acesso', v('access_group') ? `<span>${this._esc(v('access_group'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Skill', v('skill') ? `<span>${this._esc(v('skill'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Web Page', v('web_page') ? `<span>${this._esc(this._webPageTitle(v('web_page')))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Responsável', v('responsible_user') ? `<span>${this._esc(v('responsible_user'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
            </div>
          </div>
          <div class="cfg-section">
            <div class="cfg-section-hdr"><i data-lucide="globe" style="width:11px;height:11px"></i>Referência</div>
            <div class="cfg-rows">
              ${row('URL / Rota', url ? `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <span style="font-family:var(--mono);font-size:12px;color:#38bdf8">${this._esc(url)}</span>
                  <button class="cfg-url-btn" onclick="app._copyText('${this._escJs(url)}',this)"><i data-lucide="copy" style="width:10px;height:10px"></i>Copiar</button>
                  <button class="cfg-url-btn" onclick="window.open('${this._escJs(fullUrl)}','_blank')"><i data-lucide="external-link" style="width:10px;height:10px"></i>Abrir</button>
                </div>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('DocType Referência', v('reference_doctype') ? `<span style="font-family:var(--mono);font-size:12px;color:#38bdf8">${this._esc(v('reference_doctype'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
            </div>
          </div>
          <div class="cfg-section">
            <div class="cfg-section-hdr"><i data-lucide="palette" style="width:11px;height:11px"></i>Aparência & Configurações</div>
            <div class="cfg-rows">
              ${row('Ícone', icon ? `<span style="display:inline-flex;align-items:center;gap:8px"><span class="cfg-icon-box"><i data-lucide="${this._esc(icon)}" style="width:14px;height:14px"></i></span><span style="color:#94a3b8">${this._esc(icon)}</span></span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Cor', color ? `<span style="display:inline-flex;align-items:center;gap:7px"><span class="cfg-color-dot" style="background:${this._esc(color)}"></span><span style="font-family:var(--mono);font-size:12px;color:#38bdf8">${this._esc(color)}</span></span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
              ${row('Exibir na Home', v('show_on_home') ? `<span class="cfg-bool-yes"><i data-lucide="check-circle" style="width:13px;height:13px"></i>Sim</span>` : `<span class="cfg-bool-no"><i data-lucide="x-circle" style="width:13px;height:13px"></i>Não</span>`)}
              ${row('Favorito', v('favorite') ? `<span class="cfg-bool-yes"><i data-lucide="star" style="width:13px;height:13px"></i>Sim</span>` : `<span class="cfg-bool-no"><i data-lucide="minus" style="width:13px;height:13px"></i>Não</span>`)}
              ${row('Ordem de Exibição', hasSort ? `<span style="font-family:var(--mono);font-size:12px;color:#38bdf8">${this._esc(String(sortOrder))}</span>` : '<span style="color:#1e3a5f;font-style:italic">—</span>')}
            </div>
          </div>
          <div class="cfg-section">
            <div class="cfg-section-hdr"><i data-lucide="git-branch" style="width:11px;height:11px"></i>Versionamento</div>
            <div class="cfg-rows">
              ${row('Versão Atual', `<span style="font-size:26px;font-weight:800;font-family:var(--mono);color:#4ade80;line-height:1">v${this._esc(ver)}</span>`)}
              ${row('Versão Anterior', v('previous_version') ? `<span style="font-family:var(--mono);font-size:12px;color:#38bdf8">${this._esc(v('previous_version'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">Versão inicial</span>')}
              ${row('Última Revisão', v('last_reviewed_on') ? `<span style="color:#94a3b8">${this._esc(v('last_reviewed_on'))}</span>` : '<span style="color:#1e3a5f;font-style:italic">Não revisado</span>')}
            </div>
          </div>
        </div>`;
      }

      case 1: {
        // ── Natural Studio ──────────────────────────
        const nsName = (this.selected || {}).internal_name || '';
        return `<div class="ns-wrap" id="ns-wrap">
          <div class="ns-topbar">
            <div class="ns-topbar-left">
              <div class="ns-topbar-icon">
                <i data-lucide="sparkles" style="width:17px;height:17px"></i>
              </div>
              <div>
                <div class="ns-topbar-title">Natural Studio</div>
                <div class="ns-topbar-sub">Mídia vinculada a <span class="ns-mono">${this._esc(nsName)}</span></div>
              </div>
            </div>
            <div class="ns-topbar-right">
              <button class="ns-btn-upload" onclick="app._nsTriggerUpload()">
                <i data-lucide="upload" style="width:13px;height:13px"></i> Upload
              </button>
              <button class="ns-btn-refresh" id="ns-btn-refresh" onclick="app._nsRefresh()" title="Atualizar lista">
                <i data-lucide="refresh-cw" style="width:13px;height:13px"></i>
              </button>
            </div>
          </div>
          <div class="ns-dropzone" id="ns-dropzone"
               ondragover="event.preventDefault();document.getElementById('ns-dropzone').classList.add('ns-drag-active')"
               ondragleave="document.getElementById('ns-dropzone').classList.remove('ns-drag-active')"
               ondrop="app._nsDrop(event)"
               onclick="app._nsTriggerUpload()">
            <i data-lucide="image-plus" style="width:20px;height:20px"></i>
            <span>Arraste arquivos aqui ou clique para fazer upload</span>
          </div>
          <input type="file" id="ns-file-input" multiple style="display:none"
                 onchange="app._nsUploadFiles(this.files)">
          <div class="ns-upload-bar-wrap" id="ns-upload-bar">
            <div class="ns-upload-bar-label" id="ns-upload-label">Enviando arquivos...</div>
            <div class="ns-upload-bar-track">
              <div class="ns-upload-bar-fill" id="ns-upload-fill"></div>
            </div>
          </div>
          <div class="ns-file-section">
            <div class="ns-gallery" id="ns-gallery">
              <div class="ns-gallery-loading">
                <div class="spinner" style="width:24px;height:24px;border-color:#1a2540;border-top-color:#38bdf8"></div>
                <span style="color:#475569;font-size:13px;margin-left:8px">Carregando arquivos...</span>
              </div>
            </div>
          </div>
          <div class="ns-ai-wrap">
            <div class="ns-ai-hdr">
              <div class="ns-ai-hdr-title">
                <i data-lucide="sparkles" style="width:11px;height:11px"></i> Studio AI
              </div>
              <span class="ns-ai-model-badge" style="margin-left:0">
                <i data-lucide="cpu" style="width:9px;height:9px"></i> Atlas AI · Beta
              </span>
            </div>
            <div class="ns-ai-chat" id="ns-ai-chat">
              <div class="ns-ai-welcome">
                <div class="ns-ai-welcome-icon">
                  <i data-lucide="sparkles" style="width:22px;height:22px"></i>
                </div>
                <div class="ns-ai-welcome-title">Studio AI</div>
                <div class="ns-ai-welcome-sub">Assistente inteligente vinculado a este conteúdo</div>
                <div class="ns-ai-chips">
                  <button class="ns-ai-chip" onclick="document.getElementById('ns-ai-textarea').value='Gerar documento para este conteúdo';document.getElementById('ns-ai-textarea').focus()">Gerar documento</button>
                  <button class="ns-ai-chip" onclick="document.getElementById('ns-ai-textarea').value='Analisar o conteúdo e identificar pontos de melhoria';document.getElementById('ns-ai-textarea').focus()">Analisar conteúdo</button>
                  <button class="ns-ai-chip" onclick="document.getElementById('ns-ai-textarea').value='Descrever as imagens enviadas neste registro';document.getElementById('ns-ai-textarea').focus()">Descrever imagens</button>
                  <button class="ns-ai-chip" onclick="document.getElementById('ns-ai-textarea').value='Criar uma revisão atualizada deste conteúdo';document.getElementById('ns-ai-textarea').focus()">Criar revisão</button>
                </div>
              </div>
            </div>
            <div class="ns-ai-input-area">
              <div class="ns-ai-input-box">
                <textarea class="ns-ai-textarea" id="ns-ai-textarea" placeholder="Pergunte algo sobre este conteúdo..." rows="2"></textarea>
                <div class="ns-ai-input-actions">
                  <div style="display:flex;gap:4px;align-items:center">
                    <button class="ns-ai-icon-btn" title="Anexar arquivo"><i data-lucide="paperclip" style="width:14px;height:14px"></i></button>
                    <button class="ns-ai-icon-btn" title="Adicionar imagem"><i data-lucide="image" style="width:14px;height:14px"></i></button>
                    <button class="ns-ai-icon-btn" title="Inserir link"><i data-lucide="link-2" style="width:14px;height:14px"></i></button>
                    <span class="ns-ai-model-badge">
                      <i data-lucide="cpu" style="width:9px;height:9px"></i> Atlas AI
                    </span>
                  </div>
                  <button class="ns-ai-btn-send" title="Enviar">
                    <i data-lucide="send" style="width:13px;height:13px"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="ns-info-bar" id="ns-info-bar">
            <span id="ns-file-count" style="color:#334155">—</span>
            <span style="color:#1a2540">Natural Studio · ${this._esc(nsName)}</span>
          </div>
        </div>`;
      }

      default: return '';
    }
  }

  // ── Tab form (edit/new) ───────────────────────────
  _renderTabForm(idx) {
    const d   = this.editData;
    const inp = (f, ph='', type='text') =>
      `<input class="form-control" type="${type}" value="${this._esc(d[f]||'')}"
         placeholder="${ph}" oninput="app._fd('${f}',this.value)">`;
    const ta = (f, rows=3) =>
      `<textarea class="form-control" rows="${rows}"
         oninput="app._fd('${f}',this.value)">${this._esc(d[f]||'')}</textarea>`;
    const dd = (f, opts, valFn, lblFn) => {
      if (!opts.length) return `<select class="form-control" disabled><option>Carregando...</option></select>`;
      return `<select class="form-control" onchange="app._fd('${f}',this.value)">
        <option value="">Selecionar...</option>
        ${opts.map(o => {
          const val = valFn ? valFn(o) : o;
          const lbl = lblFn ? lblFn(o) : o;
          return `<option value="${this._esc(val)}"${d[f]===val?' selected':''}>${this._esc(lbl)}</option>`;
        }).join('')}
      </select>`;
    };
    const ddStatic = (f, opts, labelFn) =>
      `<select class="form-control" onchange="app._fd('${f}',this.value)">
        <option value="">Selecionar...</option>
        ${opts.map(o=>`<option value="${this._esc(o)}"${d[f]===o?' selected':''}>${this._esc(labelFn?labelFn(o):o)}</option>`).join('')}
      </select>`;
    const chk = (f, label) =>
      `<div class="form-check">
         <input type="checkbox" id="chk_${f}" ${d[f]?'checked':''}
                onchange="app._fd('${f}',this.checked?1:0)">
         <label for="chk_${f}">${label}</label>
       </div>`;
    const grp = (label, ctrl, desc='', req=false) =>
      `<div class="form-group">
         <label class="form-label">${label}${req?'<span class="req">*</span>':''}</label>
         ${ctrl}
         ${desc?`<div class="form-desc">${desc}</div>`:''}
       </div>`;
    const locked = (val, icon='lock', placeholder='') =>
      `<div class="form-control" style="background:#f1f5f9;color:${val?'#0f172a':'#94a3b8'};cursor:default;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12.5px">
         <i data-lucide="${icon}" style="width:12px;height:12px;flex-shrink:0;color:#94a3b8"></i>
         <span id="fld_${icon === 'lock' ? 'internal_name' : 'x'}">${this._esc(val) || placeholder}</span>
       </div>`;

    switch(idx) {
      case 0: {
        const selNode  = this.editData.content_group
          ? (this._contentGroups||[]).find(n => n.name === this.editData.content_group)
          : null;
        const selLabel = selNode ? (selNode.display_name || selNode.name) : '';
        const selPath  = selNode ? this._getCGPath(selNode, this._contentGroups) : [];
        return `<div class="cfg-wrap" style="padding:20px">
          <div class="cfg-form-section">
            <div class="cfg-form-divider"><i data-lucide="info" style="width:10px;height:10px"></i>Identificação</div>
            <div class="form-grid cols2">
              ${grp('Título', inp('title','Ex: Relatório de Produção Mensal'), 'Nome principal do conteúdo.', true)}
              ${grp('Internal Name',
                `<div class="form-control" style="cursor:default;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12.5px">
                   <i data-lucide="lock" style="width:12px;height:12px;flex-shrink:0;color:#94a3b8"></i>
                   <span id="fld_internal_name">${this._esc(d.internal_name)||'Gerado automaticamente...'}</span>
                 </div>`,
                this.mode==='new' ? 'Gerado automaticamente. Permanente após criação.' : 'Identificador técnico — permanente após criação.',
                true)}
            </div>
            <div class="form-grid">
              ${grp('Tipo do Item', ddStatic('item_type', ITEM_TYPES, k=>ITEM_TYPE_LABELS[k]||k), 'Categoria técnica do conteúdo.', true)}
              ${grp('Status', ddStatic('status', STATUSES), 'Situação atual do registro.', true)}
            </div>
            <div class="form-grid full">
              ${grp('Descrição', ta('description',3), 'Descrição detalhada do conteúdo.')}
              ${grp('Tags', inp('tags','Ex: produção, mensal, relatório'), 'Palavras-chave separadas por vírgula.')}
            </div>
          </div>
          <div class="cfg-form-section">
            <div class="cfg-form-divider"><i data-lucide="link-2" style="width:10px;height:10px"></i>Vínculos</div>
            <div class="cr-links-layout" style="min-height:280px;margin-bottom:14px">
              <div class="cr-tree-panel">
                <div class="cr-tree-header">
                  <div class="cr-tree-title">
                    <i data-lucide="folder-tree" style="width:13px;height:13px"></i>
                    Grupo de Conteúdo <span class="req">*</span>
                  </div>
                  <div class="cr-tree-search">
                    <i data-lucide="search" style="width:13px;height:13px;color:#94a3b8;flex-shrink:0"></i>
                    <input type="text" id="cg-search-inp"
                           placeholder="Buscar por nome, código ou descrição..."
                           oninput="app._filterTree(this.value)" autocomplete="off"
                           value="${this._esc(this._cgSearchQuery||'')}">
                    <button id="cg-search-clear"
                            onclick="app._clearCGSearch()"
                            style="display:${this._cgSearchQuery?'flex':'none'};background:none;border:none;cursor:pointer;align-items:center;color:#94a3b8;padding:0">
                      <i data-lucide="x" style="width:12px;height:12px"></i>
                    </button>
                  </div>
                  <div id="cg-sel-pill" class="cr-tree-sel-pill" style="display:${selNode?'flex':'none'}">
                    <i data-lucide="folder-check" style="width:13px;height:13px;flex-shrink:0"></i>
                    <div style="flex:1;min-width:0;overflow:hidden">
                      <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(selLabel)}</div>
                      ${selPath.length > 1 ? `<div style="font-size:10px;opacity:.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(selPath.join(' › '))}</div>` : ''}
                    </div>
                    <button class="clear-sel" onclick="event.stopPropagation();app._clearCGSelection()" title="Limpar seleção">
                      <i data-lucide="x" style="width:11px;height:11px"></i>
                    </button>
                  </div>
                </div>
                <div class="cr-tree-body" id="cg-tree-body">
                  ${this._renderCGTree()}
                </div>
              </div>
              <div class="cr-links-right">
                <div class="cr-links-right-hdr">
                  <i data-lucide="link-2" style="width:11px;height:11px"></i> Outros Vínculos
                </div>

  // ── Icon Picker ───────────────────────────────────
  _renderIconPickerField() {
    const icon = this.editData.icon || '';
    return `
      <div class="icon-picker-wrap" id="icon-picker-wrap">
        <div class="icon-picker-trigger" onclick="app._toggleIconPicker(event)">
          <div style="width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center">
            ${icon ? `<i data-lucide="${this._esc(icon)}" style="width:16px;height:16px"></i>`
                   : `<i data-lucide="smile" style="width:16px;height:16px;color:#94a3b8"></i>`}
          </div>
          <span class="icon-picker-trigger-name" style="color:${icon?'var(--text)':'var(--text-l)'}">
            ${icon ? this._esc(icon) : 'Clique para selecionar um ícone...'}
          </span>
          <i data-lucide="chevron-down" style="width:12px;height:12px;color:var(--text-l)"></i>
        </div>
        <div class="icon-picker-panel" id="icon-picker-panel" style="display:none">
          <div class="icon-picker-search-bar">
            <i data-lucide="search" style="width:13px;height:13px;color:var(--text-l)"></i>
            <input type="text" placeholder="Buscar ícone Lucide..." id="icon-search-inp"
                   oninput="app._filterIcons(this.value)" autocomplete="off">
            <button class="icon-picker-close" onclick="app._closeIconPicker()" title="Fechar">
              <i data-lucide="x" style="width:13px;height:13px"></i>
            </button>
          </div>
          <div class="icon-grid" id="icon-grid">
            ${this._renderIconGrid(icon, '')}
          </div>
        </div>
      </div>`;
  }

  _renderIconGrid(selected, query) {
    const q = (query||'').toLowerCase().trim();
    const filtered = q ? LUCIDE_ICONS.filter(n => n.includes(q)) : LUCIDE_ICONS;
    if (!filtered.length) return `<div style="grid-column:1/-1;text-align:center;color:#94a3b8;font-size:12px;padding:16px">Nenhum ícone encontrado.</div>`;
    return filtered.map(name => {
      const short = name.length > 10 ? name.substring(0,9)+'…' : name;
      return `<div class="icon-grid-item${selected===name?' selected':''}" onclick="app._selectIcon('${name}')" title="${name}">
        <i data-lucide="${name}" style="width:16px;height:16px"></i>
        <span>${short}</span>
      </div>`;
    }).join('');
  }

  _filterIcons(query) {
    const $grid = document.getElementById('icon-grid');
    if ($grid) {
      $grid.innerHTML = this._renderIconGrid(this.editData.icon||'', query);
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    }
  }

  _selectIcon(name) {
    this._fd('icon', name);
    // Atualiza preview no trigger
    const $trigger = document.querySelector('.icon-picker-trigger');
    if ($trigger) {
      $trigger.innerHTML = `
        <div style="width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center">
          <i data-lucide="${this._esc(name)}" style="width:16px;height:16px"></i>
        </div>
        <span class="icon-picker-trigger-name">${this._esc(name)}</span>
        <i data-lucide="chevron-down" style="width:12px;height:12px;color:var(--text-l)"></i>`;
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    }
    // Atualiza seleção na grid
    document.querySelectorAll('.icon-grid-item').forEach(el => {
      el.classList.toggle('selected', el.getAttribute('onclick') === `app._selectIcon('${name}')`);
    });
    this._closeIconPicker();
  }

  _toggleIconPicker(event) {
    if (event) event.stopPropagation();
    const panel = document.getElementById('icon-picker-panel');
    if (!panel) return;
    if (panel.style.display !== 'none') {
      panel.style.display = 'none';
    } else {
      panel.style.display = 'block';
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
      const inp = document.getElementById('icon-search-inp');
      if (inp) setTimeout(() => inp.focus(), 50);
    }
  }

  _closeIconPicker() {
    const panel = document.getElementById('icon-picker-panel');
    if (panel) panel.style.display = 'none';
  }

  // ── Render edit/new mode ──────────────────────────
  _renderEditMode() {
    const isNew    = this.mode === 'new';
    const isNewRev = isNew && !!this.editData._isNewRevision;
    const title    = isNewRev
      ? `Nova Revisão — ${this.editData.title || '—'}`
      : isNew ? 'Novo Registro'
      : `Editando: ${this.editData.title || this.editData.name || '—'}`;
    const saveLabel = isNewRev ? 'Salvar Nova Revisão' : 'Salvar Registro';
    const saveIcon  = isNewRev ? 'git-branch' : 'save';
    const $main = document.getElementById('gfcr-main');
    $main.innerHTML = `
      <div class="gfcr-form-hdr">
        <div>
          <div class="gfcr-form-hdr-title">${this._esc(title)}</div>
          <div class="gfcr-form-hdr-sub">Preencha os campos nas abas e clique em Salvar.</div>
        </div>
      </div>
      <div class="gfcr-toolbar">
        <button class="btn-act btn-primary" id="gfcr-btn-save" onclick="app._save()">
          <i data-lucide="${saveIcon}" style="width:13px;height:13px"></i> ${saveLabel}
        </button>
        <button class="btn-act" onclick="app._cancelEdit()">
          <i data-lucide="x" style="width:13px;height:13px"></i> Cancelar
        </button>
        ${this.mode !== 'new' ? `
        <div class="gfcr-toolbar-sep"></div>
        <button class="btn-act btn-outline" onclick="app._startNew()">
          <i data-lucide="plus" style="width:13px;height:13px"></i> Novo Registro
        </button>` : ''}
      </div>
      ${this._buildTabBar()}
      <div class="gfcr-tab-body" id="gfcr-tab-body" style="flex:1;overflow-y:auto">
        ${this._renderTabForm(this.activeTab)}
      </div>
      <div class="gfcr-form-foot">
        <button class="btn-cancel" onclick="app._cancelEdit()">Cancelar</button>
        <button class="btn-save" onclick="app._save()">
          <i data-lucide="${saveIcon}" style="width:14px;height:14px"></i> ${saveLabel}
        </button>
      </div>`;
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this._syncNewBtn();
    const $editBody = document.getElementById('gfcr-tab-body');
    if ($editBody) this._applyTabClass($editBody, 0);
  }

  // ── Field data ────────────────────────────────────
  // internal_name: auto-gerado do título apenas em modo 'new', sempre somente leitura.
  _fd(field, val) {
    this.editData[field] = val;
    if (field === 'title' && this.mode === 'new') {
      const ver  = (this.editData.version || '1.0.0').replace(/\./g, '_');
      const slug = val.toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g,'')
        .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
      const full = slug ? `${slug}_v${ver}` : '';
      this.editData.internal_name = full;
      const $el = document.getElementById('fld_internal_name');
      if ($el) $el.textContent = full || 'Gerado automaticamente...';
    }
  }

  _startEdit() {
    this.mode      = 'edit';
    this.activeTab = 0;
    this.editData  = Object.assign({}, this.selected);
    this._renderEditMode();
  }

  _startNew() {
    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = { status:'Draft', version:'1.0.0', show_on_home:0, favorite:0 };
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._renderEditMode();
  }

  _cancelEdit() {
    if (this.selected) {
      this.mode = 'view';
      this._renderView();
    } else {
      this.mode = 'empty'; // reset antes de _syncNewBtn()
      this._renderEmpty();
    }
  }

  // ── Save ──────────────────────────────────────────
  async _save() {
    if (this._saving) return;
    const d = this.editData;

    for (const [f, lbl] of REQUIRED_FIELDS) {
      if (!d[f] || !String(d[f]).trim()) {
        this._toast(`Campo obrigatório: ${lbl}`, 'error'); return;
      }
    }

    this._saving = true;
    const $btn = document.getElementById('gfcr-btn-save');
    const resetBtn = () => {
      if ($btn) { $btn.disabled = false; $btn.innerHTML = '<i data-lucide="save" style="width:14px;height:14px"></i> Salvar Registro'; if(window.lucide)lucide.createIcons({attrs:{style:'display:block'}}); }
      this._saving = false;
    };
    if ($btn) { $btn.disabled = true; $btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Salvando...'; }

    const originToObsolete = (this.mode === 'new') ? (d._originName || null) : null;

    const buildAndSave = (baseDoc) => {
      const method = this.mode === 'new' ? 'frappe.client.insert' : 'frappe.client.save';
      const doc = this.mode === 'new'
        ? Object.assign({ doctype:'GF Content Registry' }, d)
        : Object.assign({}, baseDoc, d, { doctype:'GF Content Registry', name:this.selected.name, modified:baseDoc.modified });

      delete doc._isNewRevision;
      delete doc._originName;

      frappe.call({
        method, args: { doc },
        callback: (r) => {
          if (r && r.message) {
            const saved = r.message;
            const finish = () => {
              this._saving = false;
              if (saved.internal_name) {
                frappe.call({
                  method: 'ichis_atlas_app.api.natural_studio.ensure_record_directories',
                  args: { internal_name: saved.internal_name, route_url: saved.route_url || '' }
                });
              }
              this._loadRecords().then(() => {
                this.selected  = saved;
                this.mode      = 'view';
                this.activeTab = 0;
                this._renderView();
                this._markActive(saved.name);
              });
            };
            if (originToObsolete) {
              frappe.call({
                method: 'frappe.client.set_value',
                args: { doctype:'GF Content Registry', name:originToObsolete, fieldname:'status', value:'Obsoleto' },
                callback: () => { this._toast('Revisão salva! Versão anterior marcada como Obsoleta.','success'); finish(); },
                error:    () => { this._toast('Revisão salva, mas não foi possível marcar a versão anterior.','info'); finish(); }
              });
            } else {
              this._toast('Registro salvo com sucesso!','success');
              finish();
            }
          } else {
            this._toast('Erro ao salvar o registro.','error'); resetBtn();
          }
        },
        error: () => { this._toast('Erro ao salvar o registro.','error'); resetBtn(); }
      });
    };

    if (this.mode === 'edit') {
      frappe.call({
        method: 'frappe.client.get',
        args: { doctype:'GF Content Registry', name:this.selected.name },
        callback: (r) => {
          if (!r.message) { this._toast('Erro ao carregar o registro.','error'); resetBtn(); return; }
          buildAndSave(r.message);
        },
        error: () => { this._toast('Erro ao carregar o registro.','error'); resetBtn(); }
      });
    } else {
      buildAndSave(null);
    }
  }

  _deleteRecord() {
    if (!this.selected) return;
    const name  = this.selected.name;
    const label = this.selected.title || name;
    frappe.confirm(`Excluir o registro "${label}"? Esta ação não pode ser desfeita.`, () => {
      frappe.call({
        method: 'frappe.client.delete',
        args: { doctype:'GF Content Registry', name },
        callback: () => {
          this._toast('Registro excluído.','info');
          this.selected = null;
          this._loadRecords().then(() => this._renderEmpty());
        },
        error: () => { this._toast('Erro ao excluir. Verifique permissões.','error'); }
      });
    });
  }

  _duplicateRecord() {
    if (!this.selected) return;
    const s = this.selected;
    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = Object.assign({}, s, {
      name:             undefined,
      title:            (s.title||'') + ' (Cópia)',
      internal_name:    (s.internal_name||'') + '_copia',
      status:           'Draft',
      version:          '1.0.0',
      previous_version: undefined,
      last_reviewed_on: undefined,
    });
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._renderEditMode();
    this._toast('Registro duplicado. Ajuste os campos e salve.','info');
  }

  // ── New Revision ──────────────────────────────────
  // Copia todos os campos, bumpa versão minor (1.0.0 → 1.1.0),
  // seta previous_version = nome do registro atual.
  // _save() marcará o original como Obsoleto após o insert.
  _newRevision() {
    if (!this.selected) return;
    const s   = this.selected;
    const ver = s.version || '1.0.0';
    const parts = ver.split('.').map(Number);
    parts[1] = (parts[1] || 0) + 1;
    parts[2] = 0;
    const newVer = parts.join('.');

    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = Object.assign({}, s, {
      name:             undefined,
      status:           'Draft',
      version:          newVer,
      previous_version: s.name,
      last_reviewed_on: undefined,
      _originName:      s.name,
      _isNewRevision:   true,
    });
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._renderEditMode();
    this._toast(`Nova revisão v${newVer} criada a partir de v${ver}. Ajuste e salve.`,'info');
  }

  _markObsolete() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.confirm('Marcar este registro como Obsoleto?', () => {
      frappe.call({
        method: 'frappe.client.set_value',
        args: { doctype:'GF Content Registry', name, fieldname:'status', value:'Obsoleto' },
        callback: () => { this._toast('Registro marcado como Obsoleto.','info'); this.selectRecord(name); },
        error: () => { this._toast('Erro ao atualizar status.','error'); }
      });
    });
  }

  // ── Helpers ───────────────────────────────────────
  _webPageTitle(name) {
    if (!name) return '';
    const wp = (this._webPages||[]).find(w => w.name === name);
    return wp ? (wp.title || name) : name;
  }

  _copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      if (btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = '<i data-lucide="check" style="width:12px;height:12px"></i>';
        if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
        setTimeout(() => { btn.innerHTML = orig; if(window.lucide)lucide.createIcons({attrs:{style:'display:block'}}); }, 1500);
      }
    }).catch(() => this._toast('Erro ao copiar.','error'));
  }

  _toast(msg, type='info') {
    const icons = { success:'check-circle', error:'x-circle', info:'info' };
    const $t = document.getElementById('gfcr-toast');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `
      <i data-lucide="${icons[type]||'info'}" class="toast-icon" style="width:16px;height:16px;flex-shrink:0"></i>
      <span class="toast-msg">${this._esc(msg)}</span>
      <button class="toast-close" onclick="this.closest('.toast').remove()" title="Fechar">
        <i data-lucide="x" style="width:14px;height:14px"></i>
      </button>`;
    $t.appendChild(el);
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    setTimeout(() => { el.classList.add('leaving'); setTimeout(() => el.remove(), 200); }, 5000);
  }

  _syncNewBtn() {
    const btn = document.getElementById('btn-new-cr');
    if (!btn) return;
    btn.style.display = (this.mode === 'edit' || this.mode === 'new') ? 'none' : '';
  }

  // ── Submit ────────────────────────────────────────
  _submitRecord() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.confirm('Submeter este registro? Após submetido, utilize Nova Revisão para realizar alterações.', () => {
      frappe.call({
        method: 'frappe.client.set_value',
        args: { doctype:'GF Content Registry', name, fieldname:'status', value:'Submetido' },
        callback: () => { this._toast('Registro submetido com sucesso!','success'); this.selectRecord(name); },
        error:    () => { this._toast('Erro ao submeter o registro.','error'); }
      });
    });
  }

  // ── Content Group Tree ────────────────────────────
  _renderCGTree() {
    const nodes = this._contentGroups || [];
    const q     = (this._cgSearchQuery || '').toLowerCase().trim();
    if (!nodes.length) return `<div class="cg-empty"><i data-lucide="loader" style="width:14px;height:14px;margin-right:6px"></i>Carregando grupos...</div>`;
    if (q) return this._renderCGSearchResults(q, nodes);
    const roots = nodes
      .filter(n => !n.parent_group)
      .sort((a,b) => String(a.sort_order||'zzz').localeCompare(String(b.sort_order||'zzz')));
    if (!roots.length) return `<div class="cg-empty">Nenhum grupo disponível.</div>`;
    return roots.map(n => this._renderCGNode(n, nodes, 0)).join('');
  }

  _renderCGNode(node, all, depth) {
    const children = all
      .filter(n => n.parent_group === node.name)
      .sort((a,b) => String(a.sort_order||'zzz').localeCompare(String(b.sort_order||'zzz')));
    const hasKids  = children.length > 0;
    const expanded = this._cgExpanded.has(node.name);
    const selected = this.editData && this.editData.content_group === node.name;
    const pad      = 8 + depth * 18;
    const iconHtml = node.icon
      ? `<span class="cg-icon"><i data-lucide="${this._esc(node.icon)}" style="width:13px;height:13px"></i></span>`
      : '';
    return `<div>
      <div class="cg-node${selected?' selected':''}" style="padding-left:${pad}px"
           onclick="app._selectCGGroup('${this._escJs(node.name)}')">
        <span class="cg-toggle" onclick="event.stopPropagation();app._toggleCGNode('${this._escJs(node.name)}')">
          ${hasKids
            ? `<i data-lucide="chevron-right" class="cg-toggle-icon${expanded?' expanded':''}" style="width:13px;height:13px"></i>`
            : `<span class="cg-leaf-dot"></span>`}
        </span>
        ${iconHtml}
        <div class="cg-content">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px">
            <span class="cg-name">${this._esc(node.display_name||node.name)}</span>
            ${node.sort_order?`<span class="cg-order">${this._esc(String(node.sort_order))}</span>`:''}
          </div>
          ${node.description?`<div class="cg-desc">${this._esc((node.description||'').substring(0,80))}</div>`:''}
        </div>
      </div>
      ${hasKids&&expanded ? children.map(c=>this._renderCGNode(c,all,depth+1)).join('') : ''}
    </div>`;
  }

  _renderCGSearchResults(q, nodes) {
    const matches = nodes.filter(n =>
      (n.display_name||'').toLowerCase().includes(q) ||
      (n.name||'').toLowerCase().includes(q) ||
      (n.description||'').toLowerCase().includes(q) ||
      String(n.sort_order||'').toLowerCase().includes(q)
    );
    if (!matches.length) return `<div class="cg-empty">Nenhum grupo encontrado para "<strong>${this._esc(q)}</strong>".</div>`;
    return matches.map(n => {
      const path = this._getCGPath(n, nodes);
      const sel  = this.editData && this.editData.content_group === n.name;
      return `<div class="cg-node${sel?' selected':''}"
               onclick="app._selectCGGroup('${this._escJs(n.name)}')">
        <span class="cg-toggle"><span class="cg-leaf-dot"></span></span>
        ${n.icon?`<span class="cg-icon"><i data-lucide="${this._esc(n.icon)}" style="width:13px;height:13px"></i></span>`:''}
        <div class="cg-content">
          <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">
            <span class="cg-name">${this._esc(n.display_name||n.name)}</span>
            ${n.sort_order?`<span class="cg-order">${this._esc(String(n.sort_order))}</span>`:''}
          </div>
          ${path.length>1?`<div class="cg-breadcrumb">${this._esc(path.slice(0,-1).join(' › '))}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  _getCGPath(node, nodes) {
    const path = [];
    let cur = node;
    while (cur) {
      path.unshift(cur.display_name || cur.name);
      cur = cur.parent_group ? nodes.find(n => n.name === cur.parent_group) : null;
      if (path.length > 8) break;
    }
    return path;
  }

  _selectCGGroup(name) {
    this._fd('content_group', name);
    const node  = (this._contentGroups||[]).find(n => n.name === name);
    const label = node ? (node.display_name||node.name) : name;
    const path  = node ? this._getCGPath(node, this._contentGroups) : [label];
    const $pill = document.getElementById('cg-sel-pill');
    if ($pill) {
      $pill.innerHTML = `
        <i data-lucide="folder-check" style="width:13px;height:13px;flex-shrink:0"></i>
        <div style="flex:1;min-width:0;overflow:hidden">
          <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(label)}</div>
          ${path.length>1?`<div style="font-size:10px;opacity:.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(path.join(' › '))}</div>`:''}
        </div>
        <button class="clear-sel" onclick="event.stopPropagation();app._clearCGSelection()" title="Limpar seleção">
          <i data-lucide="x" style="width:11px;height:11px"></i>
        </button>`;
      $pill.style.display = 'flex';
      if (window.lucide) lucide.createIcons({attrs:{style:'display:block'}});
    }
    this._rerenderCGTree();
  }

  _clearCGSelection() {
    this._fd('content_group', '');
    const $pill = document.getElementById('cg-sel-pill');
    if ($pill) $pill.style.display = 'none';
    this._rerenderCGTree();
  }

  _toggleCGNode(name) {
    if (this._cgExpanded.has(name)) this._cgExpanded.delete(name);
    else this._cgExpanded.add(name);
    this._rerenderCGTree();
  }

  _filterTree(q) {
    this._cgSearchQuery = q;
    const $clear = document.getElementById('cg-search-clear');
    if ($clear) $clear.style.display = q ? 'flex' : 'none';
    this._rerenderCGTree();
  }

  _clearCGSearch() {
    this._cgSearchQuery = '';
    const $inp   = document.getElementById('cg-search-inp');
    const $clear = document.getElementById('cg-search-clear');
    if ($inp)   $inp.value = '';
    if ($clear) $clear.style.display = 'none';
    this._rerenderCGTree();
  }

  _rerenderCGTree() {
    const $body = document.getElementById('cg-tree-body');
    if (!$body) return;
    $body.innerHTML = this._renderCGTree();
    if (window.lucide) lucide.createIcons({attrs:{style:'display:block'}});
  }

  // ── Natural Studio ─────────────────────────────────
  _applyTabClass($body, idx) {
    if (!$body) return;
    $body.classList.remove('ns-active', 'cfg-active');
    const $main = document.getElementById('gfcr-main');
    if (idx === 1) {
      $body.classList.add('ns-active');
      if ($main) $main.classList.add('ns-mode');
    } else {
      $body.classList.add('cfg-active');
      if ($main) $main.classList.remove('ns-mode');
    }
  }

  _nsInit() {
    const intName = (this.selected || {}).internal_name;
    if (!intName) return;
    frappe.call({
      method: 'ichis_atlas_app.api.natural_studio.ensure_record_directories',
      args: { internal_name: intName, route_url: (this.selected || {}).route_url || '' }
    });
    const $gal = document.getElementById('ns-gallery');
    if ($gal) $gal.innerHTML = `
      <div class="ns-gallery-loading">
        <div class="spinner" style="width:24px;height:24px;border-color:#1a2540;border-top-color:#38bdf8"></div>
        <span style="color:#475569;font-size:13px;margin-left:8px">Carregando arquivos...</span>
      </div>`;
    frappe.call({
      method: 'ichis_atlas_app.api.natural_studio.list_files',
      args: { internal_name: intName },
      callback: (r) => { this._nsRenderGallery(r.message || []); },
      error: () => {
        if ($gal) $gal.innerHTML = `<div class="ns-gallery-empty">
          <strong>Erro ao carregar arquivos</strong>Verifique as permissões e tente novamente.</div>`;
      }
    });
  }

  _nsRefresh() {
    const $btn = document.getElementById('ns-btn-refresh');
    if ($btn) { $btn.style.transition = 'none'; $btn.querySelector('i').style.animation = 'spin 600ms linear'; }
    this._nsInit();
    setTimeout(() => { if ($btn) $btn.querySelector('i').style.animation = ''; }, 650);
  }

  _nsRenderGallery(files) {
    const $gal  = document.getElementById('ns-gallery');
    const $cnt  = document.getElementById('ns-file-count');
    if (!$gal) return;
    if ($cnt) $cnt.textContent = files.length
      ? `${files.length} arquivo${files.length > 1 ? 's' : ''}`
      : 'Nenhum arquivo';
    if (!files.length) {
      $gal.innerHTML = `<div class="ns-gallery-empty">
        <i data-lucide="image" style="width:52px;height:52px;display:block;margin:0 auto 14px;color:#1a2540"></i>
        <strong>Nenhum arquivo ainda</strong>
        Arraste imagens para a área acima ou clique em Upload para começar.
      </div>`;
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
      return;
    }
    $gal.innerHTML = `<div class="ns-gallery-grid">${files.map(f => this._nsFileCard(f)).join('')}</div>`;
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
  }

  _nsFileCard(f) {
    const sz = f.size < 1024 ? f.size + ' B'
      : f.size < 1048576 ? (f.size / 1024).toFixed(1) + ' KB'
      : (f.size / 1048576).toFixed(1) + ' MB';
    const thumb = f.is_image
      ? `<img class="ns-img-thumb" src="${this._esc(f.url)}" alt="${this._esc(f.name)}" loading="lazy">`
      : `<div class="ns-img-thumb-icon"><i data-lucide="file" style="width:36px;height:36px"></i></div>`;
    const viewBtn = f.is_image
      ? `<button class="ns-img-overlay-btn" onclick="event.stopPropagation();app._nsLightbox('${this._escJs(f.url)}','${this._escJs(f.name)}')" title="Visualizar">
           <i data-lucide="zoom-in" style="width:14px;height:14px"></i>
         </button>` : '';
    return `<div class="ns-img-card">
      ${thumb}
      <div class="ns-img-overlay">
        ${viewBtn}
        <button class="ns-img-overlay-btn" onclick="event.stopPropagation();app._nsCopyUrl('${this._escJs(f.url)}')" title="Copiar URL">
          <i data-lucide="copy" style="width:14px;height:14px"></i>
        </button>
        <button class="ns-img-overlay-btn del" onclick="event.stopPropagation();app._nsDelete('${this._escJs(f.name)}')" title="Excluir">
          <i data-lucide="trash-2" style="width:14px;height:14px"></i>
        </button>
      </div>
      <div class="ns-img-info">
        <div class="ns-img-name" title="${this._esc(f.name)}">${this._esc(f.name)}</div>
        <div class="ns-img-size">${sz}</div>
      </div>
    </div>`;
  }

  _nsTriggerUpload() {
    const $inp = document.getElementById('ns-file-input');
    if ($inp) { $inp.value = ''; $inp.click(); }
  }

  _nsDrop(event) {
    event.preventDefault();
    const dz = document.getElementById('ns-dropzone');
    if (dz) dz.classList.remove('ns-drag-active');
    const files = event.dataTransfer && event.dataTransfer.files;
    if (files && files.length) this._nsUploadFiles(files);
  }

  async _nsUploadFiles(files) {
    if (!files || !files.length) return;
    const intName = (this.selected || {}).internal_name;
    if (!intName) return;
    const $bar   = document.getElementById('ns-upload-bar');
    const $fill  = document.getElementById('ns-upload-fill');
    const $label = document.getElementById('ns-upload-label');
    if ($bar) $bar.style.display = 'block';
    const total = files.length;
    let done = 0, failed = 0;
    for (const file of Array.from(files)) {
      if ($label) $label.textContent = `Enviando ${done + 1} de ${total}: ${file.name}`;
      try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('internal_name', intName);
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', '/api/method/ichis_atlas_app.api.natural_studio.upload_file');
          xhr.setRequestHeader('X-Frappe-CSRF-Token', frappe.csrf_token);
          xhr.onload  = () => xhr.status === 200 ? resolve() : reject();
          xhr.onerror = reject;
          xhr.send(fd);
        });
        done++;
      } catch(e) {
        failed++;
        this._toast(`Erro ao enviar: ${file.name}`, 'error');
      }
      if ($fill) $fill.style.width = (((done + failed) / total) * 100) + '%';
    }
    setTimeout(() => {
      if ($bar)  $bar.style.display = 'none';
      if ($fill) $fill.style.width = '0%';
    }, 600);
    if (done > 0) {
      this._toast(
        done === total ? `${done} arquivo${done > 1 ? 's' : ''} enviado${done > 1 ? 's' : ''} com sucesso!` :
        `${done}/${total} arquivos enviados.`,
        done === total ? 'success' : 'info'
      );
      this._nsInit();
    }
  }

  _nsDelete(filename) {
    const intName = (this.selected || {}).internal_name;
    if (!intName) return;
    frappe.confirm(`Excluir o arquivo "<strong>${this._esc(filename)}</strong>"?<br>Esta ação não pode ser desfeita.`, () => {
      frappe.call({
        method: 'ichis_atlas_app.api.natural_studio.delete_file',
        args: { internal_name: intName, filename },
        callback: () => { this._toast('Arquivo excluído.', 'info'); this._nsInit(); },
        error:    () => this._toast('Erro ao excluir o arquivo.', 'error')
      });
    });
  }

  _nsCopyUrl(url) {
    const full = /^https?:\/\//.test(url) ? url : location.origin + url;
    navigator.clipboard.writeText(full)
      .then(() => this._toast('URL copiada para a área de transferência!', 'success'))
      .catch(() => this._toast('Erro ao copiar URL.', 'error'));
  }

  _nsLightbox(url, name) {
    document.getElementById('ns-lightbox')?.remove();
    const el = document.createElement('div');
    el.id = 'ns-lightbox';
    el.className = 'ns-lightbox';
    el.innerHTML = `
      <button class="ns-lightbox-close" onclick="document.getElementById('ns-lightbox').remove()" title="Fechar">
        <i data-lucide="x" style="width:18px;height:18px"></i>
      </button>
      <img class="ns-lightbox-img" src="${this._esc(url)}" alt="${this._esc(name)}">
      <div class="ns-lightbox-info">${this._esc(name)}</div>`;
    el.addEventListener('click', e => { if (e.target === el) el.remove(); });
    document.addEventListener('keydown', function esc(e) {
      if (e.key === 'Escape') { el.remove(); document.removeEventListener('keydown', esc); }
    });
    document.body.appendChild(el);
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
  }

  // ── Helpers ───────────────────────────────────────
  _esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  _escJs(s) {
    if (!s) return '';
    return String(s).replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  }
}

let app;
frappe.ready(function() {
  app = new GFContentRegistryApp();
  app.init();
});
</script>
{% endblock %}
