{% extends "templates/web.html" %}

{% block head_include %}
<script src="/assets/ichis_atlas_app/js/lucide.min.js"></script>
<style>
/* ── Frappe container reset ───────────────────────── */
.page-content,.container,.container-fluid,.row{
  max-width:100%!important;padding-left:0!important;padding-right:0!important;
  margin-left:0!important;margin-right:0!important;width:100%!important
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1e293b;--primary-h:#0f172a;--primary-l:#334155;
  --primary-pale:#f1f5f9;
  --accent:#059669;--accent-h:#047857;--accent-l:#10b981;--accent-pale:#d1fae5;
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;
  --border:#e2e8f0;--border-h:#cbd5e1;
  --text:#0f172a;--text-m:#475569;--text-l:#94a3b8;
  --shadow-md:0 4px 12px rgba(0,0,0,.09);
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sidebar:272px;--header:56px
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── Layout ───────────────────────────────────────── */
#gfcr{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Header ───────────────────────────────────────── */
.gfcr-hdr{height:var(--header);min-height:var(--header);display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(15,23,42,.22);z-index:100;flex-shrink:0}
.gfcr-hdr-logo{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.gfcr-hdr-title{font-weight:600;font-size:15px;letter-spacing:-.2px}
.gfcr-hdr-sub{font-size:11px;opacity:.55;margin-left:2px}
.gfcr-hdr-sep{flex:1}
.gfcr-hdr-user{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8}
.gfcr-hdr-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.gfcr-hdr-atlas{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:background 150ms;text-decoration:none;color:#fff}
.gfcr-hdr-atlas:hover{background:rgba(255,255,255,.2)}

/* ── Body ─────────────────────────────────────────── */
.gfcr-body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ──────────────────────────────────────── */
.gfcr-sb{width:var(--sidebar);min-width:var(--sidebar);background:#0f172a;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden}
.gfcr-sb-top{padding:14px 14px 10px;flex-shrink:0}
.gfcr-sb-search{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;transition:border-color 150ms}
.gfcr-sb-search:focus-within{border-color:rgba(255,255,255,.25)}
.gfcr-sb-search input{border:none;outline:none;background:transparent;font-size:13px;color:#e2e8f0;flex:1;min-width:0}
.gfcr-sb-search input::placeholder{color:#475569}
.gfcr-sb-search svg{flex-shrink:0;color:#475569}
.gfcr-sb-filters{display:flex;gap:5px;padding:8px 14px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.gfcr-sb-filter{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.12);cursor:pointer;background:transparent;color:#94a3b8;transition:all 150ms;white-space:nowrap}
.gfcr-sb-filter.active{background:#334155;color:#e2e8f0;border-color:#475569}
.gfcr-sb-filter:hover:not(.active){background:rgba(255,255,255,.07);color:#cbd5e1}
.gfcr-sb-list{flex:1;overflow-y:auto;padding:8px}
.gfcr-sb-list::-webkit-scrollbar{width:4px}
.gfcr-sb-list::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
.gfcr-sb-empty{text-align:center;color:#475569;font-size:12px;padding:32px 16px;line-height:1.6}
.cr-card{border-radius:8px;padding:10px 11px;margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:all 150ms;background:transparent}
.cr-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.09)}
.cr-card.active{background:#1e293b;border-color:#334155}
.cr-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.cr-card-name{font-weight:600;font-size:12.5px;color:#cbd5e1;line-height:1.3}
.cr-card.active .cr-card-name{color:#93c5fd}
.cr-card-meta{font-size:10px;color:#475569;white-space:nowrap;margin-top:1px;font-family:var(--mono)}
.cr-card.active .cr-card-meta{color:#64748b}
.cr-card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.cr-card-desc{font-size:11px;color:#64748b;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.gfcr-sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.btn-new-cr{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;background:#059669;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:background 150ms}
.btn-new-cr:hover{background:#047857}

/* ── Badges ───────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;line-height:1.4;white-space:nowrap}
.badge-draft{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.badge-dev{background:#dbeafe;color:#1d4ed8}
.badge-test{background:#fed7aa;color:#c2410c}
.badge-submetido{background:#e0e7ff;color:#3730a3}
.badge-obsoleto{background:#fef9c3;color:#854d0e}
.badge-arquivado{background:#fee2e2;color:#dc2626}
.badge-type{background:#ede9fe;color:#5b21b6}
.badge-group{background:#dbeafe;color:#1d4ed8}

/* ── Main ─────────────────────────────────────────── */
.gfcr-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Empty ────────────────────────────────────────── */
.gfcr-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
.gfcr-empty-icon{width:72px;height:72px;border-radius:20px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;color:var(--text-m)}
.gfcr-empty h2{font-size:20px;font-weight:700;color:var(--text)}
.gfcr-empty p{color:var(--text-m);font-size:13px;max-width:320px;line-height:1.6}
.gfcr-empty .btn-primary{display:flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background 150ms}
.gfcr-empty .btn-primary:hover{background:var(--primary-h)}

/* ── Detail header ────────────────────────────────── */
.gfcr-det-hdr{padding:14px 10px 10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.gfcr-det-hdr-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.gfcr-det-hdr-icon{width:44px;height:44px;border-radius:12px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;color:var(--text-m);flex-shrink:0}
.gfcr-det-hdr-info{flex:1;min-width:0}
.gfcr-det-hdr-name{font-size:20px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px}
.gfcr-det-hdr-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gfcr-det-hdr-meta span{font-size:12px;color:var(--text-m)}
.gfcr-det-hdr-meta .sep{color:var(--border-h)}
.gfcr-det-hdr-desc{font-size:13px;color:var(--text-m);line-height:1.5;padding-top:8px;border-top:1px solid var(--border)}

/* ── Toolbar ──────────────────────────────────────── */
.gfcr-toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:9px 10px;background:var(--surface);flex-shrink:0}
.gfcr-toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
.btn-act{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-m);transition:all 150ms;white-space:nowrap}
.btn-act:hover{background:var(--surface2);border-color:var(--border-h)}
.btn-act:disabled{opacity:.45;cursor:not-allowed}
.btn-act.btn-primary{background:var(--primary);color:#fff;border-color:transparent}
.btn-act.btn-primary:hover{background:var(--primary-h)}
.btn-act.btn-outline{background:var(--surface);color:var(--primary);border-color:var(--primary-l)}
.btn-act.btn-outline:hover{background:var(--primary-pale)}
.btn-act.btn-danger{color:#dc2626}
.btn-act.btn-danger:hover{background:#fee2e2;border-color:#fca5a5}
.btn-act.btn-warn{color:#b45309}
.btn-act.btn-warn:hover{background:#fef3c7;border-color:#fde68a}

/* ── Meta panel ───────────────────────────────────── */
.ver-panel{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px}
.ver-panel-item{display:flex;align-items:center;gap:5px;color:var(--text-m)}
.ver-panel-item strong{font-weight:600;color:var(--text)}

/* ── Tabs ─────────────────────────────────────────── */
.gfcr-tabs{display:flex;background:var(--surface);border-bottom:1px solid #eef0f4;padding:0 10px;flex-shrink:0;overflow-x:auto}
.gfcr-tabs::-webkit-scrollbar{height:0}
.gfcr-tab{display:flex;align-items:center;gap:4px;padding:8px 10px;font-size:11.5px;font-weight:500;color:var(--text-m);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 150ms}
.gfcr-tab:hover{color:var(--text);background:var(--primary-pale)}
.gfcr-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* ── Tab body ─────────────────────────────────────── */
.gfcr-tab-body{flex:1;overflow-y:auto;padding:16px 10px;background:var(--bg)}
.gfcr-tab-body::-webkit-scrollbar{width:5px}
.gfcr-tab-body::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:4px}

/* ── Field display ────────────────────────────────── */
.fld-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:16px}
.fld-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.fld-lbl{font-size:10.5px;font-weight:600;color:var(--text-l);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.fld-val{font-size:13.5px;color:var(--text);line-height:1.5;word-break:break-word}
.fld-val.empty{color:var(--text-l);font-style:italic;font-size:12px}
.fld-val.mono{font-family:var(--mono);font-size:12.5px}
.fld-val.check{display:flex;align-items:center;gap:5px}
.fld-check-yes{color:var(--accent)}
.fld-check-no{color:var(--text-l)}

/* ── Content view layout ─────────────────────────── */
.cr-view-body{display:flex;flex-direction:column;gap:12px;padding:16px 10px;overflow-y:auto;flex:1}
.cr-tech-strip{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px}
.cr-tech-id{display:flex;align-items:center;gap:6px;background:#1e293b;color:#93c5fd;border-radius:6px;padding:4px 10px;font-family:var(--mono);font-size:11.5px}
.cr-tech-id-copy{background:none;border:none;cursor:pointer;padding:0 2px;color:#64748b;display:flex;align-items:center;transition:color 150ms}
.cr-tech-id-copy:hover{color:#93c5fd}
.cr-tech-sep{width:1px;height:14px;background:#e2e8f0;flex-shrink:0}
.cr-tech-chip{display:flex;align-items:center;gap:4px;font-size:11.5px;color:#475569;background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:3px 9px}
.cr-tech-chip.fav-yes{color:#b45309;background:#fffbeb;border-color:#fde68a}
.cr-desc-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.cr-desc-hdr{display:flex;align-items:center;gap:7px;background:#f8fafc;color:#475569;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:9px 16px;border-bottom:1px solid #e2e8f0;border-left:3px solid #059669}
.cr-desc-body{padding:14px 16px;font-size:13px;color:#374151;line-height:1.7;white-space:pre-wrap}
.cr-bottom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.cr-bottom-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.cr-bottom-hdr{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#94a3b8;padding:8px 14px;border-bottom:1px solid #f1f5f9}
.cr-bottom-body{padding:10px 14px;font-size:12.5px;color:#475569;line-height:1.6}
.cr-tag-list{display:flex;flex-wrap:wrap;gap:5px;padding:10px 14px}
.cr-tag{font-size:11px;background:#ede9fe;color:#5b21b6;border-radius:20px;padding:2px 9px;font-weight:500}
.cr-color-swatch{display:inline-flex;align-items:center;gap:8px;font-size:13px}
.cr-color-dot{width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.cr-locked-notice{display:flex;align-items:center;gap:7px;font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:5px 12px;flex-shrink:0}

/* ── View cards (Vínculos + tabs) ────────────────── */
.vk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:16px}
.vk-card{display:flex;align-items:center;gap:14px;border-radius:12px;padding:16px 18px;border:1px solid transparent;transition:box-shadow 150ms}
.vk-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.vk-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vk-card-body{flex:1;min-width:0}
.vk-card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;opacity:.8}
.vk-card-val{font-size:13.5px;font-weight:600;line-height:1.3;word-break:break-word}
.vk-card-val.empty{font-style:italic;opacity:.45;font-weight:400;font-size:12px}
.vk-green{background:#ecfdf5;border-color:#a7f3d0}
.vk-green .vk-card-icon{background:#d1fae5;color:#059669}
.vk-green .vk-card-lbl{color:#065f46}
.vk-green .vk-card-val{color:#064e3b}
.vk-blue{background:#eff6ff;border-color:#bfdbfe}
.vk-blue .vk-card-icon{background:#dbeafe;color:#2563eb}
.vk-blue .vk-card-lbl{color:#1e40af}
.vk-blue .vk-card-val{color:#1e3a8a}
.vk-purple{background:#f5f3ff;border-color:#ddd6fe}
.vk-purple .vk-card-icon{background:#ede9fe;color:#7c3aed}
.vk-purple .vk-card-lbl{color:#5b21b6}
.vk-purple .vk-card-val{color:#4c1d95}
.vk-amber{background:#fffbeb;border-color:#fde68a}
.vk-amber .vk-card-icon{background:#fef3c7;color:#d97706}
.vk-amber .vk-card-lbl{color:#92400e}
.vk-amber .vk-card-val{color:#78350f}
.vk-slate{background:#f8fafc;border-color:#e2e8f0}
.vk-slate .vk-card-icon{background:#f1f5f9;color:#475569}
.vk-slate .vk-card-lbl{color:#475569}
.vk-slate .vk-card-val{color:#1e293b}
.vk-teal{background:#f0fdfa;border-color:#99f6e4}
.vk-teal .vk-card-icon{background:#ccfbf1;color:#0d9488}
.vk-teal .vk-card-lbl{color:#134e4a}
.vk-teal .vk-card-val{color:#0f3c38;font-family:var(--mono);font-size:13px}
.vk-section{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:4px}
.vk-section::after{content:'';flex:1;height:1px;background:#e2e8f0}
.ref-url-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:14px}
.ref-url-card-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#475569;border-left:3px solid #2563eb}
.ref-url-card-body{display:flex;align-items:flex-start;gap:8px;padding:12px 16px;font-family:var(--mono);font-size:12.5px;color:#0f172a;word-break:break-all;background:#fff}
.ref-url-card-empty{padding:14px 16px;color:#94a3b8;font-style:italic;font-size:12px}
.ref-url-actions{display:flex;gap:6px;padding:8px 12px;background:#f8fafc;border-top:1px solid #f1f5f9}
.vk-ver-hdr{display:flex;align-items:center;justify-content:space-between;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.vk-ver-main{font-size:28px;font-weight:800;font-family:var(--mono);color:#064e3b;line-height:1}
.vk-ver-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#059669;margin-bottom:4px}

/* ── Form ─────────────────────────────────────────── */
.gfcr-form-hdr{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.gfcr-form-hdr-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.gfcr-form-hdr-sub{font-size:12px;color:var(--text-m)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:14px}
.form-grid.cols2{grid-template-columns:1fr 1fr}
.form-grid.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:#374151 !important;letter-spacing:.3px}
.form-label .req{color:#dc2626;margin-left:2px}
.form-desc{font-size:10.5px;color:var(--text-l);line-height:1.4;margin-top:1px}
.form-control{background:#f8fafc !important;border:1px solid #e2e8f0 !important;border-radius:7px;padding:8px 11px;font-size:13px;color:#0f172a !important;outline:none;transition:border-color 150ms,box-shadow 150ms;font-family:var(--font);width:100%}
.form-control:focus{background:#ffffff !important;border-color:#94a3b8 !important;box-shadow:0 0 0 3px rgba(71,85,105,.10) !important}
textarea.form-control{resize:vertical;min-height:90px;line-height:1.6}
select.form-control{cursor:pointer}
.form-check{display:flex;align-items:center;gap:8px;padding:8px 0}
.form-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.form-check label{font-size:13px;color:var(--text);cursor:pointer}
.gfcr-form-foot{padding:12px 24px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-shrink:0}
.btn-cancel{background:var(--surface);color:var(--text-m);border:1px solid var(--border);border-radius:7px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:all 150ms}
.btn-cancel:hover{background:var(--surface2)}
.btn-save{display:flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background 150ms}
.btn-save:hover{background:var(--primary-h)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── Icon picker ──────────────────────────────────── */
.icon-picker-wrap{position:relative}
.icon-picker-trigger{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  background:#f8fafc !important;border:1px solid #e2e8f0 !important;
  border-radius:7px;padding:8px 11px;transition:border-color 150ms;user-select:none
}
.icon-picker-trigger:hover{border-color:#94a3b8 !important}
.icon-picker-trigger-name{flex:1;font-size:13px}
.icon-picker-panel{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:300;
  background:#fff;border:1px solid var(--border);border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.13);overflow:hidden
}
.icon-picker-search-bar{
  display:flex;align-items:center;gap:7px;
  padding:9px 12px;border-bottom:1px solid #f1f5f9
}
.icon-picker-search-bar input{flex:1;border:none;outline:none;font-size:13px;color:#0f172a;background:transparent}
.icon-picker-close{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;color:var(--text-l)}
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:3px;padding:8px;max-height:196px;overflow-y:auto}
.icon-grid-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 3px;border-radius:5px;cursor:pointer;transition:background 100ms;border:1px solid transparent}
.icon-grid-item:hover{background:#f1f5f9;border-color:#e2e8f0}
.icon-grid-item.selected{background:#dbeafe;border-color:#93c5fd}
.icon-grid-item span{font-size:8.5px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:38px;text-align:center}

/* ── Toast ────────────────────────────────────────── */
#gfcr-toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.12);pointer-events:auto;min-width:270px;max-width:380px;animation:toastIn 220ms ease}
.toast.success{background:#f0fdf4;color:#065f46;border-color:#a7f3d0}
.toast.error{background:#fef2f2;color:#991b1b;border-color:#fca5a5}
.toast.info{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.toast-icon{flex-shrink:0}
.toast-msg{flex:1;line-height:1.4}
.toast-close{flex-shrink:0;background:none;border:none;cursor:pointer;color:inherit;opacity:.4;padding:2px;display:flex;align-items:center;border-radius:4px;transition:opacity 150ms}
.toast-close:hover{opacity:.8}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(6px)}}
.toast.leaving{animation:toastOut 180ms ease forwards}

/* ── Loading ──────────────────────────────────────── */
.gfcr-loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-l)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 700ms linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Frappe modal override ────────────────────────── */
.modal .modal-content{background:#fff !important;border:none !important;border-radius:12px !important;box-shadow:0 20px 60px rgba(0,0,0,.18) !important;overflow:hidden}
.modal .modal-header{background:var(--primary) !important;padding:14px 20px !important;border-bottom:none !important}
.modal .modal-header .modal-title,.modal .modal-header h4,.modal .modal-header h5{color:#f8fafc !important;font-size:14px !important;font-weight:600 !important}
.modal .modal-header .close,.modal .modal-header .btn-modal-close{color:#94a3b8 !important;opacity:1 !important;text-shadow:none !important}
.modal .modal-header .close:hover{color:#fff !important}
.modal .modal-body{color:#1e293b !important;background:#fff !important;padding:20px !important;font-size:13.5px !important;line-height:1.6 !important}
.modal .modal-footer{border-top:1px solid #e2e8f0 !important;background:#f8fafc !important;padding:12px 16px !important}
.modal .modal-footer .btn-primary{background:var(--primary) !important;border-color:var(--primary) !important;color:#fff !important}
.modal .modal-footer .btn-default,.modal .modal-footer .btn-secondary{background:#fff !important;border-color:#e2e8f0 !important;color:#475569 !important}

@media(max-width:700px){
  .gfcr-sb{width:100%;position:absolute;z-index:50;top:var(--header);bottom:0;transform:translateX(-100%);transition:transform 200ms}
  .gfcr-sb.open{transform:translateX(0)}
  :root{--sidebar:100%}
}

/* ── Btn accent (Submeter) ────────────────────────── */
.btn-act.btn-accent{background:#059669;color:#fff;border-color:transparent}
.btn-act.btn-accent:hover{background:#047857}

/* ── Aba Vínculos — layout ────────────────────────── */
.cr-links-layout{display:flex;gap:14px;height:100%;min-height:340px;padding:0}
.cr-tree-panel{flex:2;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-width:0}
.cr-tree-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fafafa}
.cr-tree-title{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.cr-tree-title .req{color:#dc2626;font-size:12px}
.cr-tree-search{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:7px 10px;transition:border-color 150ms}
.cr-tree-search:focus-within{border-color:#94a3b8;box-shadow:0 0 0 3px rgba(71,85,105,.07)}
.cr-tree-search input{flex:1;border:none;outline:none;background:transparent;font-size:12.5px;color:#0f172a;min-width:0}
.cr-tree-search input::placeholder{color:#94a3b8}
.cr-tree-sel-pill{margin-top:8px;display:flex;align-items:center;gap:7px;background:#dbeafe;border:1px solid #93c5fd;border-radius:6px;padding:6px 10px;font-size:12px;color:#1e40af}
.cr-tree-sel-pill .clear-sel{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;color:#3b82f6;margin-left:auto;border-radius:4px;transition:background 100ms}
.cr-tree-sel-pill .clear-sel:hover{background:rgba(59,130,246,.15)}
.cr-tree-body{flex:1;overflow-y:auto;padding:6px 4px}
.cr-tree-body::-webkit-scrollbar{width:4px}
.cr-tree-body::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
/* nós da árvore */
.cg-node{display:flex;align-items:flex-start;gap:3px;padding:5px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all 100ms;margin-bottom:1px}
.cg-node:hover{background:#f1f5f9;border-color:#e2e8f0}
.cg-node.selected{background:#dbeafe;border-color:#93c5fd}
.cg-toggle{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:4px;margin-top:2px;cursor:pointer;transition:background 100ms}
.cg-toggle:hover{background:#e2e8f0}
.cg-toggle-icon{transition:transform 150ms;color:#94a3b8}
.cg-toggle-icon.expanded{transform:rotate(90deg)}
.cg-leaf-dot{width:5px;height:5px;border-radius:50%;background:#d1d5db;margin:0 1px}
.cg-icon{flex-shrink:0;margin-top:2px;color:#94a3b8}
.cg-node.selected .cg-icon{color:#3b82f6}
.cg-content{flex:1;min-width:0}
.cg-name{font-size:12.5px;font-weight:500;color:#1e293b;line-height:1.3}
.cg-node.selected .cg-name{color:#1d4ed8;font-weight:600}
.cg-order{display:inline-flex;font-size:10px;font-weight:600;color:#64748b;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:0px 5px;margin-left:5px;font-family:var(--mono);vertical-align:middle}
.cg-desc{font-size:10.5px;color:#94a3b8;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cg-breadcrumb{font-size:10px;color:#94a3b8;margin-top:2px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cg-empty{text-align:center;color:#94a3b8;font-size:12px;padding:28px 16px;line-height:1.6}
/* painel direito */
.cr-links-right{flex:1;display:flex;flex-direction:column;gap:12px;min-width:200px;max-width:280px;overflow-y:auto}
.cr-links-right-hdr{font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px;padding-bottom:8px;border-bottom:1px solid var(--border)}
</style>
{% endblock %}

{% block page_content %}
<div id="gfcr">

  <header class="gfcr-hdr">
    <div class="gfcr-hdr-logo">GF</div>
    <div>
      <div class="gfcr-hdr-title">GF Content Registry</div>
    </div>
    <div class="gfcr-hdr-sub">Registro Central de Conteúdos</div>
    <div class="gfcr-hdr-sep"></div>
    <a class="gfcr-hdr-atlas" href="/gf-atlas">
      <i data-lucide="layout-dashboard" style="width:13px;height:13px"></i>
      Wiki Hub
    </a>
    <div class="gfcr-hdr-user">
      <div class="gfcr-hdr-avatar" id="gfcr-avatar">GF</div>
      <span id="gfcr-username">...</span>
    </div>
  </header>

  <div class="gfcr-body">

    <aside class="gfcr-sb" id="gfcr-sb">
      <div class="gfcr-sb-top">
        <div class="gfcr-sb-search">
          <i data-lucide="search" style="width:14px;height:14px"></i>
          <input type="text" placeholder="Buscar registros..." id="gfcr-search" autocomplete="off">
        </div>
      </div>
      <div class="gfcr-sb-filters" id="gfcr-filters">
        <span class="gfcr-sb-filter active" data-status="">Todos</span>
        <span class="gfcr-sb-filter" data-status="Draft">Draft</span>
        <span class="gfcr-sb-filter" data-status="Em Teste">Em Teste</span>
        <span class="gfcr-sb-filter" data-status="Submetido">Submetidos</span>
        <span class="gfcr-sb-filter" data-status="Obsoleto">Obsoletos</span>
      </div>
      <div class="gfcr-sb-list" id="gfcr-list">
        <div class="gfcr-loading"><div class="spinner"></div><span>Carregando...</span></div>
      </div>
      <div class="gfcr-sb-foot">
        <button class="btn-new-cr" id="btn-new-cr">
          <i data-lucide="plus" style="width:15px;height:15px"></i>
          Novo Registro
        </button>
      </div>
    </aside>

    <main class="gfcr-main" id="gfcr-main">
      <div class="gfcr-loading" style="flex:1">
        <div class="spinner"></div>
        <span>Inicializando...</span>
      </div>
    </main>

  </div>
</div>

<div id="gfcr-toast"></div>

<script>
/* ════════════════════════════════════════════════════
   GF Content Registry App
   ════════════════════════════════════════════════════ */

const TABS = [
  { id:'general',    label:'Geral',         icon:'info' },
  { id:'links',      label:'Vínculos',      icon:'link-2' },
  { id:'reference',  label:'Referência',    icon:'globe' },
  { id:'visual',     label:'Apresentação',  icon:'palette' },
  { id:'config',     label:'Configurações', icon:'settings-2' },
  { id:'versioning', label:'Versionamento', icon:'git-branch' },
];

const STATUS_COLORS = {
  'Draft':'draft','Em Desenvolvimento':'dev','Em Teste':'test',
  'Submetido':'submetido','Obsoleto':'obsoleto','Arquivado':'arquivado'
};
const STATUSES = ['Draft','Em Desenvolvimento','Em Teste','Submetido','Obsoleto','Arquivado'];

const ITEM_TYPES = ['WEB_PAGE','REPORT','DASHBOARD','PDF','HTML','DOCUMENT','APPLICATION','WORKFLOW','EXTERNAL_LINK','API','SCRIPT','OTHER'];
const ITEM_TYPE_LABELS = {'WEB_PAGE':'Web Page','REPORT':'Relatório','DASHBOARD':'Dashboard','PDF':'PDF','HTML':'HTML','DOCUMENT':'Documento','APPLICATION':'Aplicação','WORKFLOW':'Workflow','EXTERNAL_LINK':'Link Externo','API':'API','SCRIPT':'Script','OTHER':'Outro'};
const ITEM_TYPE_ICONS  = {'WEB_PAGE':'globe','REPORT':'bar-chart-2','DASHBOARD':'layout-dashboard','PDF':'file-text','HTML':'code-2','DOCUMENT':'file','APPLICATION':'app-window','WORKFLOW':'git-merge','EXTERNAL_LINK':'external-link','API':'zap','SCRIPT':'terminal','OTHER':'more-horizontal'};

const REQUIRED_FIELDS = [
  ['title','Título'],['internal_name','Internal Name'],
  ['item_type','Tipo do Item'],['content_group','Grupo de Conteúdo'],
  ['access_group','Grupo de Acesso'],['skill','Skill'],
];

const LUCIDE_ICONS = [
  'activity','alert-circle','alert-triangle','align-left','anchor','app-window',
  'archive','arrow-down','arrow-left','arrow-right','arrow-up','award',
  'bar-chart','bar-chart-2','bell','bookmark','book-open','box','braces','briefcase',
  'building','calculator','calendar','check','check-circle','clipboard','clipboard-list',
  'clock','cloud','code','code-2','copy','cpu','credit-card','database',
  'download','edit','edit-2','external-link','eye','factory','file','file-check',
  'file-code','file-plus','file-text','filter','flag','folder','gauge',
  'git-branch','git-merge','globe','hash','heart','help-circle','home',
  'image','inbox','info','key','landmark','layers','layout','layout-dashboard',
  'link','link-2','list','lock','mail','map','message-circle','minus',
  'monitor','more-horizontal','move','network','package','palette','percent',
  'phone','pie-chart','play','plus','printer','receipt','refresh-cw',
  'route','save','search','send','server','settings','settings-2','share-2',
  'shield','shield-check','shopping-cart','sliders','star','tag','target',
  'terminal','trash-2','trending-up','truck','type','unlock',
  'upload','user','users','wrench','x','x-circle','zap','zoom-in','zoom-out'
];

class GFContentRegistryApp {
  constructor() {
    this.records         = [];
    this.selected        = null;
    this.mode            = 'empty';
    this.activeTab       = 0;
    this.editData        = {};
    this.filterQ         = '';
    this.filterSt        = '';
    this._saving         = false;
    this._contentGroups  = [];
    this._accessGroups   = [];
    this._skills         = [];
    this._webPages       = [];
    this._cgExpanded     = new Set();
    this._cgSearchQuery  = '';
  }

  async init() {
    try { this._setupUser(); }    catch(e) {}
    try { this._bindSidebar(); } catch(e) {}
    try { this._bindDocClick(); } catch(e) {}
    await Promise.all([
      this._loadRecords().catch(() => { this.records = []; try { this._renderList(); } catch(_) {} }),
      this._loadLinkOptions().catch(() => {})
    ]);
    try { this._renderEmpty(); } catch(e) {
      const $m = document.getElementById('gfcr-main');
      if ($m) $m.innerHTML = `<div style="padding:40px;color:#dc2626">Erro ao inicializar: ${e.message}</div>`;
    }
    if (window.lucide) try { lucide.createIcons({ attrs:{ style:'display:block' } }); } catch(e) {}
  }

  _setupUser() {
    const full = frappe.session.user_fullname || frappe.session.user || 'Usuário';
    const init = full.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase() || 'GF';
    const $av = document.getElementById('gfcr-avatar');
    const $un = document.getElementById('gfcr-username');
    if ($av) $av.textContent = init;
    if ($un) $un.textContent = full.split(' ')[0];
  }

  // ── Load Records ──────────────────────────────────
  _loadRecords() {
    return new Promise((resolve) => {
      const done = (data) => {
        clearTimeout(timer);
        this.records = data || [];
        try { this._renderList(); } catch(e) {}
        resolve();
      };
      const timer = setTimeout(() => done([]), 6000);
      try {
        frappe.call({
          method: 'frappe.client.get_list',
          args: {
            doctype: 'GF Content Registry',
            fields: ['name','title','internal_name','item_type','status','version',
                     'content_group','skill','description','tags','modified'],
            order_by: 'modified desc',
            limit_page_length: 2000
          },
          callback: (r) => done((r && r.message) ? r.message : []),
          error:    ()  => done([])
        });
      } catch(e) { done([]); }
    });
  }

  // ── Load Link Options ─────────────────────────────
  _loadLinkOptions() {
    const load = (doctype, fields) => new Promise(resolve => {
      frappe.call({
        method: 'frappe.client.get_list',
        args: { doctype, fields, order_by: 'name asc', limit_page_length: 2000 },
        callback: r => resolve((r && r.message) || []),
        error: () => resolve([])
      });
    });
    return Promise.all([
      load('GF Content Group', ['name','display_name','parent_group','description','icon','sort_order']),
      load('GF Access Group',  ['name','display_name']),
      load('GF Skill',         ['name','skill_name']),
      load('Web Page',         ['name','title']),
    ]).then(([cg, ag, sk, wp]) => {
      this._contentGroups = cg;
      this._accessGroups  = ag;
      this._skills        = sk;
      this._webPages      = wp;
      // Expande todos os nós raiz por padrão
      this._cgExpanded = new Set(cg.filter(n => !n.parent_group).map(n => n.name));
    });
  }

  // ── Bind Sidebar ──────────────────────────────────
  _bindSidebar() {
    document.getElementById('gfcr-search').addEventListener('input', e => {
      this.filterQ = e.target.value.toLowerCase().trim();
      this._renderList();
    });
    document.getElementById('gfcr-filters').addEventListener('click', e => {
      const f = e.target.closest('.gfcr-sb-filter');
      if (!f) return;
      document.querySelectorAll('.gfcr-sb-filter').forEach(x=>x.classList.remove('active'));
      f.classList.add('active');
      this.filterSt = f.dataset.status;
      this._renderList();
    });
    document.getElementById('btn-new-cr').addEventListener('click', () => this._startNew());
  }

  // Fecha icon picker ao clicar fora
  _bindDocClick() {
    document.addEventListener('click', (e) => {
      const wrap = document.getElementById('icon-picker-wrap');
      if (wrap && !wrap.contains(e.target)) this._closeIconPicker();
    });
  }

  // ── Render list ───────────────────────────────────
  _renderList() {
    const $list = document.getElementById('gfcr-list');
    if (!$list) return;
    let items = this.records || [];
    if (this.filterQ) {
      items = items.filter(r =>
        (r.title||'').toLowerCase().includes(this.filterQ) ||
        (r.internal_name||'').toLowerCase().includes(this.filterQ) ||
        (r.item_type||'').toLowerCase().includes(this.filterQ) ||
        (r.tags||'').toLowerCase().includes(this.filterQ) ||
        (r.description||'').toLowerCase().includes(this.filterQ)
      );
    }
    if (this.filterSt) items = items.filter(r => r.status === this.filterSt);
    if (!items.length) {
      $list.innerHTML = `<div class="gfcr-sb-empty">Nenhum registro encontrado.</div>`;
      return;
    }
    $list.innerHTML = items.map(r => {
      const stCls  = STATUS_COLORS[r.status] || 'draft';
      const active = this.selected && this.selected.name === r.name ? ' active' : '';
      const typeIcon = ITEM_TYPE_ICONS[r.item_type] || 'file';
      const typeLbl  = ITEM_TYPE_LABELS[r.item_type] || (r.item_type||'');
      return `<div class="cr-card${active}" data-name="${this._esc(r.name)}"
                   onclick="app.selectRecord('${this._esc(r.name)}')">
        <div class="cr-card-top">
          <div class="cr-card-name">${this._esc(r.title||r.name)}</div>
          <div class="cr-card-meta">v${this._esc(r.version||'1.0.0')}</div>
        </div>
        <div class="cr-card-badges">
          <span class="badge badge-type"><i data-lucide="${typeIcon}" style="width:9px;height:9px;margin-right:3px"></i>${this._esc(typeLbl)}</span>
          ${r.status ? `<span class="badge badge-${stCls}">${this._esc(r.status)}</span>` : ''}
        </div>
        <div class="cr-card-desc">${this._esc(r.description||r.internal_name||'')}</div>
      </div>`;
    }).join('');
    if (window.lucide) try { lucide.createIcons({ attrs:{ style:'display:block' } }); } catch(e) {}
  }

  // ── Select record ─────────────────────────────────
  selectRecord(name) {
    const $main = document.getElementById('gfcr-main');
    $main.innerHTML = `<div class="gfcr-loading" style="flex:1"><div class="spinner"></div><span>Carregando...</span></div>`;
    frappe.call({
      method: 'frappe.client.get',
      args: { doctype:'GF Content Registry', name },
      callback: (r) => {
        if (r && r.message) {
          this.selected  = r.message;
          this.activeTab = 0;
          this.mode      = 'view';
          this._renderView();
          this._markActive(name);
        } else {
          this._toast('Registro não encontrado.','error');
          this._renderEmpty();
        }
      },
      error: () => { this._toast('Erro ao carregar o registro.','error'); this._renderEmpty(); }
    });
  }

  _markActive(name) {
    document.querySelectorAll('.cr-card').forEach(c => c.classList.toggle('active', c.dataset.name === name));
  }

  // ── Render empty ──────────────────────────────────
  _renderEmpty() {
    const $main = document.getElementById('gfcr-main');
    $main.innerHTML = `
      <div class="gfcr-empty">
        <div class="gfcr-empty-icon"><i data-lucide="book-open" style="width:32px;height:32px"></i></div>
        <h2>Registro de Conteúdos</h2>
        <p>Selecione um registro na lista ou crie um novo para começar.</p>
        <button class="btn-primary" onclick="app._startNew()">
          <i data-lucide="plus" style="width:15px;height:15px"></i> Criar Novo Registro
        </button>
      </div>`;
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this.selected = null;
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._syncNewBtn();
  }

  // ── Render view ───────────────────────────────────
  _renderView() {
    const s = this.selected;
    const isLocked = s.status === 'Obsoleto' || s.status === 'Arquivado';
    const isDraft  = !isLocked && s.status !== 'Submetido';
    const stCls    = STATUS_COLORS[s.status] || 'draft';
    const typeIcon = ITEM_TYPE_ICONS[s.item_type] || 'file';
    const typeLbl  = ITEM_TYPE_LABELS[s.item_type] || (s.item_type||'');
    const modified = s.modified ? s.modified.substring(0,16).replace('T',' ') : '—';
    const $main = document.getElementById('gfcr-main');

    $main.innerHTML = `
      <div class="gfcr-det-hdr">
        <div class="gfcr-det-hdr-top">
          <div class="gfcr-det-hdr-icon">
            <i data-lucide="${typeIcon}" style="width:22px;height:22px"></i>
          </div>
          <div class="gfcr-det-hdr-info">
            <div class="gfcr-det-hdr-name">${this._esc(s.title||s.name)}</div>
            <div class="gfcr-det-hdr-meta">
              <span class="badge badge-${stCls}">${this._esc(s.status||'Draft')}</span>
              ${s.item_type ? `<span class="badge badge-type">${this._esc(typeLbl)}</span>` : ''}
              ${s.content_group ? `<span class="badge badge-group">${this._esc(s.content_group)}</span>` : ''}
              <span class="sep">·</span>
              <span style="font-family:var(--mono);font-size:11px">v${this._esc(s.version||'1.0.0')}</span>
              <span class="sep">·</span>
              <span style="font-family:var(--mono);font-size:11px;color:#64748b">${this._esc(s.internal_name||s.name)}</span>
            </div>
          </div>
        </div>
        ${s.description ? `<div class="gfcr-det-hdr-desc">${this._esc(s.description)}</div>` : ''}
      </div>

      <div class="ver-panel">
        <div class="ver-panel-item"><i data-lucide="tag" style="width:12px;height:12px"></i><span>Versão</span><strong>v${this._esc(s.version||'1.0.0')}</strong></div>
        <div class="ver-panel-item"><i data-lucide="activity" style="width:12px;height:12px"></i><span>Status</span><strong>${this._esc(s.status||'—')}</strong></div>
        <div class="ver-panel-item"><i data-lucide="clock" style="width:12px;height:12px"></i><span>Modificado</span><strong>${modified}</strong></div>
        ${s.skill ? `<div class="ver-panel-item"><i data-lucide="zap" style="width:12px;height:12px"></i><span>Skill</span><strong>${this._esc(s.skill)}</strong></div>` : ''}
        ${s.content_group ? `<div class="ver-panel-item"><i data-lucide="folder" style="width:12px;height:12px"></i><span>Grupo</span><strong>${this._esc(s.content_group)}</strong></div>` : ''}
      </div>

      <div class="gfcr-toolbar">
        ${isLocked ? `
          <div class="cr-locked-notice">
            <i data-lucide="lock" style="width:13px;height:13px"></i>
            Este registro está <strong>&nbsp;${this._esc(s.status)}&nbsp;</strong> — somente duplicação é permitida.
          </div>
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act" onclick="app._duplicateRecord()"><i data-lucide="copy" style="width:13px;height:13px"></i> Duplicar</button>
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act btn-outline" onclick="app._startNew()"><i data-lucide="plus" style="width:13px;height:13px"></i> Novo Registro</button>
        ` : `
          <button class="btn-act btn-primary" onclick="app._startEdit()"><i data-lucide="edit-2" style="width:13px;height:13px"></i> Editar</button>
          ${isDraft ? `<button class="btn-act btn-accent" onclick="app._submitRecord()"><i data-lucide="send" style="width:13px;height:13px"></i> Submeter</button>` : ''}
          <button class="btn-act" onclick="app._duplicateRecord()"><i data-lucide="copy" style="width:13px;height:13px"></i> Duplicar</button>
          ${s.status === 'Submetido' ? `
          <button class="btn-act" onclick="app._newRevision()"><i data-lucide="git-branch" style="width:13px;height:13px"></i> Nova Revisão</button>
          <button class="btn-act btn-warn" onclick="app._markObsolete()"><i data-lucide="archive" style="width:13px;height:13px"></i> Marcar Obsoleto</button>
          ` : ''}
          ${isDraft ? `
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act btn-danger" onclick="app._deleteRecord()"><i data-lucide="trash-2" style="width:13px;height:13px"></i> Excluir</button>
          ` : ''}
          <div class="gfcr-toolbar-sep"></div>
          <button class="btn-act btn-outline" onclick="app._startNew()"><i data-lucide="plus" style="width:13px;height:13px"></i> Novo Registro</button>
        `}
      </div>

      ${this._buildTabBar()}
      <div class="gfcr-tab-body" id="gfcr-tab-body">${this._renderTabContent(this.activeTab)}</div>`;

    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this._syncNewBtn();
  }

  // ── Tab bar ───────────────────────────────────────
  _buildTabBar() {
    return `<div class="gfcr-tabs">${TABS.map((t,i)=>`
      <div class="gfcr-tab${i===this.activeTab?' active':''}" onclick="app._switchTab(${i})">
        <i data-lucide="${t.icon}" style="width:11px;height:11px"></i>${t.label}
      </div>`).join('')}</div>`;
  }

  _switchTab(idx) {
    this.activeTab = idx;
    document.querySelectorAll('.gfcr-tab').forEach((el,i) => el.classList.toggle('active', i===idx));
    const $body = document.getElementById('gfcr-tab-body');
    if ($body) {
      $body.innerHTML = (this.mode==='edit'||this.mode==='new') ? this._renderTabForm(idx) : this._renderTabContent(idx);
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    }
  }

  // ── Tab content (view) ────────────────────────────
  _renderTabContent(idx) {
    const s   = this.selected || {};
    const v   = (f) => s[f] !== undefined && s[f] !== null ? s[f] : '';
    const fld = (label, val, mono=false) => {
      const empty = val === '' || val === null || val === undefined;
      return `<div class="fld-box"><div class="fld-lbl">${label}</div>
        <div class="fld-val${mono?' mono':''}${empty?' empty':''}">${empty?'—':this._esc(String(val))}</div></div>`;
    };
    const chk = (label, val) => `<div class="fld-box"><div class="fld-lbl">${label}</div>
      <div class="fld-val check">${val
        ? `<i data-lucide="check-circle" style="width:14px;height:14px" class="fld-check-yes"></i><span>Sim</span>`
        : `<i data-lucide="x-circle" style="width:14px;height:14px" class="fld-check-no"></i><span>Não</span>`
      }</div></div>`;

    switch(idx) {
      case 0: {
        const tags = (v('tags')||'').split(',').map(t=>t.trim()).filter(Boolean);
        const typeIcon = ITEM_TYPE_ICONS[v('item_type')] || 'file';
        const typeLbl  = ITEM_TYPE_LABELS[v('item_type')] || v('item_type');
        const stCls    = STATUS_COLORS[v('status')] || 'draft';
        return `<div class="cr-view-body">
          <div class="cr-tech-strip">
            <div class="cr-tech-chip" style="font-family:var(--mono);font-size:11px">
              <i data-lucide="code-2" style="width:11px;height:11px"></i>
              ${this._esc(v('internal_name')||'—')}
              <button class="cr-tech-id-copy" title="Copiar Internal Name" onclick="app._copyText('${this._escJs(v('internal_name'))}',this)">
                <i data-lucide="copy" style="width:10px;height:10px"></i>
              </button>
            </div>
            <div class="cr-tech-sep"></div>
            <div class="cr-tech-chip">
              <i data-lucide="${typeIcon}" style="width:11px;height:11px"></i>${this._esc(typeLbl)}
            </div>
            <span class="badge badge-${stCls}">${this._esc(v('status')||'Draft')}</span>
            <div class="cr-tech-chip">
              <i data-lucide="tag" style="width:11px;height:11px"></i>v${this._esc(v('version')||'1.0.0')}
            </div>
            ${v('favorite') ? `<div class="cr-tech-chip fav-yes"><i data-lucide="star" style="width:11px;height:11px"></i>Favorito</div>` : ''}
            ${v('show_on_home') ? `<div class="cr-tech-chip"><i data-lucide="home" style="width:11px;height:11px"></i>Na Home</div>` : ''}
            ${v('route_url') ? `
            <div class="cr-tech-sep"></div>
            <div class="cr-tech-chip" style="font-family:var(--mono);font-size:11px;max-width:260px;overflow:hidden;text-overflow:ellipsis" title="${this._esc(v('route_url'))}">
              <i data-lucide="link" style="width:11px;height:11px;flex-shrink:0"></i>${this._esc(v('route_url'))}
            </div>` : ''}
          </div>

          ${v('description') ? `
          <div class="cr-desc-card">
            <div class="cr-desc-hdr"><i data-lucide="align-left" style="width:13px;height:13px"></i> Descrição</div>
            <div class="cr-desc-body">${this._esc(v('description'))}</div>
          </div>` : ''}

          <div class="cr-bottom-grid">
            ${v('content_group') ? `<div class="cr-bottom-card"><div class="cr-bottom-hdr">Grupo de Conteúdo</div><div class="cr-bottom-body">${this._esc(v('content_group'))}</div></div>` : ''}
            ${v('access_group')  ? `<div class="cr-bottom-card"><div class="cr-bottom-hdr">Grupo de Acesso</div><div class="cr-bottom-body">${this._esc(v('access_group'))}</div></div>` : ''}
            ${v('skill') ? `<div class="cr-bottom-card"><div class="cr-bottom-hdr">Skill</div>
              <div class="cr-bottom-body" style="display:flex;align-items:center;gap:5px">
                <i data-lucide="zap" style="width:12px;height:12px;color:#94a3b8;flex-shrink:0"></i>${this._esc(v('skill'))}
              </div></div>` : ''}
            ${v('web_page') ? `<div class="cr-bottom-card"><div class="cr-bottom-hdr">Web Page</div>
              <div class="cr-bottom-body" style="display:flex;align-items:center;gap:5px">
                <i data-lucide="globe" style="width:12px;height:12px;color:#94a3b8;flex-shrink:0"></i>
                ${this._esc(this._webPageTitle(v('web_page')))}
              </div></div>` : ''}
            ${v('responsible_user') ? `<div class="cr-bottom-card"><div class="cr-bottom-hdr">Responsável</div><div class="cr-bottom-body">${this._esc(v('responsible_user'))}</div></div>` : ''}
            ${tags.length ? `<div class="cr-bottom-card"><div class="cr-bottom-hdr">Tags</div>
              <div class="cr-tag-list">${tags.map(t=>`<span class="cr-tag">${this._esc(t)}</span>`).join('')}</div></div>` : ''}
          </div>
        </div>`;
      }

      case 1: {
        const mkCard = (cls, icon, label, val) =>
          `<div class="vk-card ${cls}">
            <div class="vk-card-icon"><i data-lucide="${icon}" style="width:20px;height:20px"></i></div>
            <div class="vk-card-body">
              <div class="vk-card-lbl">${label}</div>
              <div class="vk-card-val${!val?' empty':''}">${val ? this._esc(val) : '—'}</div>
            </div>
          </div>`;
        const wpTitle = v('web_page') ? this._webPageTitle(v('web_page')) : '';
        return `<div class="vk-grid">
          ${mkCard('vk-green',  'folder',  'Grupo de Conteúdo', v('content_group'))}
          ${mkCard('vk-blue',   'shield',  'Grupo de Acesso',   v('access_group'))}
          ${mkCard('vk-purple', 'zap',     'Skill',             v('skill'))}
          ${mkCard('vk-amber',  'globe',   'Web Page',          wpTitle)}
          ${mkCard('vk-slate',  'user',    'Responsável',       v('responsible_user'))}
        </div>`;
      }

      case 2: {
        const url = v('route_url');
        const ref = v('reference_doctype');
        const fullUrl = url ? (/^https?:\/\//.test(url) ? url : location.origin + url) : '';
        return `
          <div class="ref-url-card">
            <div class="ref-url-card-hdr">
              <i data-lucide="link-2" style="width:12px;height:12px"></i>URL / Rota
            </div>
            ${url ? `
              <div class="ref-url-card-body">
                <i data-lucide="link" style="width:12px;height:12px;color:#94a3b8;flex-shrink:0;margin-top:2px"></i>
                <span>${this._esc(url)}</span>
              </div>
              <div class="ref-url-actions">
                <button class="btn-act" style="font-size:11px;padding:4px 10px" onclick="app._copyText('${this._escJs(url)}',this)">
                  <i data-lucide="copy" style="width:11px;height:11px"></i>Copiar
                </button>
                <button class="btn-act" style="font-size:11px;padding:4px 10px" onclick="window.open('${this._escJs(fullUrl)}','_blank')">
                  <i data-lucide="external-link" style="width:11px;height:11px"></i>Abrir
                </button>
              </div>` : `<div class="ref-url-card-empty">Nenhuma URL informada</div>`}
          </div>
          <div class="vk-grid">
            <div class="vk-card vk-slate">
              <div class="vk-card-icon"><i data-lucide="file" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">DocType de Referência</div>
                <div class="vk-card-val${!ref?' empty':''}">${ref ? this._esc(ref) : '—'}</div>
              </div>
            </div>
          </div>`;
      }

      case 3: {
        const icon     = v('icon');
        const color    = v('color');
        const showHome = v('show_on_home');
        const fav      = v('favorite');
        return `
          <div class="vk-section"><i data-lucide="palette" style="width:11px;height:11px"></i>Aparência Visual</div>
          <div class="vk-grid">
            <div class="vk-card vk-purple">
              <div class="vk-card-icon">
                ${icon ? `<i data-lucide="${this._esc(icon)}" style="width:20px;height:20px"></i>` : `<i data-lucide="image" style="width:20px;height:20px;opacity:.35"></i>`}
              </div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Ícone</div>
                <div class="vk-card-val${!icon?' empty':''}">${icon ? this._esc(icon) : '— Não definido'}</div>
              </div>
            </div>
            <div class="vk-card vk-slate" style="${color?`border-left:4px solid ${this._esc(color)}`:''}">
              <div class="vk-card-icon" style="${color?`background:${this._esc(color)}22;color:${this._esc(color)}`:''}">
                <i data-lucide="palette" style="width:20px;height:20px"></i>
              </div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Cor</div>
                <div class="vk-card-val${!color?' empty':''}" style="${color?`color:${this._esc(color)};font-family:var(--mono);font-size:13px`:''}">
                  ${color ? this._esc(color) : '— Não definida'}
                </div>
              </div>
            </div>
          </div>
          <div class="vk-section"><i data-lucide="layout" style="width:11px;height:11px"></i>Exibição</div>
          <div class="vk-grid">
            <div class="vk-card ${showHome?'vk-green':'vk-slate'}">
              <div class="vk-card-icon"><i data-lucide="${showHome?'check-circle':'x-circle'}" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Exibir na Home</div>
                <div class="vk-card-val">${showHome ? 'Sim' : 'Não'}</div>
              </div>
            </div>
            <div class="vk-card ${fav?'vk-amber':'vk-slate'}">
              <div class="vk-card-icon"><i data-lucide="star" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Favorito</div>
                <div class="vk-card-val">${fav ? 'Sim' : 'Não'}</div>
              </div>
            </div>
          </div>`;
      }

      case 4: {
        const sortOrder = v('sort_order');
        const showHome  = v('show_on_home');
        const fav       = v('favorite');
        const hasSort   = sortOrder !== '' && sortOrder !== null && sortOrder !== undefined;
        return `
          <div class="vk-section"><i data-lucide="sliders" style="width:11px;height:11px"></i>Ordenação e Visibilidade</div>
          <div class="vk-grid">
            <div class="vk-card vk-teal">
              <div class="vk-card-icon"><i data-lucide="list" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Ordem de Exibição</div>
                <div class="vk-card-val${!hasSort?' empty':''}">${hasSort ? this._esc(String(sortOrder)) : '— Não definida'}</div>
              </div>
            </div>
            <div class="vk-card ${showHome?'vk-green':'vk-slate'}">
              <div class="vk-card-icon"><i data-lucide="home" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Exibir na Home</div>
                <div class="vk-card-val">${showHome ? 'Sim' : 'Não'}</div>
              </div>
            </div>
            <div class="vk-card ${fav?'vk-amber':'vk-slate'}">
              <div class="vk-card-icon"><i data-lucide="star" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Favorito</div>
                <div class="vk-card-val">${fav ? 'Sim' : 'Não'}</div>
              </div>
            </div>
          </div>`;
      }

      case 5: {
        const ver        = v('version') || '1.0.0';
        const reviewed   = v('last_reviewed_on');
        const prevVer    = v('previous_version');
        const intName    = v('internal_name');
        return `
          <div class="vk-ver-hdr">
            <div>
              <div class="vk-ver-label">Versão Atual</div>
              <div class="vk-ver-main">v${this._esc(ver)}</div>
            </div>
            <i data-lucide="git-branch" style="width:32px;height:32px;color:#059669;opacity:.5"></i>
          </div>
          <div class="vk-grid">
            <div class="vk-card vk-teal">
              <div class="vk-card-icon"><i data-lucide="clock" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Última Revisão</div>
                <div class="vk-card-val${!reviewed?' empty':''}">${reviewed ? this._esc(reviewed) : '— Não revisado'}</div>
              </div>
            </div>
            <div class="vk-card ${prevVer?'vk-blue':'vk-slate'}">
              <div class="vk-card-icon"><i data-lucide="git-branch" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Versão Anterior</div>
                <div class="vk-card-val${!prevVer?' empty':''}">${prevVer ? this._esc(prevVer) : '— Versão inicial'}</div>
              </div>
            </div>
            <div class="vk-card vk-slate">
              <div class="vk-card-icon"><i data-lucide="code-2" style="width:20px;height:20px"></i></div>
              <div class="vk-card-body">
                <div class="vk-card-lbl">Internal Name</div>
                <div class="vk-card-val" style="font-family:var(--mono);font-size:12.5px">${this._esc(intName||'—')}</div>
              </div>
            </div>
          </div>`;
      }

      default: return '';
    }
  }

  // ── Tab form (edit/new) ───────────────────────────
  _renderTabForm(idx) {
    const d   = this.editData;
    const inp = (f, ph='', type='text') =>
      `<input class="form-control" type="${type}" value="${this._esc(d[f]||'')}"
         placeholder="${ph}" oninput="app._fd('${f}',this.value)">`;
    const ta = (f, rows=3) =>
      `<textarea class="form-control" rows="${rows}"
         oninput="app._fd('${f}',this.value)">${this._esc(d[f]||'')}</textarea>`;
    const dd = (f, opts, valFn, lblFn) => {
      if (!opts.length) return `<select class="form-control" disabled><option>Carregando...</option></select>`;
      return `<select class="form-control" onchange="app._fd('${f}',this.value)">
        <option value="">Selecionar...</option>
        ${opts.map(o => {
          const val = valFn ? valFn(o) : o;
          const lbl = lblFn ? lblFn(o) : o;
          return `<option value="${this._esc(val)}"${d[f]===val?' selected':''}>${this._esc(lbl)}</option>`;
        }).join('')}
      </select>`;
    };
    const ddStatic = (f, opts, labelFn) =>
      `<select class="form-control" onchange="app._fd('${f}',this.value)">
        <option value="">Selecionar...</option>
        ${opts.map(o=>`<option value="${this._esc(o)}"${d[f]===o?' selected':''}>${this._esc(labelFn?labelFn(o):o)}</option>`).join('')}
      </select>`;
    const chk = (f, label) =>
      `<div class="form-check">
         <input type="checkbox" id="chk_${f}" ${d[f]?'checked':''}
                onchange="app._fd('${f}',this.checked?1:0)">
         <label for="chk_${f}">${label}</label>
       </div>`;
    const grp = (label, ctrl, desc='', req=false) =>
      `<div class="form-group">
         <label class="form-label">${label}${req?'<span class="req">*</span>':''}</label>
         ${ctrl}
         ${desc?`<div class="form-desc">${desc}</div>`:''}
       </div>`;
    const locked = (val, icon='lock', placeholder='') =>
      `<div class="form-control" style="background:#f1f5f9;color:${val?'#0f172a':'#94a3b8'};cursor:default;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12.5px">
         <i data-lucide="${icon}" style="width:12px;height:12px;flex-shrink:0;color:#94a3b8"></i>
         <span id="fld_${icon === 'lock' ? 'internal_name' : 'x'}">${this._esc(val) || placeholder}</span>
       </div>`;

    switch(idx) {
      case 0: return `
        <div class="form-grid cols2">
          ${grp('Título', inp('title','Ex: Relatório de Produção Mensal'), 'Nome principal do conteúdo.', true)}
          ${grp('Internal Name',
            `<div class="form-control" style="background:#f1f5f9;color:${d.internal_name?'#0f172a':'#94a3b8'};cursor:default;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12.5px">
               <i data-lucide="lock" style="width:12px;height:12px;flex-shrink:0;color:#94a3b8"></i>
               <span id="fld_internal_name">${this._esc(d.internal_name)||'Gerado automaticamente...'}</span>
             </div>`,
            this.mode==='new' ? 'Gerado automaticamente a partir do Título. Permanente após criação.' : 'Identificador técnico — permanente após criação.',
            true)}
        </div>
        <div class="form-grid">
          ${grp('Tipo do Item', ddStatic('item_type', ITEM_TYPES, k=>ITEM_TYPE_LABELS[k]||k), 'Categoria técnica do conteúdo.', true)}
          ${grp('Status', ddStatic('status', STATUSES), 'Situação atual do registro.', true)}
        </div>
        <div class="form-grid full">
          ${grp('Descrição', ta('description',4), 'Descrição detalhada do conteúdo.')}
          ${grp('Tags', inp('tags','Ex: produção, mensal, relatório'), 'Palavras-chave separadas por vírgula.')}
        </div>`;

      case 1: {
        const selNode  = this.editData.content_group
          ? (this._contentGroups||[]).find(n => n.name === this.editData.content_group)
          : null;
        const selLabel = selNode ? (selNode.display_name || selNode.name) : '';
        const selPath  = selNode ? this._getCGPath(selNode, this._contentGroups) : [];
        return `
        <div class="cr-links-layout">

          <!-- ── LEFT: árvore de Grupos de Conteúdo ── -->
          <div class="cr-tree-panel">
            <div class="cr-tree-header">
              <div class="cr-tree-title">
                <i data-lucide="folder-tree" style="width:13px;height:13px"></i>
                Grupo de Conteúdo <span class="req">*</span>
              </div>
              <div class="cr-tree-search">
                <i data-lucide="search" style="width:13px;height:13px;color:#94a3b8;flex-shrink:0"></i>
                <input type="text" id="cg-search-inp"
                       placeholder="Buscar por nome, código ou descrição..."
                       oninput="app._filterTree(this.value)" autocomplete="off"
                       value="${this._esc(this._cgSearchQuery||'')}">
                <button id="cg-search-clear"
                        onclick="app._clearCGSearch()"
                        style="display:${this._cgSearchQuery?'flex':'none'};background:none;border:none;cursor:pointer;align-items:center;color:#94a3b8;padding:0">
                  <i data-lucide="x" style="width:12px;height:12px"></i>
                </button>
              </div>
              <div id="cg-sel-pill" class="cr-tree-sel-pill" style="display:${selNode?'flex':'none'}">
                <i data-lucide="folder-check" style="width:13px;height:13px;flex-shrink:0"></i>
                <div style="flex:1;min-width:0;overflow:hidden">
                  <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(selLabel)}</div>
                  ${selPath.length > 1 ? `<div style="font-size:10px;opacity:.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(selPath.join(' › '))}</div>` : ''}
                </div>
                <button class="clear-sel" onclick="event.stopPropagation();app._clearCGSelection()" title="Limpar seleção">
                  <i data-lucide="x" style="width:11px;height:11px"></i>
                </button>
              </div>
            </div>
            <div class="cr-tree-body" id="cg-tree-body">
              ${this._renderCGTree()}
            </div>
          </div>

          <!-- ── RIGHT: outros vínculos ── -->
          <div class="cr-links-right">
            <div class="cr-links-right-hdr">
              <i data-lucide="link-2" style="width:11px;height:11px"></i> Outros Vínculos
            </div>
            ${grp('Grupo de Acesso',
              dd('access_group', this._accessGroups, o=>o.name, o=>o.display_name||o.name),
              'Controla quem pode visualizar este conteúdo.', true)}
            ${grp('Skill',
              dd('skill', this._skills, o=>o.name, o=>o.skill_name||o.name),
              'Skill corporativo associado.', true)}
            ${grp('Web Page',
              dd('web_page', this._webPages, o=>o.name, o=>o.title||o.name),
              'Página web do ERPNext vinculada.')}
            ${grp('Responsável',
              inp('responsible_user','usuario@empresa.com'),
              'Usuário responsável pelo conteúdo.')}
          </div>

        </div>`;
      }

      case 2: return `
        <div class="form-grid">
          ${grp('URL / Rota', inp('route_url','Ex: /app/query-report/timesheet'), 'Rota interna do ERPNext ou URL externa completa.')}
          ${grp('DocType de Referência', inp('reference_doctype','Ex: Timesheet'), 'DocType do Frappe relacionado a este conteúdo.')}
        </div>`;

      case 3: return `
        <div class="form-grid">
          ${grp('Ícone (Lucide)', this._renderIconPickerField(), 'Clique para selecionar um ícone Lucide.')}
          ${grp('Cor', inp('color','Ex: #059669','color'), 'Cor de destaque para o conteúdo.')}
          ${chk('show_on_home','Exibir na Home')}
          ${chk('favorite','Favorito')}
        </div>`;

      case 4: return `
        <div class="form-grid">
          ${grp('Ordem de Exibição', inp('sort_order','Ex: 10'), 'Menor valor = exibido primeiro.')}
          ${chk('show_on_home','Exibir na Home')}
          ${chk('favorite','Favorito')}
        </div>`;

      case 5: return `
        <div class="form-grid">
          ${grp('Versão',
            `<div class="form-control" style="background:#f1f5f9;color:#0f172a;cursor:default;display:flex;align-items:center;gap:6px;font-family:var(--mono)">
               <i data-lucide="tag" style="width:12px;height:12px;flex-shrink:0;color:#94a3b8"></i>
               ${this._esc(d.version||'1.0.0')}
             </div>`,
            'Gerada automaticamente — 1.0.0 na criação, incrementada a cada Nova Revisão.')}
          ${grp('Última Revisão',
            `<div class="form-control" style="background:#f1f5f9;color:${d.last_reviewed_on?'#0f172a':'#94a3b8'};cursor:default;display:flex;align-items:center;gap:6px">
               <i data-lucide="calendar" style="width:12px;height:12px;flex-shrink:0;color:#94a3b8"></i>
               ${d.last_reviewed_on ? this._esc(d.last_reviewed_on) : 'Preenchido automaticamente ao salvar'}
             </div>`,
            'Atualizado automaticamente a cada salvamento.')}
          ${grp('Versão Anterior',
            `<div class="form-control" style="background:#f1f5f9;color:${d.previous_version?'#0f172a':'#94a3b8'};cursor:default;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12.5px">
               <i data-lucide="git-branch" style="width:12px;height:12px;flex-shrink:0;color:#94a3b8"></i>
               ${d.previous_version ? this._esc(d.previous_version) : '— Versão inicial (sem origem)'}
             </div>`,
            'Preenchido automaticamente ao criar Nova Revisão — somente leitura.')}
        </div>`;

      default: return '';
    }
  }

  // ── Icon Picker ───────────────────────────────────
  _renderIconPickerField() {
    const icon = this.editData.icon || '';
    return `
      <div class="icon-picker-wrap" id="icon-picker-wrap">
        <div class="icon-picker-trigger" onclick="app._toggleIconPicker(event)">
          <div style="width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center">
            ${icon ? `<i data-lucide="${this._esc(icon)}" style="width:16px;height:16px"></i>`
                   : `<i data-lucide="smile" style="width:16px;height:16px;color:#94a3b8"></i>`}
          </div>
          <span class="icon-picker-trigger-name" style="color:${icon?'var(--text)':'var(--text-l)'}">
            ${icon ? this._esc(icon) : 'Clique para selecionar um ícone...'}
          </span>
          <i data-lucide="chevron-down" style="width:12px;height:12px;color:var(--text-l)"></i>
        </div>
        <div class="icon-picker-panel" id="icon-picker-panel" style="display:none">
          <div class="icon-picker-search-bar">
            <i data-lucide="search" style="width:13px;height:13px;color:var(--text-l)"></i>
            <input type="text" placeholder="Buscar ícone Lucide..." id="icon-search-inp"
                   oninput="app._filterIcons(this.value)" autocomplete="off">
            <button class="icon-picker-close" onclick="app._closeIconPicker()" title="Fechar">
              <i data-lucide="x" style="width:13px;height:13px"></i>
            </button>
          </div>
          <div class="icon-grid" id="icon-grid">
            ${this._renderIconGrid(icon, '')}
          </div>
        </div>
      </div>`;
  }

  _renderIconGrid(selected, query) {
    const q = (query||'').toLowerCase().trim();
    const filtered = q ? LUCIDE_ICONS.filter(n => n.includes(q)) : LUCIDE_ICONS;
    if (!filtered.length) return `<div style="grid-column:1/-1;text-align:center;color:#94a3b8;font-size:12px;padding:16px">Nenhum ícone encontrado.</div>`;
    return filtered.map(name => {
      const short = name.length > 10 ? name.substring(0,9)+'…' : name;
      return `<div class="icon-grid-item${selected===name?' selected':''}" onclick="app._selectIcon('${name}')" title="${name}">
        <i data-lucide="${name}" style="width:16px;height:16px"></i>
        <span>${short}</span>
      </div>`;
    }).join('');
  }

  _filterIcons(query) {
    const $grid = document.getElementById('icon-grid');
    if ($grid) {
      $grid.innerHTML = this._renderIconGrid(this.editData.icon||'', query);
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    }
  }

  _selectIcon(name) {
    this._fd('icon', name);
    // Atualiza preview no trigger
    const $trigger = document.querySelector('.icon-picker-trigger');
    if ($trigger) {
      $trigger.innerHTML = `
        <div style="width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center">
          <i data-lucide="${this._esc(name)}" style="width:16px;height:16px"></i>
        </div>
        <span class="icon-picker-trigger-name">${this._esc(name)}</span>
        <i data-lucide="chevron-down" style="width:12px;height:12px;color:var(--text-l)"></i>`;
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    }
    // Atualiza seleção na grid
    document.querySelectorAll('.icon-grid-item').forEach(el => {
      el.classList.toggle('selected', el.getAttribute('onclick') === `app._selectIcon('${name}')`);
    });
    this._closeIconPicker();
  }

  _toggleIconPicker(event) {
    if (event) event.stopPropagation();
    const panel = document.getElementById('icon-picker-panel');
    if (!panel) return;
    if (panel.style.display !== 'none') {
      panel.style.display = 'none';
    } else {
      panel.style.display = 'block';
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
      const inp = document.getElementById('icon-search-inp');
      if (inp) setTimeout(() => inp.focus(), 50);
    }
  }

  _closeIconPicker() {
    const panel = document.getElementById('icon-picker-panel');
    if (panel) panel.style.display = 'none';
  }

  // ── Render edit/new mode ──────────────────────────
  _renderEditMode() {
    const isNew    = this.mode === 'new';
    const isNewRev = isNew && !!this.editData._isNewRevision;
    const title    = isNewRev
      ? `Nova Revisão — ${this.editData.title || '—'}`
      : isNew ? 'Novo Registro'
      : `Editando: ${this.editData.title || this.editData.name || '—'}`;
    const saveLabel = isNewRev ? 'Salvar Nova Revisão' : 'Salvar Registro';
    const saveIcon  = isNewRev ? 'git-branch' : 'save';
    const $main = document.getElementById('gfcr-main');
    $main.innerHTML = `
      <div class="gfcr-form-hdr">
        <div>
          <div class="gfcr-form-hdr-title">${this._esc(title)}</div>
          <div class="gfcr-form-hdr-sub">Preencha os campos nas abas e clique em Salvar.</div>
        </div>
      </div>
      <div class="gfcr-toolbar">
        <button class="btn-act btn-primary" id="gfcr-btn-save" onclick="app._save()">
          <i data-lucide="${saveIcon}" style="width:13px;height:13px"></i> ${saveLabel}
        </button>
        <button class="btn-act" onclick="app._cancelEdit()">
          <i data-lucide="x" style="width:13px;height:13px"></i> Cancelar
        </button>
        ${this.mode !== 'new' ? `
        <div class="gfcr-toolbar-sep"></div>
        <button class="btn-act btn-outline" onclick="app._startNew()">
          <i data-lucide="plus" style="width:13px;height:13px"></i> Novo Registro
        </button>` : ''}
      </div>
      ${this._buildTabBar()}
      <div class="gfcr-tab-body" id="gfcr-tab-body" style="flex:1;overflow-y:auto">
        ${this._renderTabForm(this.activeTab)}
      </div>
      <div class="gfcr-form-foot">
        <button class="btn-cancel" onclick="app._cancelEdit()">Cancelar</button>
        <button class="btn-save" onclick="app._save()">
          <i data-lucide="${saveIcon}" style="width:14px;height:14px"></i> ${saveLabel}
        </button>
      </div>`;
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this._syncNewBtn();
  }

  // ── Field data ────────────────────────────────────
  // internal_name: auto-gerado do título apenas em modo 'new', sempre somente leitura.
  _fd(field, val) {
    this.editData[field] = val;
    if (field === 'title' && this.mode === 'new') {
      const ver  = (this.editData.version || '1.0.0').replace(/\./g, '_');
      const slug = val.toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g,'')
        .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
      const full = slug ? `${slug}_v${ver}` : '';
      this.editData.internal_name = full;
      const $el = document.getElementById('fld_internal_name');
      if ($el) $el.textContent = full || 'Gerado automaticamente...';
    }
  }

  _startEdit() {
    this.mode      = 'edit';
    this.activeTab = 0;
    this.editData  = Object.assign({}, this.selected);
    this._renderEditMode();
  }

  _startNew() {
    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = { status:'Draft', version:'1.0.0', show_on_home:0, favorite:0 };
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._renderEditMode();
  }

  _cancelEdit() {
    if (this.selected) {
      this.mode = 'view';
      this._renderView();
    } else {
      this.mode = 'empty'; // reset antes de _syncNewBtn()
      this._renderEmpty();
    }
  }

  // ── Save ──────────────────────────────────────────
  async _save() {
    if (this._saving) return;
    const d = this.editData;

    for (const [f, lbl] of REQUIRED_FIELDS) {
      if (!d[f] || !String(d[f]).trim()) {
        this._toast(`Campo obrigatório: ${lbl}`, 'error'); return;
      }
    }

    this._saving = true;
    const $btn = document.getElementById('gfcr-btn-save');
    const resetBtn = () => {
      if ($btn) { $btn.disabled = false; $btn.innerHTML = '<i data-lucide="save" style="width:14px;height:14px"></i> Salvar Registro'; if(window.lucide)lucide.createIcons({attrs:{style:'display:block'}}); }
      this._saving = false;
    };
    if ($btn) { $btn.disabled = true; $btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Salvando...'; }

    const originToObsolete = (this.mode === 'new') ? (d._originName || null) : null;

    const buildAndSave = (baseDoc) => {
      const method = this.mode === 'new' ? 'frappe.client.insert' : 'frappe.client.save';
      const doc = this.mode === 'new'
        ? Object.assign({ doctype:'GF Content Registry' }, d)
        : Object.assign({}, baseDoc, d, { doctype:'GF Content Registry', name:this.selected.name, modified:baseDoc.modified });

      delete doc._isNewRevision;
      delete doc._originName;

      frappe.call({
        method, args: { doc },
        callback: (r) => {
          if (r && r.message) {
            const saved = r.message;
            const finish = () => {
              this._saving = false;
              this._loadRecords().then(() => {
                this.selected  = saved;
                this.mode      = 'view';
                this.activeTab = 0;
                this._renderView();
                this._markActive(saved.name);
              });
            };
            if (originToObsolete) {
              frappe.call({
                method: 'frappe.client.set_value',
                args: { doctype:'GF Content Registry', name:originToObsolete, fieldname:'status', value:'Obsoleto' },
                callback: () => { this._toast('Revisão salva! Versão anterior marcada como Obsoleta.','success'); finish(); },
                error:    () => { this._toast('Revisão salva, mas não foi possível marcar a versão anterior.','info'); finish(); }
              });
            } else {
              this._toast('Registro salvo com sucesso!','success');
              finish();
            }
          } else {
            this._toast('Erro ao salvar o registro.','error'); resetBtn();
          }
        },
        error: () => { this._toast('Erro ao salvar o registro.','error'); resetBtn(); }
      });
    };

    if (this.mode === 'edit') {
      frappe.call({
        method: 'frappe.client.get',
