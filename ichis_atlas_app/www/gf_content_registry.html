        args: { doctype:'GF Content Registry', name:this.selected.name },
        callback: (r) => {
          if (!r.message) { this._toast('Erro ao carregar o registro.','error'); resetBtn(); return; }
          buildAndSave(r.message);
        },
        error: () => { this._toast('Erro ao carregar o registro.','error'); resetBtn(); }
      });
    } else {
      buildAndSave(null);
    }
  }

  _deleteRecord() {
    if (!this.selected) return;
    const name  = this.selected.name;
    const label = this.selected.title || name;
    frappe.confirm(`Excluir o registro "${label}"? Esta ação não pode ser desfeita.`, () => {
      frappe.call({
        method: 'frappe.client.delete',
        args: { doctype:'GF Content Registry', name },
        callback: () => {
          this._toast('Registro excluído.','info');
          this.selected = null;
          this._loadRecords().then(() => this._renderEmpty());
        },
        error: () => { this._toast('Erro ao excluir. Verifique permissões.','error'); }
      });
    });
  }

  _duplicateRecord() {
    if (!this.selected) return;
    const s = this.selected;
    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = Object.assign({}, s, {
      name:             undefined,
      title:            (s.title||'') + ' (Cópia)',
      internal_name:    (s.internal_name||'') + '_copia',
      status:           'Draft',
      version:          '1.0.0',
      previous_version: undefined,
      last_reviewed_on: undefined,
    });
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._renderEditMode();
    this._toast('Registro duplicado. Ajuste os campos e salve.','info');
  }

  // ── New Revision ──────────────────────────────────
  // Copia todos os campos, bumpa versão minor (1.0.0 → 1.1.0),
  // seta previous_version = nome do registro atual.
  // _save() marcará o original como Obsoleto após o insert.
  _newRevision() {
    if (!this.selected) return;
    const s   = this.selected;
    const ver = s.version || '1.0.0';
    const parts = ver.split('.').map(Number);
    parts[1] = (parts[1] || 0) + 1;
    parts[2] = 0;
    const newVer = parts.join('.');

    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = Object.assign({}, s, {
      name:             undefined,
      status:           'Draft',
      version:          newVer,
      previous_version: s.name,
      last_reviewed_on: undefined,
      _originName:      s.name,
      _isNewRevision:   true,
    });
    document.querySelectorAll('.cr-card').forEach(c=>c.classList.remove('active'));
    this._renderEditMode();
    this._toast(`Nova revisão v${newVer} criada a partir de v${ver}. Ajuste e salve.`,'info');
  }

  _markObsolete() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.confirm('Marcar este registro como Obsoleto?', () => {
      frappe.call({
        method: 'frappe.client.set_value',
        args: { doctype:'GF Content Registry', name, fieldname:'status', value:'Obsoleto' },
        callback: () => { this._toast('Registro marcado como Obsoleto.','info'); this.selectRecord(name); },
        error: () => { this._toast('Erro ao atualizar status.','error'); }
      });
    });
  }

  // ── Helpers ───────────────────────────────────────
  _webPageTitle(name) {
    if (!name) return '';
    const wp = (this._webPages||[]).find(w => w.name === name);
    return wp ? (wp.title || name) : name;
  }

  _copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      if (btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = '<i data-lucide="check" style="width:12px;height:12px"></i>';
        if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
        setTimeout(() => { btn.innerHTML = orig; if(window.lucide)lucide.createIcons({attrs:{style:'display:block'}}); }, 1500);
      }
    }).catch(() => this._toast('Erro ao copiar.','error'));
  }

  _toast(msg, type='info') {
    const icons = { success:'check-circle', error:'x-circle', info:'info' };
    const $t = document.getElementById('gfcr-toast');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `
      <i data-lucide="${icons[type]||'info'}" class="toast-icon" style="width:16px;height:16px;flex-shrink:0"></i>
      <span class="toast-msg">${this._esc(msg)}</span>
      <button class="toast-close" onclick="this.closest('.toast').remove()" title="Fechar">
        <i data-lucide="x" style="width:14px;height:14px"></i>
      </button>`;
    $t.appendChild(el);
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    setTimeout(() => { el.classList.add('leaving'); setTimeout(() => el.remove(), 200); }, 5000);
  }

  _syncNewBtn() {
    const btn = document.getElementById('btn-new-cr');
    if (!btn) return;
    btn.style.display = (this.mode === 'edit' || this.mode === 'new') ? 'none' : '';
  }

  // ── Submit ────────────────────────────────────────
  _submitRecord() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.confirm('Submeter este registro? Após submetido, utilize Nova Revisão para realizar alterações.', () => {
      frappe.call({
        method: 'frappe.client.set_value',
        args: { doctype:'GF Content Registry', name, fieldname:'status', value:'Submetido' },
        callback: () => { this._toast('Registro submetido com sucesso!','success'); this.selectRecord(name); },
        error:    () => { this._toast('Erro ao submeter o registro.','error'); }
      });
    });
  }

  // ── Content Group Tree ────────────────────────────
  _renderCGTree() {
    const nodes = this._contentGroups || [];
    const q     = (this._cgSearchQuery || '').toLowerCase().trim();
    if (!nodes.length) return `<div class="cg-empty"><i data-lucide="loader" style="width:14px;height:14px;margin-right:6px"></i>Carregando grupos...</div>`;
    if (q) return this._renderCGSearchResults(q, nodes);
    const roots = nodes
      .filter(n => !n.parent_group)
      .sort((a,b) => String(a.sort_order||'zzz').localeCompare(String(b.sort_order||'zzz')));
    if (!roots.length) return `<div class="cg-empty">Nenhum grupo disponível.</div>`;
    return roots.map(n => this._renderCGNode(n, nodes, 0)).join('');
  }

  _renderCGNode(node, all, depth) {
    const children = all
      .filter(n => n.parent_group === node.name)
      .sort((a,b) => String(a.sort_order||'zzz').localeCompare(String(b.sort_order||'zzz')));
    const hasKids  = children.length > 0;
    const expanded = this._cgExpanded.has(node.name);
    const selected = this.editData && this.editData.content_group === node.name;
    const pad      = 8 + depth * 18;
    const iconHtml = node.icon
      ? `<span class="cg-icon"><i data-lucide="${this._esc(node.icon)}" style="width:13px;height:13px"></i></span>`
      : '';
    return `<div>
      <div class="cg-node${selected?' selected':''}" style="padding-left:${pad}px"
           onclick="app._selectCGGroup('${this._escJs(node.name)}')">
        <span class="cg-toggle" onclick="event.stopPropagation();app._toggleCGNode('${this._escJs(node.name)}')">
          ${hasKids
            ? `<i data-lucide="chevron-right" class="cg-toggle-icon${expanded?' expanded':''}" style="width:13px;height:13px"></i>`
            : `<span class="cg-leaf-dot"></span>`}
        </span>
        ${iconHtml}
        <div class="cg-content">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px">
            <span class="cg-name">${this._esc(node.display_name||node.name)}</span>
            ${node.sort_order?`<span class="cg-order">${this._esc(String(node.sort_order))}</span>`:''}
          </div>
          ${node.description?`<div class="cg-desc">${this._esc((node.description||'').substring(0,80))}</div>`:''}
        </div>
      </div>
      ${hasKids&&expanded ? children.map(c=>this._renderCGNode(c,all,depth+1)).join('') : ''}
    </div>`;
  }

  _renderCGSearchResults(q, nodes) {
    const matches = nodes.filter(n =>
      (n.display_name||'').toLowerCase().includes(q) ||
      (n.name||'').toLowerCase().includes(q) ||
      (n.description||'').toLowerCase().includes(q) ||
      String(n.sort_order||'').toLowerCase().includes(q)
    );
    if (!matches.length) return `<div class="cg-empty">Nenhum grupo encontrado para "<strong>${this._esc(q)}</strong>".</div>`;
    return matches.map(n => {
      const path = this._getCGPath(n, nodes);
      const sel  = this.editData && this.editData.content_group === n.name;
      return `<div class="cg-node${sel?' selected':''}"
               onclick="app._selectCGGroup('${this._escJs(n.name)}')">
        <span class="cg-toggle"><span class="cg-leaf-dot"></span></span>
        ${n.icon?`<span class="cg-icon"><i data-lucide="${this._esc(n.icon)}" style="width:13px;height:13px"></i></span>`:''}
        <div class="cg-content">
          <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">
            <span class="cg-name">${this._esc(n.display_name||n.name)}</span>
            ${n.sort_order?`<span class="cg-order">${this._esc(String(n.sort_order))}</span>`:''}
          </div>
          ${path.length>1?`<div class="cg-breadcrumb">${this._esc(path.slice(0,-1).join(' › '))}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  _getCGPath(node, nodes) {
    const path = [];
    let cur = node;
    while (cur) {
      path.unshift(cur.display_name || cur.name);
      cur = cur.parent_group ? nodes.find(n => n.name === cur.parent_group) : null;
      if (path.length > 8) break;
    }
    return path;
  }

  _selectCGGroup(name) {
    this._fd('content_group', name);
    const node  = (this._contentGroups||[]).find(n => n.name === name);
    const label = node ? (node.display_name||node.name) : name;
    const path  = node ? this._getCGPath(node, this._contentGroups) : [label];
    const $pill = document.getElementById('cg-sel-pill');
    if ($pill) {
      $pill.innerHTML = `
        <i data-lucide="folder-check" style="width:13px;height:13px;flex-shrink:0"></i>
        <div style="flex:1;min-width:0;overflow:hidden">
          <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(label)}</div>
          ${path.length>1?`<div style="font-size:10px;opacity:.7;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this._esc(path.join(' › '))}</div>`:''}
        </div>
        <button class="clear-sel" onclick="event.stopPropagation();app._clearCGSelection()" title="Limpar seleção">
          <i data-lucide="x" style="width:11px;height:11px"></i>
        </button>`;
      $pill.style.display = 'flex';
      if (window.lucide) lucide.createIcons({attrs:{style:'display:block'}});
    }
    this._rerenderCGTree();
  }

  _clearCGSelection() {
    this._fd('content_group', '');
    const $pill = document.getElementById('cg-sel-pill');
    if ($pill) $pill.style.display = 'none';
    this._rerenderCGTree();
  }

  _toggleCGNode(name) {
    if (this._cgExpanded.has(name)) this._cgExpanded.delete(name);
    else this._cgExpanded.add(name);
    this._rerenderCGTree();
  }

  _filterTree(q) {
    this._cgSearchQuery = q;
    const $clear = document.getElementById('cg-search-clear');
    if ($clear) $clear.style.display = q ? 'flex' : 'none';
    this._rerenderCGTree();
  }

  _clearCGSearch() {
    this._cgSearchQuery = '';
    const $inp   = document.getElementById('cg-search-inp');
    const $clear = document.getElementById('cg-search-clear');
    if ($inp)   $inp.value = '';
    if ($clear) $clear.style.display = 'none';
    this._rerenderCGTree();
  }

  _rerenderCGTree() {
    const $body = document.getElementById('cg-tree-body');
    if (!$body) return;
    $body.innerHTML = this._renderCGTree();
    if (window.lucide) lucide.createIcons({attrs:{style:'display:block'}});
  }

  // ── Helpers ───────────────────────────────────────
  _esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  _escJs(s) {
    if (!s) return '';
    return String(s).replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  }
}

let app;
frappe.ready(function() {
  app = new GFContentRegistryApp();
  app.init();
});
</script>
{% endblock %}
