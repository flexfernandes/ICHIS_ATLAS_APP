{% extends "templates/web.html" %}

{% block head_include %}
<script src="/assets/ichis_atlas_app/js/lucide.min.js"></script>
<style>
/* ── Frappe container reset ───────────────────────── */
.page-content,.container,.container-fluid,.row{
  max-width:100%!important;padding-left:0!important;padding-right:0!important;
  margin-left:0!important;margin-right:0!important;width:100%!important
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1e293b;--primary-h:#0f172a;--primary-l:#334155;
  --primary-pale:#f1f5f9;
  --accent:#059669;--accent-h:#047857;--accent-l:#10b981;--accent-pale:#d1fae5;
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;
  --border:#e2e8f0;--border-h:#cbd5e1;
  --text:#0f172a;--text-m:#475569;--text-l:#94a3b8;
  --shadow-md:0 4px 12px rgba(0,0,0,.09);
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sidebar:272px;--header:56px
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:#080e1c;color:#e2e8f0;font-size:14px;line-height:1.5}

/* ═══ DARK THEME GLOBAL — paleta única para toda a página ══════ */
#gfcr{--bg:#080e1c;--surface:#0d1526;--surface2:#0b1320;--border:#162035;--border-h:#1e3a5f;--text:#e2e8f0;--text-m:#4b6a94;--text-l:#2d4a6d;--primary:#1e3a8a;--primary-h:#1d4ed8;--primary-l:#60a5fa;--primary-pale:#0f1e33;--shadow-md:0 4px 12px rgba(0,0,0,.4)}

/* ── Layout ───────────────────────────────────────── */
#gfcr{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Header ───────────────────────────────────────── */
.gfcr-hdr{height:var(--header);min-height:var(--header);display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(15,23,42,.22);z-index:100;flex-shrink:0}
.gfcr-hdr-logo{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.gfcr-hdr-title{font-weight:600;font-size:15px;letter-spacing:-.2px}
.gfcr-hdr-sub{font-size:11px;opacity:.55;margin-left:2px}
.gfcr-hdr-sep{flex:1}
.gfcr-hdr-user{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8}
.gfcr-hdr-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.gfcr-hdr-atlas{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;transition:background 150ms;text-decoration:none;color:#fff}
.gfcr-hdr-atlas:hover{background:rgba(255,255,255,.2)}

/* ── Body ─────────────────────────────────────────── */
.gfcr-body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ──────────────────────────────────────── */
.gfcr-sb{width:var(--sidebar);min-width:var(--sidebar);background:#0f172a;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow:hidden}
.gfcr-sb-top{padding:14px 14px 10px;flex-shrink:0}
.gfcr-sb-search{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;transition:border-color 150ms}
.gfcr-sb-search:focus-within{border-color:rgba(255,255,255,.25)}
.gfcr-sb-search input{border:none;outline:none;background:transparent;font-size:13px;color:#e2e8f0;flex:1;min-width:0}
.gfcr-sb-search input::placeholder{color:#475569}
.gfcr-sb-search svg{flex-shrink:0;color:#475569}
.gfcr-sb-filters{display:flex;gap:5px;padding:8px 14px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.gfcr-sb-filter{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.12);cursor:pointer;background:transparent;color:#94a3b8;transition:all 150ms;white-space:nowrap}
.gfcr-sb-filter.active{background:#334155;color:#e2e8f0;border-color:#475569}
.gfcr-sb-filter:hover:not(.active){background:rgba(255,255,255,.07);color:#cbd5e1}
.gfcr-sb-list{flex:1;overflow-y:auto;padding:8px}
.gfcr-sb-list::-webkit-scrollbar{width:4px}
.gfcr-sb-list::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
.gfcr-sb-empty{text-align:center;color:#475569;font-size:12px;padding:32px 16px;line-height:1.6}
.cr-card{border-radius:8px;padding:10px 11px;margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:all 150ms;background:transparent}
.cr-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.09)}
.cr-card.active{background:#1e293b;border-color:#334155}
.cr-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.cr-card-name{font-weight:600;font-size:12.5px;color:#cbd5e1;line-height:1.3}
.cr-card.active .cr-card-name{color:#93c5fd}
.cr-card-meta{font-size:10px;color:#475569;white-space:nowrap;margin-top:1px;font-family:var(--mono)}
.cr-card.active .cr-card-meta{color:#64748b}
.cr-card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.cr-card-desc{font-size:11px;color:#64748b;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.gfcr-sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.btn-new-cr{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;background:#059669;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;transition:background 150ms}
.btn-new-cr:hover{background:#047857}

/* ── Badges ───────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;line-height:1.4;white-space:nowrap}
.badge-draft{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.badge-dev{background:#dbeafe;color:#1d4ed8}
.badge-test{background:#fed7aa;color:#c2410c}
.badge-submetido{background:#e0e7ff;color:#3730a3}
.badge-obsoleto{background:#fef9c3;color:#854d0e}
.badge-arquivado{background:#fee2e2;color:#dc2626}
.badge-type{background:#ede9fe;color:#5b21b6}
.badge-group{background:#dbeafe;color:#1d4ed8}

/* ── Main ─────────────────────────────────────────── */
.gfcr-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Empty ────────────────────────────────────────── */
.gfcr-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px;text-align:center}
.gfcr-empty-icon{width:72px;height:72px;border-radius:20px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;color:var(--text-m)}
.gfcr-empty h2{font-size:20px;font-weight:700;color:var(--text)}
.gfcr-empty p{color:var(--text-m);font-size:13px;max-width:320px;line-height:1.6}
.gfcr-empty .btn-primary{display:flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background 150ms}
.gfcr-empty .btn-primary:hover{background:var(--primary-h)}

/* ── Detail header ────────────────────────────────── */
.gfcr-det-hdr{padding:14px 10px 10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.gfcr-det-hdr-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.gfcr-det-hdr-icon{width:44px;height:44px;border-radius:12px;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;color:var(--text-m);flex-shrink:0}
.gfcr-det-hdr-info{flex:1;min-width:0}
.gfcr-det-hdr-name{font-size:20px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px}
.gfcr-det-hdr-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gfcr-det-hdr-meta span{font-size:12px;color:var(--text-m)}
.gfcr-det-hdr-meta .sep{color:var(--border-h)}
.gfcr-det-hdr-desc{font-size:13px;color:var(--text-m);line-height:1.5;padding-top:8px;border-top:1px solid var(--border)}

/* ── Toolbar ──────────────────────────────────────── */
.gfcr-toolbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:9px 10px;background:var(--surface);flex-shrink:0}
.gfcr-toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
.btn-act{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-m);transition:all 150ms;white-space:nowrap}
.btn-act:hover{background:var(--surface2);border-color:var(--border-h)}
.btn-act:disabled{opacity:.45;cursor:not-allowed}
.btn-act.btn-primary{background:var(--primary);color:#fff;border-color:transparent}
.btn-act.btn-primary:hover{background:var(--primary-h)}
.btn-act.btn-outline{background:var(--surface);color:var(--primary);border-color:var(--primary-l)}
.btn-act.btn-outline:hover{background:var(--primary-pale)}
.btn-act.btn-danger{color:#dc2626}
.btn-act.btn-danger:hover{background:#fee2e2;border-color:#fca5a5}
.btn-act.btn-warn{color:#b45309}
.btn-act.btn-warn:hover{background:#fef3c7;border-color:#fde68a}

/* ── Meta panel ───────────────────────────────────── */
.ver-panel{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;font-size:12px}
.ver-panel-item{display:flex;align-items:center;gap:5px;color:var(--text-m)}
.ver-panel-item strong{font-weight:600;color:var(--text)}

/* ── Tabs ─────────────────────────────────────────── */
.gfcr-tabs{display:flex;background:var(--surface);border-bottom:1px solid #eef0f4;padding:0 10px;flex-shrink:0;overflow-x:auto}
.gfcr-tabs::-webkit-scrollbar{height:0}
.gfcr-tab{display:flex;align-items:center;gap:4px;padding:8px 10px;font-size:11.5px;font-weight:500;color:var(--text-m);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 150ms}
.gfcr-tab:hover{color:var(--text);background:var(--primary-pale)}
.gfcr-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* ── Tab body ─────────────────────────────────────── */
.gfcr-tab-body{flex:1;overflow-y:auto;padding:16px 10px;background:var(--bg)}
.gfcr-tab-body::-webkit-scrollbar{width:5px}
.gfcr-tab-body::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:4px}

/* ── Field display ────────────────────────────────── */
.fld-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:16px}
.fld-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.fld-lbl{font-size:10.5px;font-weight:600;color:var(--text-l);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.fld-val{font-size:13.5px;color:var(--text);line-height:1.5;word-break:break-word}
.fld-val.empty{color:var(--text-l);font-style:italic;font-size:12px}
.fld-val.mono{font-family:var(--mono);font-size:12.5px}
.fld-val.check{display:flex;align-items:center;gap:5px}
.fld-check-yes{color:var(--accent)}
.fld-check-no{color:var(--text-l)}

/* ── Content view layout ─────────────────────────── */
.cr-view-body{display:flex;flex-direction:column;gap:12px;padding:16px 10px;overflow-y:auto;flex:1}
.cr-tech-strip{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px}
.cr-tech-id{display:flex;align-items:center;gap:6px;background:#1e293b;color:#93c5fd;border-radius:6px;padding:4px 10px;font-family:var(--mono);font-size:11.5px}
.cr-tech-id-copy{background:none;border:none;cursor:pointer;padding:0 2px;color:#64748b;display:flex;align-items:center;transition:color 150ms}
.cr-tech-id-copy:hover{color:#93c5fd}
.cr-tech-sep{width:1px;height:14px;background:#e2e8f0;flex-shrink:0}
.cr-tech-chip{display:flex;align-items:center;gap:4px;font-size:11.5px;color:#475569;background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:3px 9px}
.cr-tech-chip.fav-yes{color:#b45309;background:#fffbeb;border-color:#fde68a}
.cr-desc-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.cr-desc-hdr{display:flex;align-items:center;gap:7px;background:#f8fafc;color:#475569;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:9px 16px;border-bottom:1px solid #e2e8f0;border-left:3px solid #059669}
.cr-desc-body{padding:14px 16px;font-size:13px;color:#374151;line-height:1.7;white-space:pre-wrap}
.cr-bottom-grid{display:flex;flex-direction:column;gap:8px}
.cr-bottom-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;display:flex;align-items:center;gap:14px;padding:9px 16px;transition:box-shadow 150ms}
.cr-bottom-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.06)}
.cr-bottom-hdr{width:170px;flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#94a3b8;padding-right:14px}
.cr-bottom-body{flex:1;font-size:13px;color:#1e293b;line-height:1.5;font-weight:600;word-break:break-word;min-width:0}
.cr-tag-list{display:flex;flex-wrap:wrap;gap:5px;padding:10px 14px}
.cr-tag{font-size:11px;background:#ede9fe;color:#5b21b6;border-radius:20px;padding:2px 9px;font-weight:500}
.cr-color-swatch{display:inline-flex;align-items:center;gap:8px;font-size:13px}
.cr-color-dot{width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.cr-locked-notice{display:flex;align-items:center;gap:7px;font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:5px 12px;flex-shrink:0}

/* ── View cards (Vínculos + tabs) ────────────────── */
.vk-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.vk-card{display:flex;align-items:center;gap:14px;border-radius:10px;padding:9px 16px;border:1px solid transparent;transition:box-shadow 150ms}
.vk-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.07)}
.vk-card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vk-card-body{flex:1;display:flex;align-items:center;gap:0;min-width:0}
.vk-card-lbl{width:170px;flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.75;line-height:1.3;padding-right:14px}
.vk-card-val{flex:1;font-size:13px;font-weight:600;line-height:1.4;word-break:break-word;min-width:0}
.vk-card-val.empty{font-style:italic;opacity:.4;font-weight:400;font-size:12px}
.vk-green{background:#ecfdf5;border-color:#a7f3d0}
.vk-green .vk-card-icon{background:#d1fae5;color:#059669}
.vk-green .vk-card-lbl{color:#065f46}
.vk-green .vk-card-val{color:#064e3b}
.vk-blue{background:#eff6ff;border-color:#bfdbfe}
.vk-blue .vk-card-icon{background:#dbeafe;color:#2563eb}
.vk-blue .vk-card-lbl{color:#1e40af}
.vk-blue .vk-card-val{color:#1e3a8a}
.vk-purple{background:#f5f3ff;border-color:#ddd6fe}
.vk-purple .vk-card-icon{background:#ede9fe;color:#7c3aed}
.vk-purple .vk-card-lbl{color:#5b21b6}
.vk-purple .vk-card-val{color:#4c1d95}
.vk-amber{background:#fffbeb;border-color:#fde68a}
.vk-amber .vk-card-icon{background:#fef3c7;color:#d97706}
.vk-amber .vk-card-lbl{color:#92400e}
.vk-amber .vk-card-val{color:#78350f}
.vk-slate{background:#f8fafc;border-color:#e2e8f0}
.vk-slate .vk-card-icon{background:#f1f5f9;color:#475569}
.vk-slate .vk-card-lbl{color:#475569}
.vk-slate .vk-card-val{color:#1e293b}
.vk-teal{background:#f0fdfa;border-color:#99f6e4}
.vk-teal .vk-card-icon{background:#ccfbf1;color:#0d9488}
.vk-teal .vk-card-lbl{color:#134e4a}
.vk-teal .vk-card-val{color:#0f3c38;font-family:var(--mono);font-size:13px}
.vk-section{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:4px}
.vk-section::after{content:'';flex:1;height:1px;background:#e2e8f0}
.ref-url-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:14px}
.ref-url-card-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#475569;border-left:3px solid #2563eb}
.ref-url-card-body{display:flex;align-items:flex-start;gap:8px;padding:12px 16px;font-family:var(--mono);font-size:12.5px;color:#0f172a;word-break:break-all;background:#fff}
.ref-url-card-empty{padding:14px 16px;color:#94a3b8;font-style:italic;font-size:12px}
.ref-url-actions{display:flex;gap:6px;padding:8px 12px;background:#f8fafc;border-top:1px solid #f1f5f9}
.vk-ver-hdr{display:flex;align-items:center;justify-content:space-between;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.vk-ver-main{font-size:28px;font-weight:800;font-family:var(--mono);color:#064e3b;line-height:1}
.vk-ver-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#059669;margin-bottom:4px}

/* ── Form ─────────────────────────────────────────── */
.gfcr-form-hdr{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.gfcr-form-hdr-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.gfcr-form-hdr-sub{font-size:12px;color:var(--text-m)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:14px}
.form-grid.cols2{grid-template-columns:1fr 1fr}
.form-grid.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:#374151 !important;letter-spacing:.3px}
.form-label .req{color:#dc2626;margin-left:2px}
.form-desc{font-size:10.5px;color:var(--text-l);line-height:1.4;margin-top:1px}
.form-control{background:#f8fafc !important;border:1px solid #e2e8f0 !important;border-radius:7px;padding:8px 11px;font-size:13px;color:#0f172a !important;outline:none;transition:border-color 150ms,box-shadow 150ms;font-family:var(--font);width:100%}
.form-control:focus{background:#ffffff !important;border-color:#94a3b8 !important;box-shadow:0 0 0 3px rgba(71,85,105,.10) !important}
textarea.form-control{resize:vertical;min-height:90px;line-height:1.6}
select.form-control{cursor:pointer}
.form-check{display:flex;align-items:center;gap:8px;padding:8px 0}
.form-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.form-check label{font-size:13px;color:var(--text);cursor:pointer}
.gfcr-form-foot{padding:12px 24px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-shrink:0}
.btn-cancel{background:var(--surface);color:var(--text-m);border:1px solid var(--border);border-radius:7px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:all 150ms}
.btn-cancel:hover{background:var(--surface2)}
.btn-save{display:flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background 150ms}
.btn-save:hover{background:var(--primary-h)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── Icon picker ──────────────────────────────────── */
.icon-picker-wrap{position:relative}
.icon-picker-trigger{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  background:#f8fafc !important;border:1px solid #e2e8f0 !important;
  border-radius:7px;padding:8px 11px;transition:border-color 150ms;user-select:none
}
.icon-picker-trigger:hover{border-color:#94a3b8 !important}
.icon-picker-trigger-name{flex:1;font-size:13px}
.icon-picker-panel{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:300;
  background:#fff;border:1px solid var(--border);border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.13);overflow:hidden
}
.icon-picker-search-bar{
  display:flex;align-items:center;gap:7px;
  padding:9px 12px;border-bottom:1px solid #f1f5f9
}
.icon-picker-search-bar input{flex:1;border:none;outline:none;font-size:13px;color:#0f172a;background:transparent}
.icon-picker-close{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;color:var(--text-l)}
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:3px;padding:8px;max-height:196px;overflow-y:auto}
.icon-grid-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 3px;border-radius:5px;cursor:pointer;transition:background 100ms;border:1px solid transparent}
.icon-grid-item:hover{background:#f1f5f9;border-color:#e2e8f0}
.icon-grid-item.selected{background:#dbeafe;border-color:#93c5fd}
.icon-grid-item span{font-size:8.5px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:38px;text-align:center}

/* ── Toast ────────────────────────────────────────── */
#gfcr-toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.12);pointer-events:auto;min-width:270px;max-width:380px;animation:toastIn 220ms ease}
.toast.success{background:#f0fdf4;color:#065f46;border-color:#a7f3d0}
.toast.error{background:#fef2f2;color:#991b1b;border-color:#fca5a5}
.toast.info{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.toast-icon{flex-shrink:0}
.toast-msg{flex:1;line-height:1.4}
.toast-close{flex-shrink:0;background:none;border:none;cursor:pointer;color:inherit;opacity:.4;padding:2px;display:flex;align-items:center;border-radius:4px;transition:opacity 150ms}
.toast-close:hover{opacity:.8}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(6px)}}
.toast.leaving{animation:toastOut 180ms ease forwards}

/* ── Loading ──────────────────────────────────────── */
.gfcr-loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-l)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 700ms linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Frappe modal override ────────────────────────── */
.modal .modal-content{background:#fff !important;border:none !important;border-radius:12px !important;box-shadow:0 20px 60px rgba(0,0,0,.18) !important;overflow:hidden}
.modal .modal-header{background:var(--primary) !important;padding:14px 20px !important;border-bottom:none !important}
.modal .modal-header .modal-title,.modal .modal-header h4,.modal .modal-header h5{color:#f8fafc !important;font-size:14px !important;font-weight:600 !important}
.modal .modal-header .close,.modal .modal-header .btn-modal-close{color:#94a3b8 !important;opacity:1 !important;text-shadow:none !important}
.modal .modal-header .close:hover{color:#fff !important}
.modal .modal-body{color:#1e293b !important;background:#fff !important;padding:20px !important;font-size:13.5px !important;line-height:1.6 !important}
.modal .modal-footer{border-top:1px solid #e2e8f0 !important;background:#f8fafc !important;padding:12px 16px !important}
.modal .modal-footer .btn-primary{background:var(--primary) !important;border-color:var(--primary) !important;color:#fff !important}
.modal .modal-footer .btn-default,.modal .modal-footer .btn-secondary{background:#fff !important;border-color:#e2e8f0 !important;color:#475569 !important}

@media(max-width:700px){
  .gfcr-sb{width:100%;position:absolute;z-index:50;top:var(--header);bottom:0;transform:translateX(-100%);transition:transform 200ms}
  .gfcr-sb.open{transform:translateX(0)}
  :root{--sidebar:100%}
}

/* ── Btn accent (Submeter) ────────────────────────── */
.btn-act.btn-accent{background:#059669;color:#fff;border-color:transparent}
.btn-act.btn-accent:hover{background:#047857}

/* ── Aba Vínculos — layout ────────────────────────── */
.cr-links-layout{display:flex;gap:14px;height:100%;min-height:340px;padding:0}
.cr-tree-panel{flex:2;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-width:0}
.cr-tree-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fafafa}
.cr-tree-title{font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.cr-tree-title .req{color:#dc2626;font-size:12px}
.cr-tree-search{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:7px 10px;transition:border-color 150ms}
.cr-tree-search:focus-within{border-color:#94a3b8;box-shadow:0 0 0 3px rgba(71,85,105,.07)}
.cr-tree-search input{flex:1;border:none;outline:none;background:transparent;font-size:12.5px;color:#0f172a;min-width:0}
.cr-tree-search input::placeholder{color:#94a3b8}
.cr-tree-sel-pill{margin-top:8px;display:flex;align-items:center;gap:7px;background:#dbeafe;border:1px solid #93c5fd;border-radius:6px;padding:6px 10px;font-size:12px;color:#1e40af}
.cr-tree-sel-pill .clear-sel{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;color:#3b82f6;margin-left:auto;border-radius:4px;transition:background 100ms}
.cr-tree-sel-pill .clear-sel:hover{background:rgba(59,130,246,.15)}
.cr-tree-body{flex:1;overflow-y:auto;padding:6px 4px}
.cr-tree-body::-webkit-scrollbar{width:4px}
.cr-tree-body::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px}
/* nós da árvore */
.cg-node{display:flex;align-items:flex-start;gap:3px;padding:5px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all 100ms;margin-bottom:1px}
.cg-node:hover{background:#f1f5f9;border-color:#e2e8f0}
.cg-node.selected{background:#dbeafe;border-color:#93c5fd}
.cg-toggle{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:4px;margin-top:2px;cursor:pointer;transition:background 100ms}
.cg-toggle:hover{background:#e2e8f0}
.cg-toggle-icon{transition:transform 150ms;color:#94a3b8}
.cg-toggle-icon.expanded{transform:rotate(90deg)}
.cg-leaf-dot{width:5px;height:5px;border-radius:50%;background:#d1d5db;margin:0 1px}
.cg-icon{flex-shrink:0;margin-top:2px;color:#94a3b8}
.cg-node.selected .cg-icon{color:#3b82f6}
.cg-content{flex:1;min-width:0}
.cg-name{font-size:12.5px;font-weight:500;color:#1e293b;line-height:1.3}
.cg-node.selected .cg-name{color:#1d4ed8;font-weight:600}
.cg-order{display:inline-flex;font-size:10px;font-weight:600;color:#64748b;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:0px 5px;margin-left:5px;font-family:var(--mono);vertical-align:middle}
.cg-desc{font-size:10.5px;color:#94a3b8;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cg-breadcrumb{font-size:10px;color:#94a3b8;margin-top:2px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cg-empty{text-align:center;color:#94a3b8;font-size:12px;padding:28px 16px;line-height:1.6}
/* painel direito */
.cr-links-right{flex:1;display:flex;flex-direction:column;gap:12px;min-width:200px;max-width:280px;overflow-y:auto}
.cr-links-right-hdr{font-size:10.5px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* ── Natural Studio — dark mode ───────────────────── */
.gfcr-tab-body.ns-active{padding:0!important;background:#080e1c!important;overflow:hidden!important;display:flex!important;flex-direction:column!important}
.ns-wrap{display:flex;flex-direction:column;height:100%;background:#080e1c;color:#e2e8f0;overflow:hidden;min-height:0}
.ns-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#0d1526;border-bottom:1px solid #1a2540;flex-shrink:0}
.ns-topbar-left{display:flex;align-items:center;gap:12px}
.ns-topbar-icon{width:38px;height:38px;background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.ns-topbar-title{font-size:15px;font-weight:700;color:#f1f5f9;letter-spacing:-.2px}
.ns-topbar-sub{font-size:11px;color:#475569;margin-top:2px}
.ns-mono{font-family:var(--mono);color:#38bdf8}
.ns-topbar-right{display:flex;align-items:center;gap:8px}
.ns-btn-upload{display:flex;align-items:center;gap:6px;padding:7px 16px;background:linear-gradient(135deg,#6d28d9,#4338ca);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 150ms;white-space:nowrap}
.ns-btn-upload:hover{opacity:.85}
.ns-btn-refresh{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#0f1e38;border:1px solid #1e3a5f;border-radius:7px;color:#64748b;cursor:pointer;transition:all 150ms}
.ns-btn-refresh:hover{background:#1e3a5f;color:#93c5fd}
.ns-dropzone{margin:14px 20px 0;border:2px dashed #1a3560;border-radius:12px;padding:18px 20px;display:flex;align-items:center;justify-content:center;gap:10px;color:#334155;font-size:13px;cursor:pointer;transition:all 200ms;flex-shrink:0}
.ns-dropzone:hover,.ns-drag-active{border-color:#3b82f6;background:rgba(59,130,246,.06);color:#93c5fd}
.ns-gallery{flex:1;overflow-y:auto;padding:14px 20px 20px;min-height:0}
.ns-gallery::-webkit-scrollbar{width:4px}
.ns-gallery::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}
.ns-gallery-loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px 20px}
.ns-gallery-empty{text-align:center;padding:56px 20px;color:#1e3a5f;line-height:1.7}
.ns-gallery-empty strong{display:block;color:#334155;font-size:14px;margin-bottom:6px}
.ns-gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.ns-img-card{background:#0d1526;border:1px solid #1a2540;border-radius:10px;overflow:hidden;transition:all 180ms;position:relative;cursor:pointer}
.ns-img-card:hover{border-color:#2563eb;box-shadow:0 4px 20px rgba(37,99,235,.2)}
.ns-img-card:hover .ns-img-overlay{opacity:1}
.ns-img-thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#0a1020}
.ns-img-thumb-icon{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#0a1020;color:#1e3a5f}
.ns-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;gap:8px;opacity:0;transition:opacity 180ms}
.ns-img-overlay-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;cursor:pointer;transition:background 150ms}
.ns-img-overlay-btn:hover{background:rgba(255,255,255,.28)}
.ns-img-overlay-btn.del:hover{background:rgba(220,38,38,.55);border-color:rgba(220,38,38,.5)}
.ns-img-info{padding:8px 10px;border-top:1px solid #1a2540}
.ns-img-name{font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ns-img-size{font-size:10px;color:#334155;margin-top:2px}
.ns-upload-bar-wrap{margin:10px 20px 0;background:#0d1526;border:1px solid #1a2540;border-radius:8px;padding:10px 14px;display:none;flex-shrink:0}
.ns-upload-bar-label{font-size:11px;color:#64748b;margin-bottom:6px}
.ns-upload-bar-track{background:#1a2540;border-radius:10px;height:4px;overflow:hidden}
.ns-upload-bar-fill{height:100%;background:linear-gradient(90deg,#6d28d9,#2563eb);border-radius:10px;transition:width 200ms;width:0%}
.ns-info-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:#0a1020;border-top:1px solid #1a2540;flex-shrink:0;font-size:10.5px;color:#334155}
.ns-info-bar span{font-family:var(--mono)}
/* Lightbox */
.ns-lightbox{position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.94);display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.ns-lightbox-img{max-width:90vw;max-height:86vh;border-radius:8px;object-fit:contain;cursor:default;box-shadow:0 0 60px rgba(0,0,0,.8)}
.ns-lightbox-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:10px;color:#fff;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:background 150ms}
.ns-lightbox-close:hover{background:rgba(255,255,255,.28)}
.ns-lightbox-info{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 16px;color:#94a3b8;font-size:11.5px;font-family:var(--mono);white-space:nowrap;max-width:80vw;overflow:hidden;text-overflow:ellipsis}

/* ── Settings Tab — dark mode ─────────────────────── */
.gfcr-tab-body.cfg-active{padding:0!important;background:#080e1c!important;overflow-y:auto!important}
.cfg-wrap{display:flex;flex-direction:column;background:#080e1c;color:#e2e8f0;padding:20px;min-height:100%}
.cfg-section{background:#0d1526;border:1px solid #162035;border-radius:12px;margin-bottom:14px;overflow:hidden}
.cfg-section-hdr{display:flex;align-items:center;gap:8px;padding:11px 18px;background:#0b1320;border-bottom:1px solid #162035;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#3b5280}
.cfg-section-hdr i{color:#2d4a6d;flex-shrink:0}
.cfg-rows{display:flex;flex-direction:column}
.cfg-row{display:flex;align-items:flex-start;gap:16px;padding:14px 20px;border-bottom:1px solid #0f1e33;transition:background 120ms}
.cfg-row:last-child{border-bottom:none}
.cfg-row:hover{background:#0f1e33}
.cfg-row-lbl{width:160px;flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#2d4a6d;padding-top:2px;line-height:1.3}
.cfg-row-val{flex:1;font-size:13px;color:#cbd5e1;line-height:1.5;word-break:break-word;min-width:0}
.cfg-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.cfg-badge-draft{background:#1e293b;color:#64748b;border:1px solid #334155}
.cfg-badge-dev{background:#1e3a8a;color:#93c5fd}
.cfg-badge-test{background:#7c2d12;color:#fed7aa}
.cfg-badge-submetido{background:#312e81;color:#c7d2fe}
.cfg-badge-obsoleto{background:#713f12;color:#fde68a}
.cfg-badge-arquivado{background:#7f1d1d;color:#fca5a5}
.cfg-tag{display:inline-flex;font-size:10.5px;background:#1a2540;color:#60a5fa;border:1px solid #1e3a5f;border-radius:20px;padding:2px 9px;margin:2px 3px 2px 0}
.cfg-color-dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(255,255,255,.12);display:inline-block;flex-shrink:0}
.cfg-bool-yes{display:inline-flex;align-items:center;gap:4px;color:#4ade80;font-size:12.5px}
.cfg-bool-no{display:inline-flex;align-items:center;gap:4px;color:#2d4a6d;font-size:12.5px}
.cfg-url-btn{padding:4px 10px;background:#0f1e33;border:1px solid #1e3a5f;border-radius:6px;color:#60a5fa;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:background 120ms;font-family:var(--font);white-space:nowrap}
.cfg-url-btn:hover{background:#162035;color:#93c5fd}
.cfg-icon-box{width:30px;height:30px;background:#1a2540;border:1px solid #1e3a5f;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:#60a5fa;flex-shrink:0}
.cfg-form-section{margin-bottom:22px}
.cfg-form-divider{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;color:#2d4a6d;text-transform:uppercase;letter-spacing:.7px;margin-bottom:13px}
.cfg-form-divider::after{content:'';flex:1;height:1px;background:#162035}
.cfg-form-divider i{flex-shrink:0}
