{% extends "templates/base.html" %}

{% block head_include %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/assets/ichis_atlas_app/js/lucide.min.js"></script>
<style>
/* ── RESET FRAPPE CONTAINER ── */
.container,.page-container{max-width:100%!important;padding:0!important;width:100%!important;margin:0!important}
body{overflow:hidden}

:root{
  --sw:258px;
  --bg:#f5f6f8;
  --card:#ffffff;
  --sb:#0b0f14;
  --sb-border:#1c2128;
  --sb-hover:#141b22;
  --sb-text:#7d8590;
  --sb-active:rgba(255,255,255,0.06);
  --green:#166534;
  --green-2:#15803d;
  --green-3:#dcfce7;
  --gold:#b45309;
  --text:#0f172a;
  --text-2:#475569;
  --text-3:#94a3b8;
  --border:#e2e8f0;
  --border-2:#f1f5f9;
  --r:10px;
  --r-sm:7px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
.gf-shell{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;min-height:100vh;line-height:1.5;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#dde1e7;border-radius:3px}
.sidebar::-webkit-scrollbar-thumb{background:#21262d}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sw);background:var(--sb);
  position:fixed;top:0;left:0;height:100vh;
  overflow-y:auto;z-index:100;
  display:flex;flex-direction:column;
  border-right:1px solid var(--sb-border);flex-shrink:0;
}
.sb-logo{
  padding:18px 14px 14px;border-bottom:1px solid var(--sb-border);
  display:flex;align-items:center;gap:10px;
}
.sb-mark{
  width:33px;height:33px;
  background:linear-gradient(135deg,#166534 0%,#15803d 100%);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#fff;letter-spacing:-0.5px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(22,101,52,0.35);
}
.sb-name{font-weight:700;font-size:13px;color:#e6edf3;letter-spacing:0.02em}
.sb-sub{font-size:9.5px;color:#484f58;font-weight:400;letter-spacing:0.06em;text-transform:uppercase;margin-top:1px}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--sb-border)}
.sb-si{
  display:flex;align-items:center;gap:7px;
  background:#161b22;border:1px solid #2d333b;
  border-radius:6px;padding:6px 10px;transition:border-color 150ms;
}
.sb-si:focus-within{border-color:#2ea043}
.sb-si svg{color:#484f58;flex-shrink:0}
.sb-si input{
  background:transparent;border:none;outline:none;
  color:#c9d1d9;font-size:12px;font-family:inherit;width:100%;
}
.sb-si input::placeholder{color:#3d444d}
.sb-sec{padding:6px 0;border-bottom:1px solid var(--sb-border)}
.sb-lbl{
  font-size:9.5px;font-weight:600;letter-spacing:0.09em;
  text-transform:uppercase;color:#3d444d;padding:6px 14px 3px;
}
.ni{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px;color:var(--sb-text);
  cursor:pointer;position:relative;user-select:none;
  transition:background 120ms,color 120ms;
}
.ni:hover{background:var(--sb-hover);color:#cdd9e5}
.ni.on{background:var(--sb-active);color:#e6edf3}
.ni-ico{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:inherit}
.ni-lbl{font-size:12.5px;flex:1;font-weight:450}
.ni-ct{
  font-size:10px;background:#21262d;color:#7d8590;
  padding:1px 5px;border-radius:8px;font-weight:500;
}
.ni-arr{
  width:12px;height:12px;flex-shrink:0;
  transition:transform 200ms ease;color:#3d444d;
}
.ni-arr.op{transform:rotate(90deg)}
.ns{overflow:hidden;max-height:0;transition:max-height 220ms ease}
.nsi{
  display:flex;align-items:center;gap:7px;
  padding:5px 14px 5px 34px;
  color:#7d8590;cursor:pointer;font-size:12px;
  transition:background 120ms,color 120ms;
}
.nsi:hover{background:var(--sb-hover);color:#cdd9e5}
.nsi.on{background:var(--sb-active);color:#e6edf3}
.nsi-d{width:3px;height:3px;border-radius:50%;background:#2d333b;flex-shrink:0}
.sb-foot{
  margin-top:auto;padding:12px 14px;
  border-top:1px solid var(--sb-border);
  display:flex;align-items:center;gap:9px;
}
.sb-av{
  width:28px;height:28px;
  background:linear-gradient(135deg,#166534,#15803d);
  border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;color:#fff;
}
.sb-uname{font-size:11.5px;color:#7d8590;font-weight:500}
.sb-role{font-size:10px;color:#3d444d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}

/* ── MAIN ── */
.main{margin-left:var(--sw);flex:1;min-height:100vh;display:flex;flex-direction:column;overflow-y:auto;height:100vh}
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(245,246,248,0.94);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:0 30px;height:50px;
  display:flex;align-items:center;justify-content:space-between;
}
.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-3)}
.bc-sep{color:var(--border)}
.bc span:last-child{color:var(--text-2);font-weight:500}
.tbr{display:flex;align-items:center;gap:14px}
.tb-badge{font-size:10.5px;padding:3px 9px;border-radius:12px;font-weight:500;display:flex;align-items:center;gap:4px}
.tb-badge-g{background:#dcfce7;color:#166534}
.content{padding:30px;flex:1}

/* ── HERO ── */
.hero{margin-bottom:30px}
.hero-eyebrow{font-size:10.5px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:var(--text-3);margin-bottom:7px}
.hero-h{font-size:27px;font-weight:700;color:var(--text);letter-spacing:-0.6px;line-height:1.2;margin-bottom:9px}
.hero-h span{color:var(--green)}
.hero-p{font-size:13.5px;color:var(--text-2);max-width:500px;line-height:1.65}
.hero-stats{display:flex;gap:22px;margin-top:22px;flex-wrap:wrap}
.hs-item{display:flex;flex-direction:column;gap:2px}
.hs-val{font-size:21px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.hs-val span{color:var(--green)}
.hs-lbl{font-size:11px;color:var(--text-3)}
.hs-div{width:1px;background:var(--border);align-self:stretch}

/* ── SECTION HDR ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh-title{font-size:12.5px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.sh-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.sh-link{font-size:11.5px;color:var(--text-3);cursor:pointer;transition:color 120ms}
.sh-link:hover{color:var(--green)}

/* ── QUICK CARDS ── */
.qg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:28px}
.qc{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;cursor:pointer;
  transition:border-color 150ms,box-shadow 150ms,transform 150ms;
  position:relative;overflow:hidden;
}
.qc:hover{border-color:#cbd5e1;box-shadow:0 4px 16px rgba(0,0,0,0.07);transform:translateY(-1px)}
.qc-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
.qc-t{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:4px}
.qc-d{font-size:11px;color:var(--text-3);line-height:1.5}
.qc-n{position:absolute;top:14px;right:14px;font-size:10px;color:var(--text-3);font-weight:500}
.qc-bar{position:absolute;bottom:0;left:0;height:2px;width:0;transition:width 200ms ease}
.qc:hover .qc-bar{width:100%}
.bar-g{background:linear-gradient(to right,#166534,transparent)}
.bar-b{background:linear-gradient(to right,#0369a1,transparent)}
.bar-a{background:linear-gradient(to right,#d97706,transparent)}
.bar-p{background:linear-gradient(to right,#7c3aed,transparent)}

/* ── ICON COLORS ── */
.ico-g{background:#dcfce7;color:#166534}
.ico-b{background:#dbeafe;color:#1e40af}
.ico-a{background:#fef3c7;color:#d97706}
.ico-p{background:#f3e8ff;color:#7c3aed}
.ico-mix{background:var(--bg);border:1px solid var(--border);color:var(--text-2)}
.ico-g-dark{background:rgba(22,101,52,0.15);color:#2ea043}

/* ── APPS GRID ── */
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:28px}
.ac{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;cursor:pointer;
  display:flex;align-items:flex-start;gap:12px;
  transition:border-color 150ms,box-shadow 150ms;
}
.ac:hover{border-color:#cbd5e1;box-shadow:0 4px 16px rgba(0,0,0,0.07)}
.ac-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ac-b{flex:1;min-width:0}
.ac-n{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-on{background:#22c55e;box-shadow:0 0 0 2px #dcfce7}
.ac-d{font-size:11px;color:var(--text-3);line-height:1.45;margin-bottom:9px}
.ac-tags{display:flex;flex-wrap:wrap;gap:4px}
.ac-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--text-3);border:1px solid var(--border);font-weight:500}

/* ── PANEL / LIST ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ph{padding:13px 18px;border-bottom:1px solid var(--border-2);display:flex;align-items:center;justify-content:space-between}
.ph-t{font-size:12.5px;font-weight:600;color:var(--text)}
.pb{padding:5px 0}
.li{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;transition:background 120ms}
.li:hover{background:var(--bg)}
.li-ico{width:28px;height:28px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-2)}
.li-b{flex:1;min-width:0}
.li-t{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-m{font-size:10.5px;color:var(--text-3);margin-top:1px}
.badge{font-size:9.5px;padding:2px 7px;border-radius:9px;font-weight:500;flex-shrink:0;white-space:nowrap}
.b-g{background:#dcfce7;color:#166534}
.b-y{background:#fef9c3;color:#854d0e}
.b-b{background:#dbeafe;color:#1e40af}
.b-p{background:#f3e8ff;color:#6b21a8}
.b-s{background:#f1f5f9;color:#475569}

/* ── TECH DARK CARD ── */
.ai{
  background:#0b0f14;border:1px solid #1c2128;
  border-radius:var(--r);padding:26px;
  margin-bottom:28px;position:relative;overflow:hidden;
}
.ai::before{content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;background:radial-gradient(circle,rgba(22,101,52,0.12) 0%,transparent 70%);pointer-events:none}
.ai::after{content:'';position:absolute;bottom:-60px;left:60px;width:160px;height:160px;background:radial-gradient(circle,rgba(0,112,243,0.06) 0%,transparent 70%);pointer-events:none}
.ai-ey{font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:#2ea043;font-weight:600;margin-bottom:7px}
.ai-h{font-size:16px;font-weight:700;color:#e6edf3;margin-bottom:6px;letter-spacing:-0.3px}
.ai-p{font-size:12.5px;color:#7d8590;margin-bottom:22px;max-width:440px;line-height:1.6}
.ai-g{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.ai-c{background:#141b22;border:1px solid #21262d;border-radius:8px;padding:14px;cursor:pointer;transition:border-color 150ms,background 150ms}
.ai-c:hover{border-color:#2ea043;background:#1a2230}
.ai-ci{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.ai-cn{font-size:12px;font-weight:600;color:#cdd9e5;margin-bottom:3px}
.ai-cd{font-size:11px;color:#6e7681;line-height:1.4}

/* ── ITEMS TREE ── */
.tree{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:28px}
.tci{
  display:flex;align-items:center;gap:10px;padding:9px 18px;
  cursor:pointer;border-bottom:1px solid var(--border-2);
  transition:background 120ms;
}
.tci:last-child{border-bottom:none}
.tci:hover{background:var(--bg)}
.tci-n{font-size:12px;color:var(--text-2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tci-ico{width:26px;height:26px;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-2)}

/* ── FOOTER ── */
.pg-footer{text-align:center;padding:28px 0 14px;border-top:1px solid var(--border);margin-top:4px}
.pg-footer-t{font-size:12px;color:var(--text-3);font-weight:500}
.pg-footer-s{font-size:11px;color:var(--text-3);margin-top:3px}

/* ── IFRAME ── */
#gf-iframe-wrap{flex:1;display:none;flex-direction:column;overflow:hidden;position:relative}
#gf-iframe{width:100%;flex:1;border:none;display:block}
.gf-back-btn{
  display:none;align-items:center;gap:5px;
  padding:4px 10px;border-radius:6px;
  background:var(--bg);border:1px solid var(--border);
  font-size:12px;color:var(--text-2);cursor:pointer;
  transition:background 120ms,border-color 120ms;flex-shrink:0;
}
.gf-back-btn:hover{background:var(--border-2);border-color:#cbd5e1}
.gf-back-btn svg{flex-shrink:0}

/* ── LOADING ── */
.gf-loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px;color:var(--text-3)}
.gf-spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 700ms linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:1280px){.qg{grid-template-columns:repeat(3,1fr)}.ai-g{grid-template-columns:repeat(2,1fr)}}
@media(max-width:960px){.qg{grid-template-columns:repeat(2,1fr)}.ag{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:transform 250ms ease}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .content{padding:18px}
  .qg{grid-template-columns:1fr}
  .ag{grid-template-columns:1fr}
  .ai-g{grid-template-columns:1fr}
  .mob-toggle{display:flex!important}
}
.mob-toggle{
  display:none;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:6px;
  background:transparent;border:1px solid var(--border);
  cursor:pointer;color:var(--text-2);
}
</style>
{% endblock %}

{% block content %}
<div class="gf-shell">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar" id="gf-sidebar">

    <div class="sb-logo">
      <div class="sb-mark" id="gf-sb-mark">GF</div>
      <div>
        <div class="sb-name" id="gf-sb-name">Carregando...</div>
        <div class="sb-sub">Wiki Hub Knowledge</div>
      </div>
    </div>

    <div class="sb-search">
      <div class="sb-si">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="gf-search" placeholder="Buscar recursos, grupos...">
      </div>
    </div>

    <!-- Fixed quick nav -->
    <div class="sb-sec">
      <div class="ni on" id="gf-btn-home" onclick="GF.renderHome()">
        <div class="ni-ico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <span class="ni-lbl">Início</span>
      </div>
      <div class="ni" id="gf-btn-fav" onclick="GF.showFavorites()">
        <div class="ni-ico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
        <span class="ni-lbl">Favoritos</span>
      </div>
      <div class="ni" id="gf-btn-rec" onclick="GF.showRecents()">
        <div class="ni-ico"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <span class="ni-lbl">Recentes</span>
      </div>
    </div>

    <!-- Dynamic nav built by JS -->
    <div id="gf-nav"></div>

    <div class="sb-foot">
      <div class="sb-av" id="gf-avatar">GF</div>
      <div style="min-width:0">
        <div class="sb-uname" id="gf-username">Carregando...</div>
        <div class="sb-role" id="gf-userrole"></div>
      </div>
    </div>

  </aside>

  <!-- ═══════════ MAIN ═══════════ -->
  <div class="main">

    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="mob-toggle" onclick="document.getElementById('gf-sidebar').classList.toggle('open')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </div>
        <button class="gf-back-btn" id="gf-back-btn" onclick="GF._backFromIframe()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Voltar
        </button>
        <div class="bc" id="gf-breadcrumb">
          <span>Início</span>
        </div>
      </div>
      <div class="tbr">
        <span class="tb-badge tb-badge-g">● Online</span>
      </div>
    </div>

    <div class="content" id="gf-content">
      <div class="gf-loading">
        <div class="gf-spin"></div>
        <span>Carregando Wiki Hub Knowledge...</span>
      </div>
    </div>

    <div id="gf-iframe-wrap">
      <iframe id="gf-iframe" src="about:blank" allowfullscreen></iframe>
    </div>

  </div>

</div>
{% endblock %}

{% block script %}
<script>
const GF = {
  groups: [],
  items: [],
  itemMap: {},
  tree: {},
  roots: [],
  recents: [],

  _lucideReady: false,

  _loadLucide() {
    return new Promise((resolve) => {
      if (window.lucide) { this._lucideReady = true; resolve(); return; }
      const s = document.createElement('script');
      s.src = '/assets/ichis_atlas_app/js/lucide.min.js';
      s.onload  = () => { this._lucideReady = true; resolve(); };
      s.onerror = () => resolve(); // falha silenciosa
      document.head.appendChild(s);
    });
  },

  async init() {
    this.recents = JSON.parse(localStorage.getItem('gf_recents') || '[]');
    this._setupUser();
    this._setupSearch();
    try {
      await Promise.all([this._loadGroups(), this._loadItems(), this._loadLucide()]);
      this._buildTree();
      this._renderSidebar();
      this.renderHome();
    } catch(e) {
      document.getElementById('gf-content').innerHTML =
        '<div style="color:#ef4444;padding:20px 0;font-size:13px">Erro ao carregar dados. Verifique as permissões.</div>';
      console.error('GF Atlas init error:', e);
    }
  },

  async _loadGroups() {
    const r = await frappe.call({
      method: 'frappe.client.get_list',
      args: {
        doctype: 'GF Content Group',
        fields: ['name','display_name','parent_group','is_group','icon','color','sort_order','active','description'],
        filters: [['active','=',1]],
        order_by: 'sort_order asc, display_name asc',
        limit_page_length: 500
      }
    });
    this.groups = r.message || [];
  },

  async _loadItems() {
    const r = await frappe.call({
      method: 'frappe.client.get_list',
      args: {
        doctype: 'GF Content Registry',
        fields: ['name','title','item_type','status','content_group','route_url',
                 'reference_doctype','reference_name','description','tags',
                 'icon','color','sort_order','show_on_home','favorite','active'],
        filters: [['active','=',1],['status','!=','ARCHIVED']],
        order_by: 'sort_order asc, title asc',
        limit_page_length: 1000
      }
    });
    this.items = r.message || [];
    this.itemMap = {};
    this.items.forEach(i => { this.itemMap[i.name] = i; });
  },

  _buildTree() {
    const map = {};
    this.groups.forEach(g => { map[g.name] = Object.assign({}, g, {children: []}); });
    this.roots = [];
    this.groups.forEach(g => {
      if (g.parent_group && map[g.parent_group]) {
        map[g.parent_group].children.push(map[g.name]);
      } else if (!g.parent_group) {
        this.roots.push(map[g.name]);
      }
    });
    this.tree = map;
  },

  _renderSidebar() {
    const nav = document.getElementById('gf-nav');
    nav.innerHTML = '';
    this.roots.forEach(root => {
      if (!root.children.length) return;
      const sec = document.createElement('div');
      sec.className = 'sb-sec';
      root.children.forEach(child => {
        const hasKids = child.children.length > 0;
        const cnt = this._countItems(child.name);
        const ni = document.createElement('div');
        ni.className = 'ni';
        ni.dataset.group = child.name;
        ni.innerHTML =
          '<div class="ni-ico">' + this._ico(child.icon, 13) + '</div>' +
          '<span class="ni-lbl">' + this._esc(child.display_name) + '</span>' +
          (cnt > 0 ? '<span class="ni-ct">' + cnt + '</span>' : '') +
          (hasKids ? '<svg class="ni-arr" id="arr-' + child.name + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>' : '');
        if (hasKids) {
          ni.onclick = () => this._toggleNs(child.name);
          const ns = document.createElement('div');
          ns.className = 'ns';
          ns.id = 'ns-' + child.name;
          child.children.forEach(sub => {
            const scnt = this._countItems(sub.name);
            const nsi = document.createElement('div');
            nsi.className = 'nsi';
            nsi.dataset.group = sub.name;
            nsi.innerHTML = '<span class="nsi-d"></span>' + this._esc(sub.display_name) +
              (scnt > 0 ? '<span class="ni-ct">' + scnt + '</span>' : '');
            nsi.onclick = () => this.navigateTo(sub.name);
            ns.appendChild(nsi);
          });
          sec.appendChild(ni);
          sec.appendChild(ns);
        } else {
          ni.onclick = () => this.navigateTo(child.name);
          sec.appendChild(ni);
        }
      });
      nav.appendChild(sec);
    });
    if (window.lucide) lucide.createIcons({attrs:{style:'display:block'}});
  },

  _toggleNs(id) {
    const ns = document.getElementById('ns-' + id);
    const arr = document.getElementById('arr-' + id);
    if (!ns) return;
    const open = ns.style.maxHeight && ns.style.maxHeight !== '0px';
    ns.style.maxHeight = open ? '0px' : ns.scrollHeight + 200 + 'px';
    if (arr) arr.classList.toggle('op', !open);
  },

  _countItems(groupName) {
    const all = this._descendants(groupName);
    return this.items.filter(i => all.indexOf(i.content_group) !== -1).length;
  },

  _descendants(name) {
    const r = [name];
    const node = this.tree[name];
    if (node) node.children.forEach(c => { const d = this._descendants(c.name); for(let i=0;i<d.length;i++) r.push(d[i]); });
    return r;
  },

  renderHome() {
    this._showContent();
    this.current = 'home';
    this._setActive(null);
    this._breadcrumb(['Início']);
    const homeItems = this.items.filter(i => i.show_on_home);
    const techRoot = this.roots.find(r => /tecnolog|tech/i.test(r.name));
    let html = this._heroHtml() + this._quickHtml(homeItems) + this._groupsHtml(techRoot) + this._techHtml(techRoot);
    html += '<div class="pg-footer"><div class="pg-footer-t">Wiki Hub Knowledge — Central Corporativa</div><div class="pg-footer-s">Plataforma de Gestão e Conhecimento · ' + this._esc(this.companyName || 'GREENFARMS') + '</div></div>';
    document.getElementById('gf-content').innerHTML = html;
    this._applyIcons();
  },

  _heroHtml() {
    const total = this.items.length;
    const grps  = this.groups.length;
    const favs  = this.items.filter(i => i.favorite).length;
    const co    = this._esc(this.companyName || 'GREENFARMS');
    const fn    = this._esc(this.firstName   || 'Bem-vindo');
    return '<div class="hero">' +
      '<div class="hero-eyebrow">Central Corporativa · ' + co + '</div>' +
      '<h1 class="hero-h"><span>Wiki Hub Knowledge</span></h1>' +
      '<p class="hero-p">Toda documentação, projetos, aplicações, automações e sistemas da empresa organizados em um único lugar. Navegue, explore e acesse com precisão.</p>' +
      '<div class="hero-stats">' +
        '<div class="hs-item"><div class="hs-val">' + total + '<span>+</span></div><div class="hs-lbl">Recursos cadastrados</div></div>' +
        '<div class="hs-div"></div>' +
        '<div class="hs-item"><div class="hs-val">' + grps + '</div><div class="hs-lbl">Grupos de conteúdo</div></div>' +
        '<div class="hs-div"></div>' +
        '<div class="hs-item"><div class="hs-val">' + favs + '</div><div class="hs-lbl">Favoritos</div></div>' +
      '</div></div>';
  },

  _quickHtml(items) {
    if (!items.length) return '';
    const bars = ['bar-g','bar-b','bar-a','bar-p','bar-g','bar-b','bar-a','bar-p'];
    const icos = ['ico-g','ico-b','ico-a','ico-p','ico-g','ico-b','ico-a','ico-p'];
    const cards = items.slice(0, 8).map((it, i) =>
      '<div class="qc" onclick="GF._open(\'' + it.name + '\')">' +
        '<div class="qc-ico ' + icos[i%8] + '">' + this._ico(it.icon, 16) + '</div>' +
        '<div class="qc-t">' + this._esc(it.title) + '</div>' +
        '<div class="qc-d">' + this._esc(it.description || this._typeLabel(it.item_type)) + '</div>' +
        '<span class="qc-n">' + this._typeLabel(it.item_type) + '</span>' +
        '<div class="qc-bar ' + bars[i%8] + '"></div>' +
      '</div>'
    ).join('');
    return '<div class="sh"><div class="sh-title"><div class="sh-dot"></div>Acesso Rápido</div></div>' +
           '<div class="qg">' + cards + '</div>';
  },

  _groupsHtml(techRoot) {
    const techName = techRoot ? techRoot.name : null;
    const all = this.roots.flatMap(r => r.children).filter(g => g.name !== techName && (!techRoot || g.parent_group !== techRoot.name));
    if (!all.length) return '';
    const cards = all.map(g => {
      const cnt = this._countItems(g.name);
      const sub = g.children.length;
      return '<div class="ac" onclick="GF.navigateTo(\'' + g.name + '\')">' +
        '<div class="ac-ico ico-mix">' + this._ico(g.icon, 18) + '</div>' +
        '<div class="ac-b">' +
          '<div class="ac-n">' + this._esc(g.display_name) + '<span class="dot d-on"></span></div>' +
          '<div class="ac-d">' + this._esc(g.description || '') + '</div>' +
          '<div class="ac-tags">' +
            (cnt > 0 ? '<span class="ac-tag">' + cnt + ' itens</span>' : '') +
            (sub > 0 ? '<span class="ac-tag">' + sub + ' subgrupos</span>' : '') +
          '</div>' +
        '</div></div>';
    }).join('');
    return '<div class="sh"><div class="sh-title"><div class="sh-dot"></div>Áreas e Grupos</div></div>' +
           '<div class="ag">' + cards + '</div>';
  },

  _techHtml(techRoot) {
    if (!techRoot || !techRoot.children.length) return '';
    const cards = techRoot.children.map(sub =>
      '<div class="ai-c" onclick="GF.navigateTo(\'' + sub.name + '\')">' +
        '<div class="ai-ci ico-g-dark">' + this._ico(sub.icon, 16) + '</div>' +
        '<div class="ai-cn">' + this._esc(sub.display_name) + '</div>' +
        '<div class="ai-cd">' + this._esc(sub.description || '') + '</div>' +
      '</div>'
    ).join('');
    return '<div class="ai">' +
      '<div class="ai-ey">Tecnologia & Inovação</div>' +
      '<div class="ai-h">' + this._esc(techRoot.display_name) + '</div>' +
      '<div class="ai-p">' + this._esc(techRoot.description || 'Plataformas digitais, automação e ferramentas de IA da ' + (this.companyName || 'GREENFARMS') + '.') + '</div>' +
      '<div class="ai-g">' + cards + '</div>' +
    '</div>';
  },

  navigateTo(name) {
    this._showContent();
    const node = this.tree[name];
    if (!node) return;
    this.current = name;
    this._setActive(name);
    this._breadcrumb(['Início'].concat(this._pathTo(name)));
    const directItems = this.items.filter(i => i.content_group === name);
    const subs = node.children;
    let html = '<div class="hero" style="margin-bottom:20px">' +
      '<div class="hero-eyebrow">Grupo de Conteúdo</div>' +
      '<h1 class="hero-h" style="font-size:22px">' + this._esc(node.display_name) + '</h1>' +
      (node.description ? '<p class="hero-p">' + this._esc(node.description) + '</p>' : '') +
      '</div>';
    if (subs.length) {
      const cards = subs.map(s => {
        const cnt = this._countItems(s.name);
        return '<div class="ac" onclick="GF.navigateTo(\'' + s.name + '\')">' +
          '<div class="ac-ico ico-mix">' + this._ico(s.icon, 18) + '</div>' +
          '<div class="ac-b"><div class="ac-n">' + this._esc(s.display_name) + '</div>' +
          '<div class="ac-d">' + this._esc(s.description || '') + '</div>' +
          '<div class="ac-tags">' + (cnt > 0 ? '<span class="ac-tag">' + cnt + ' itens</span>' : '') + '</div>' +
          '</div></div>';
      }).join('');
      html += '<div class="sh"><div class="sh-title"><div class="sh-dot"></div>Subgrupos</div></div>' +
              '<div class="ag">' + cards + '</div>';
    }
    if (directItems.length) {
      const rows = directItems.map(it =>
        '<div class="tci" onclick="GF._open(\'' + it.name + '\')">' +
          '<div class="tci-ico">' + this._ico(it.icon, 13) + '</div>' +
          '<div class="tci-n">' + this._esc(it.title) + '</div>' +
          '<span class="badge ' + this._statusBadge(it.status) + '">' + it.status + '</span>' +
          '<span class="badge b-s">' + this._typeLabel(it.item_type) + '</span>' +
        '</div>'
      ).join('');
      html += '<div class="sh"><div class="sh-title"><div class="sh-dot"></div>Itens (' + directItems.length + ')</div></div>' +
              '<div class="tree">' + rows + '</div>';
    } else if (!subs.length) {
      html += '<div style="color:var(--text-3);font-size:13px;padding:20px 0">Nenhum item neste grupo.</div>';
    }
    document.getElementById('gf-content').innerHTML = html;
    this._applyIcons();
  },

  _open(itemName) {
    const item = this.itemMap[itemName];
    if (!item) return;
    this._addRecent(itemName);

    // Links externos sempre em nova aba
    if (item.item_type === 'EXTERNAL_LINK') {
      const href = item.route_url || item.reference_name;
      if (href) window.open(href, '_blank');
      return;
    }

    // Resolve URL interna
    let url = item.route_url || '';
    if (!url) {
      const ref = item.reference_name || '';
      const dt  = item.reference_doctype || '';
      switch (item.item_type) {
        case 'REPORT':    url = '/app/query-report/' + encodeURIComponent(ref || item.title); break;
        case 'DASHBOARD': url = '/app/dashboard/'    + encodeURIComponent(ref || item.title); break;
        case 'WEB_PAGE':  url = ref; break;
        default:
          if (dt && ref) url = '/app/' + this._slug(dt) + '/' + encodeURIComponent(ref);
          else if (dt)   url = '/app/' + this._slug(dt);
      }
    }

    if (!url) return;

    // URLs absolutas externas → nova aba
    if (/^https?:\/\//.test(url) && !url.includes(window.location.hostname)) {
      window.open(url, '_blank');
      return;
    }

    // Carrega no iframe interno
    this._loadIframe(url, item.title);
  },

  _loadIframe(url, title) {
    const content = document.getElementById('gf-content');
    const wrap    = document.getElementById('gf-iframe-wrap');
    const iframe  = document.getElementById('gf-iframe');
    const backBtn = document.getElementById('gf-back-btn');

    content.style.display = 'none';
    wrap.style.display    = 'flex';
    backBtn.style.display = 'flex';

    // Injeta CSS no iframe após carregar para ocultar nav do Frappe
    iframe.onload = () => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc) return;
        const s = doc.createElement('style');
        s.textContent = [
          '.navbar,.navbar-main,nav.navbar{display:none!important}',
          '.page-head{display:none!important}',
          '.layout-side-section,.sidebar-section{display:none!important}',
          '.layout-main{padding-top:0!important}',
          '.page-wrapper{padding-top:0!important}',
          'body>.container{padding-top:0!important}',
        ].join('');
        doc.head.appendChild(s);
      } catch(e) {}
    };

    iframe.src = url;
    this._breadcrumb(['Início', title || url]);
  },

  _backFromIframe() {
    const content = document.getElementById('gf-content');
    const wrap    = document.getElementById('gf-iframe-wrap');
    const iframe  = document.getElementById('gf-iframe');
    const backBtn = document.getElementById('gf-back-btn');

    iframe.src            = 'about:blank';
    wrap.style.display    = 'none';
    backBtn.style.display = 'none';
    content.style.display = 'block';

    // Restaura a view anterior (grupo ativo ou home)
    if (this.current && this.current !== 'home') {
      this.navigateTo(this.current);
    } else {
      this.renderHome();
    }
  },

  showFavorites() {
    this._showContent();
    this._setActive('__fav__');
    this._breadcrumb(['Favoritos']);
    const favs = this.items.filter(i => i.favorite);
    document.getElementById('gf-content').innerHTML =
      '<div class="hero" style="margin-bottom:20px">' +
        '<div class="hero-eyebrow">Coleção Pessoal</div>' +
        '<h1 class="hero-h" style="font-size:22px">Favoritos</h1>' +
        '<p class="hero-p">' + favs.length + ' item(s) marcado(s) como favorito.</p>' +
      '</div>' +
      (favs.length ? this._itemListHtml(favs) : '<div style="color:var(--text-3);font-size:13px;padding:20px 0">Nenhum favorito ainda.</div>');
    this._applyIcons();
  },

  showRecents() {
    this._showContent();
    this._setActive('__rec__');
    this._breadcrumb(['Recentes']);
    const list = this.recents.map(n => this.itemMap[n]).filter(Boolean).slice(0, 20);
    document.getElementById('gf-content').innerHTML =
      '<div class="hero" style="margin-bottom:20px">' +
        '<div class="hero-eyebrow">Histórico de Acesso</div>' +
        '<h1 class="hero-h" style="font-size:22px">Recentes</h1>' +
        '<p class="hero-p">' + list.length + ' item(s) acessado(s) recentemente.</p>' +
      '</div>' +
      (list.length ? this._itemListHtml(list) : '<div style="color:var(--text-3);font-size:13px;padding:20px 0">Nenhum acesso recente.</div>');
    this._applyIcons();
  },

  _itemListHtml(items) {
    const rows = items.map(it =>
      '<div class="li" onclick="GF._open(\'' + it.name + '\')">' +
        '<div class="li-ico">' + this._ico(it.icon, 13) + '</div>' +
        '<div class="li-b">' +
          '<div class="li-t">' + this._esc(it.title) + '</div>' +
          '<div class="li-m">' + this._esc(it.description || this._typeLabel(it.item_type)) + '</div>' +
        '</div>' +
        '<span class="badge ' + this._statusBadge(it.status) + '">' + it.status + '</span>' +
      '</div>'
    ).join('');
    return '<div class="panel"><div class="pb">' + rows + '</div></div>';
  },

  _onSearch(q) {
    q = q.trim().toLowerCase();
    if (!q) { this.renderHome(); return; }
    const matchItems = this.items.filter(i =>
      i.title.toLowerCase().indexOf(q) !== -1 ||
      (i.description || '').toLowerCase().indexOf(q) !== -1 ||
      (i.tags || '').toLowerCase().indexOf(q) !== -1
    );
    const matchGroups = this.groups.filter(g => g.display_name.toLowerCase().indexOf(q) !== -1);
    this._breadcrumb(['Busca: "' + q + '"']);
    let html = '<div class="hero" style="margin-bottom:20px">' +
      '<div class="hero-eyebrow">Resultado da Busca</div>' +
      '<h1 class="hero-h" style="font-size:22px">"' + this._esc(q) + '"</h1>' +
      '<p class="hero-p">' + matchItems.length + ' item(s) encontrado(s).</p>' +
      '</div>';
    if (matchItems.length) html += this._itemListHtml(matchItems);
    if (matchGroups.length) {
      const cards = matchGroups.map(g =>
        '<div class="ac" onclick="GF.navigateTo(\'' + g.name + '\')">' +
          '<div class="ac-ico ico-mix">' + this._ico(g.icon, 18) + '</div>' +
          '<div class="ac-b"><div class="ac-n">' + this._esc(g.display_name) + '</div></div>' +
        '</div>'
      ).join('');
      html += '<div class="sh" style="margin-top:20px"><div class="sh-title"><div class="sh-dot"></div>Grupos (' + matchGroups.length + ')</div></div>' +
              '<div class="ag">' + cards + '</div>';
    }
    if (!matchItems.length && !matchGroups.length) {
      html += '<div style="color:var(--text-3);font-size:13px;padding:20px 0">Nenhum resultado encontrado para "' + this._esc(q) + '".</div>';
    }
    document.getElementById('gf-content').innerHTML = html;
    this._applyIcons();
  },

  /* ── helpers ── */
  _showContent() {
    const content = document.getElementById('gf-content');
    const wrap    = document.getElementById('gf-iframe-wrap');
    const iframe  = document.getElementById('gf-iframe');
    const backBtn = document.getElementById('gf-back-btn');
    if (!wrap) return;
    iframe.src            = 'about:blank';
    wrap.style.display    = 'none';
    backBtn.style.display = 'none';
    content.style.display = 'block';
  },

  _setupUser() {
    const fullname = frappe.session.user_fullname || frappe.session.user || 'Usuário';
    this.firstName   = fullname.split(' ')[0] || 'Usuário';
    this.companyName = (frappe.boot && frappe.boot.sysdefaults && frappe.boot.sysdefaults.company) || 'GREENFARMS';
    const initials   = fullname.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() || 'GF';
    const coInitials = this.companyName.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase() || 'GF';
    const av   = document.getElementById('gf-avatar');
    const un   = document.getElementById('gf-username');
    const ur   = document.getElementById('gf-userrole');
    const mark = document.getElementById('gf-sb-mark');
    const name = document.getElementById('gf-sb-name');
    if (av)   av.textContent   = initials;
    if (un)   un.textContent   = fullname;
    if (ur)   ur.textContent   = frappe.session.user || '';
    if (mark) mark.textContent = coInitials;
    if (name) name.textContent = this.companyName;
  },

  _setupSearch() {
    const inp = document.getElementById('gf-search');
    if (!inp) return;
    let t;
    inp.addEventListener('input', e => {
      clearTimeout(t);
      t = setTimeout(() => this._onSearch(e.target.value), 300);
    });
  },

  _setActive(name) {
    document.querySelectorAll('.ni, .nsi').forEach(el => el.classList.remove('on'));
    if (name === null) {
      const el = document.getElementById('gf-btn-home'); if (el) el.classList.add('on');
    } else if (name === '__fav__') {
      const el = document.getElementById('gf-btn-fav'); if (el) el.classList.add('on');
    } else if (name === '__rec__') {
      const el = document.getElementById('gf-btn-rec'); if (el) el.classList.add('on');
    } else {
      const el = document.querySelector('[data-group="' + name + '"]');
      if (el) el.classList.add('on');
    }
  },

  _breadcrumb(parts) {
    const bc = document.getElementById('gf-breadcrumb');
    if (!bc) return;
    bc.innerHTML = parts.map((p, i) =>
      i < parts.length - 1
        ? '<span style="cursor:pointer" onclick="GF.renderHome()">' + this._esc(p) + '</span><span class="bc-sep"> / </span>'
        : '<span>' + this._esc(p) + '</span>'
    ).join('');
  },

  _pathTo(name) {
    const path = [];
    let cur = this.tree[name];
    while (cur) {
      path.unshift(cur.display_name);
      cur = cur.parent_group ? this.tree[cur.parent_group] : null;
    }
    return path;
  },

  _addRecent(name) {
    this.recents = [name].concat(this.recents.filter(n => n !== name)).slice(0, 30);
    localStorage.setItem('gf_recents', JSON.stringify(this.recents));
  },

  _ico(iconName, size) {
    const n = (iconName || 'folder').trim().toLowerCase().replace(/\s+/g, '-');
    return '<i data-lucide="' + n + '" style="width:' + size + 'px;height:' + size + 'px;display:block"></i>';
  },

  _applyIcons() {
    if (window.lucide) lucide.createIcons({ attrs: { style: 'display:block' } });
  },

  _typeLabel(t) {
    return {WEB_PAGE:'Página Web',REPORT:'Relatório',DASHBOARD:'Dashboard',PDF:'PDF',HTML:'HTML',
            DOCUMENT:'Documento',APPLICATION:'Aplicação',WORKFLOW:'Workflow',
            EXTERNAL_LINK:'Link Externo',API:'API',SCRIPT:'Script',OTHER:'Outro'}[t] || t;
  },

  _statusBadge(s) {
    return {ACTIVE:'b-g',DRAFT:'b-y',ARCHIVED:'b-s',OBSOLETE:'b-p'}[s] || 'b-s';
  },

  _slug(dt) {
    return (dt || '').toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  },

  _esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
  }
};

frappe.ready(function() { GF.init(); });
</script>
{% endblock %}
