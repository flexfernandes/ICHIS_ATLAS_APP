{% extends "templates/web.html" %}

{% block head_include %}
<script src="/assets/ichis_atlas_app/js/lucide.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Slate/grafite enterprise — verde apenas como detalhe */
  --primary:#1e293b;--primary-h:#0f172a;--primary-l:#334155;
  --primary-pale:#f1f5f9;--primary-bg:#f8fafc;
  --accent:#059669;--accent-h:#047857;--accent-l:#10b981;--accent-pale:#d1fae5;
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;
  --border:#e2e8f0;--border-h:#cbd5e1;
  --text:#0f172a;--text-m:#475569;--text-l:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.09);
  --shadow-lg:0 8px 24px rgba(0,0,0,.11);
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sidebar:272px;--header:56px
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── Layout ───────────────────────────────────────── */
#gfsk{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Header ───────────────────────────────────────── */
.gfsk-hdr{
  height:var(--header);min-height:var(--header);
  display:flex;align-items:center;gap:12px;padding:0 20px;
  background:var(--primary);color:#fff;
  box-shadow:0 2px 8px rgba(15,23,42,.22);
  z-index:100;flex-shrink:0
}
.gfsk-hdr-logo{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;letter-spacing:.5px;flex-shrink:0
}
.gfsk-hdr-title{font-weight:600;font-size:15px;letter-spacing:-.2px}
.gfsk-hdr-sub{font-size:11px;opacity:.55;margin-left:2px}
.gfsk-hdr-sep{flex:1}
.gfsk-hdr-user{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.8}
.gfsk-hdr-avatar{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700
}
.gfsk-hdr-atlas{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;
  transition:background 150ms;text-decoration:none;color:#fff
}
.gfsk-hdr-atlas:hover{background:rgba(255,255,255,.2)}

/* ── Body ─────────────────────────────────────────── */
.gfsk-body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ──────────────────────────────────────── */
.gfsk-sb{
  width:var(--sidebar);min-width:var(--sidebar);
  background:#0f172a;border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;overflow:hidden
}
.gfsk-sb-top{padding:14px 14px 10px;flex-shrink:0}
.gfsk-sb-search{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:7px 10px;
  transition:border-color 150ms
}
.gfsk-sb-search:focus-within{border-color:rgba(255,255,255,.25)}
.gfsk-sb-search input{
  border:none;outline:none;background:transparent;
  font-size:13px;color:#e2e8f0;flex:1;min-width:0
}
.gfsk-sb-search input::placeholder{color:#475569}
.gfsk-sb-search svg{flex-shrink:0;color:#475569}

.gfsk-sb-filters{
  display:flex;gap:5px;padding:8px 14px;flex-wrap:wrap;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.06)
}
.gfsk-sb-filter{
  font-size:10px;padding:3px 8px;border-radius:20px;
  border:1px solid rgba(255,255,255,.12);cursor:pointer;
  background:transparent;color:#94a3b8;
  transition:all 150ms;white-space:nowrap
}
.gfsk-sb-filter.active{background:#334155;color:#e2e8f0;border-color:#475569}
.gfsk-sb-filter:hover:not(.active){background:rgba(255,255,255,.07);color:#cbd5e1}

.gfsk-sb-list{flex:1;overflow-y:auto;padding:8px}
.gfsk-sb-list::-webkit-scrollbar{width:4px}
.gfsk-sb-list::-webkit-scrollbar-track{background:transparent}
.gfsk-sb-list::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px}

.gfsk-sb-empty{
  text-align:center;color:#475569;font-size:12px;
  padding:32px 16px;line-height:1.6
}

.sk-card{
  border-radius:8px;padding:10px 11px;margin-bottom:4px;cursor:pointer;
  border:1.5px solid transparent;transition:all 150ms;
  background:transparent
}
.sk-card:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.09)}
.sk-card.active{background:#1e293b;border-color:#334155}
.sk-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
.sk-card-name{font-weight:600;font-size:12.5px;color:#cbd5e1;line-height:1.3}
.sk-card.active .sk-card-name{color:#93c5fd}
.sk-card-ver{font-size:10px;color:#475569;white-space:nowrap;margin-top:1px}
.sk-card.active .sk-card-ver{color:#64748b}
.sk-card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.sk-card-desc{font-size:11px;color:#64748b;line-height:1.4;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.gfsk-sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.btn-new-skill{
  width:100%;display:flex;align-items:center;justify-content:center;gap:6px;
  background:#059669;color:#fff;border:none;
  border-radius:8px;padding:9px;font-size:13px;font-weight:600;
  cursor:pointer;transition:background 150ms
}
.btn-new-skill:hover{background:#047857}

/* ── Badges ───────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;
  font-size:10px;font-weight:600;padding:2px 7px;
  border-radius:20px;line-height:1.4;white-space:nowrap
}
.badge-cat{background:#ede9fe;color:#5b21b6}
.badge-draft{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
.badge-dev{background:#dbeafe;color:#1d4ed8}
.badge-test{background:#fed7aa;color:#c2410c}
.badge-submetido{background:#e0e7ff;color:#3730a3}
.badge-ativo{background:#d1fae5;color:#065f46}
.badge-inativo{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.badge-obsoleto{background:#fef9c3;color:#854d0e}
.badge-arquivado{background:#fee2e2;color:#dc2626}
.badge-prio-baixa{background:#f1f5f9;color:#64748b}
.badge-prio-normal{background:#dbeafe;color:#1d4ed8}
.badge-prio-alta{background:#fed7aa;color:#c2410c}
.badge-prio-critica{background:#fee2e2;color:#dc2626}
.badge-out{background:#f8fafc;color:#374151;border:1px solid #e2e8f0}

/* ── Main content ─────────────────────────────────── */
.gfsk-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Empty / Welcome ──────────────────────────────── */
.gfsk-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:40px;text-align:center
}
.gfsk-empty-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--primary-pale);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-m)
}
.gfsk-empty h2{font-size:20px;font-weight:700;color:var(--text)}
.gfsk-empty p{color:var(--text-m);font-size:13px;max-width:320px;line-height:1.6}
.gfsk-empty .btn-primary{
  display:flex;align-items:center;gap:6px;
  background:var(--primary);color:#fff;border:none;
  border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;
  cursor:pointer;transition:background 150ms
}
.gfsk-empty .btn-primary:hover{background:var(--primary-h)}

/* ── Detail header ────────────────────────────────── */
.gfsk-det-hdr{
  padding:18px 24px 14px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0
}
.gfsk-det-hdr-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.gfsk-det-hdr-icon{
  width:44px;height:44px;border-radius:12px;
  background:var(--primary-pale);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-m);flex-shrink:0
}
.gfsk-det-hdr-info{flex:1;min-width:0}
.gfsk-det-hdr-name{font-size:20px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px}
.gfsk-det-hdr-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gfsk-det-hdr-meta span{font-size:12px;color:var(--text-m)}
.gfsk-det-hdr-meta .sep{color:var(--border-h)}
.gfsk-det-hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.gfsk-det-hdr-desc{
  font-size:13px;color:var(--text-m);line-height:1.5;
  padding-top:8px;border-top:1px solid var(--border)
}

.btn-edit{
  display:flex;align-items:center;gap:5px;
  background:var(--primary);color:#fff;border:none;
  border-radius:7px;padding:7px 14px;font-size:12.5px;font-weight:600;
  cursor:pointer;transition:background 150ms
}
.btn-edit:hover{background:var(--primary-h)}
.btn-del{
  display:flex;align-items:center;justify-content:center;
  background:var(--surface);color:var(--text-m);
  border:1px solid var(--border);border-radius:7px;padding:7px 10px;
  cursor:pointer;transition:all 150ms
}
.btn-del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}

/* ── Action toolbar ───────────────────────────────── */
.gfsk-toolbar{
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  padding:9px 20px;background:var(--surface);
  flex-shrink:0
}
.gfsk-toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
.btn-act{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--surface);
  color:var(--text-m);transition:all 150ms;white-space:nowrap
}
.btn-act:hover{background:var(--surface2);border-color:var(--border-h)}
.btn-act:disabled{opacity:.45;cursor:not-allowed}
.btn-act.btn-primary{background:var(--primary);color:#fff;border-color:transparent}
.btn-act.btn-primary:hover{background:var(--primary-h)}
.btn-act.btn-accent{background:var(--accent);color:#fff;border-color:transparent}
.btn-act.btn-accent:hover{background:var(--accent-h)}
.btn-act.btn-outline{background:var(--surface);color:var(--primary);border-color:var(--primary-l)}
.btn-act.btn-outline:hover{background:var(--primary-pale)}
.btn-act.btn-danger{color:#dc2626}
.btn-act.btn-danger:hover{background:#fee2e2;border-color:#fca5a5}
.btn-act.btn-warn{color:#b45309}
.btn-act.btn-warn:hover{background:#fef3c7;border-color:#fde68a}

/* ── Version panel ────────────────────────────────── */
.ver-panel{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;font-size:12px
}
.ver-panel-item{display:flex;align-items:center;gap:5px;color:var(--text-m)}
.ver-panel-item strong{font-weight:600;color:var(--text)}
.ver-panel-item svg{color:var(--text-l)}
.ver-panel-submitted{
  margin-left:auto;display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;color:var(--accent);
  background:var(--accent-pale);border:1px solid rgba(16,185,129,.3);
  border-radius:20px;padding:3px 10px
}

/* ── Tabs ─────────────────────────────────────────── */
.gfsk-tabs{
  display:flex;gap:0;background:var(--surface);
  border-bottom:1px solid #eef0f4;
  padding:0 18px;flex-shrink:0;overflow-x:auto
}
.gfsk-tabs::-webkit-scrollbar{height:0}
.gfsk-tab{
  display:flex;align-items:center;gap:4px;
  padding:8px 10px;font-size:11.5px;font-weight:500;
  color:var(--text-m);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all 150ms
}
.gfsk-tab:hover{color:var(--text);background:var(--primary-pale)}
.gfsk-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.gfsk-tab-dot{
  width:4px;height:4px;border-radius:50%;
  background:var(--accent);opacity:0;transition:opacity 150ms
}
.gfsk-tab.has-content .gfsk-tab-dot{opacity:1}

/* ── Tab content ──────────────────────────────────── */
.gfsk-tab-body{flex:1;overflow-y:auto;padding:20px 24px;background:var(--bg)}
.gfsk-tab-body::-webkit-scrollbar{width:5px}
.gfsk-tab-body::-webkit-scrollbar-track{background:transparent}
.gfsk-tab-body::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:4px}

/* ── Field display (view mode) ────────────────────── */
.fld-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:16px}
.fld-grid.full{grid-template-columns:1fr}
.fld-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.fld-lbl{font-size:10.5px;font-weight:600;color:var(--text-l);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.fld-val{font-size:13.5px;color:var(--text);line-height:1.5;word-break:break-word}
.fld-val.empty{color:var(--text-l);font-style:italic;font-size:12px}
.fld-val.mono{font-family:var(--mono);font-size:12.5px;white-space:pre-wrap}
.fld-val.check{display:flex;align-items:center;gap:5px}
.fld-check-yes{color:var(--accent)}
.fld-check-no{color:var(--text-l)}

/* ── Code block ───────────────────────────────────── */
.code-block{position:relative;background:#0f172a;border-radius:var(--radius);overflow:hidden}
.code-block pre{
  padding:16px;margin:0;overflow-x:auto;
  font-family:var(--mono);font-size:12.5px;line-height:1.6;
  color:#e2e8f0;white-space:pre-wrap;word-break:break-word
}
.code-block-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:#1e293b;border-bottom:1px solid #334155
}
.code-block-label{font-size:10.5px;color:#94a3b8;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.btn-copy{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:5px;padding:4px 9px;font-size:11px;color:#cbd5e1;
  cursor:pointer;transition:all 150ms
}
.btn-copy:hover{background:rgba(255,255,255,.15)}
.btn-copy.copied{background:rgba(5,150,105,.2);border-color:rgba(16,185,129,.4);color:#6ee7b7}

.prompt-meta{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
  padding:10px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px
}
.prompt-meta-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-m)}
.prompt-meta-item strong{color:var(--text);font-weight:600}

/* ── Section heading ──────────────────────────────── */
.sec-heading{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:700;color:var(--text);
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--border)
}
.sec-heading svg{color:var(--accent)}
.sec-sep{margin:20px 0}

/* ── Form (edit/new) ──────────────────────────────── */
.gfsk-form-hdr{
  padding:16px 24px;background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0
}
.gfsk-form-hdr-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.gfsk-form-hdr-sub{font-size:12px;color:var(--text-m)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:14px}
.form-grid.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:#374151 !important;letter-spacing:.3px}
.form-label .req{color:#dc2626;margin-left:2px}
.form-desc{font-size:10.5px;color:var(--text-l);line-height:1.4;margin-top:1px}
.form-control{
  background:#f8fafc !important;border:1px solid #e2e8f0 !important;
  border-radius:7px;padding:8px 11px;font-size:13px;color:#0f172a !important;
  outline:none;transition:border-color 150ms,box-shadow 150ms;font-family:var(--font);
  width:100%
}
.form-control:focus{
  background:#ffffff !important;border-color:#94a3b8 !important;
  box-shadow:0 0 0 3px rgba(71,85,105,.10) !important
}
textarea.form-control{
  resize:vertical;min-height:90px;line-height:1.6;
  background:#f8fafc !important
}
textarea.form-control.mono{font-family:var(--mono);font-size:12.5px}
select.form-control{cursor:pointer}
.form-check{display:flex;align-items:center;gap:8px;padding:8px 0}
.form-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.form-check label{font-size:13px;color:var(--text);cursor:pointer}

.gfsk-form-foot{
  padding:12px 24px;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-shrink:0
}
.btn-cancel{
  background:var(--surface);color:var(--text-m);
  border:1px solid var(--border);border-radius:7px;
  padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:all 150ms
}
.btn-cancel:hover{background:var(--surface2)}
.btn-save{
  display:flex;align-items:center;gap:6px;
  background:var(--primary);color:#fff;border:none;
  border-radius:7px;padding:8px 20px;font-size:13px;font-weight:600;
  cursor:pointer;transition:background 150ms
}
.btn-save:hover{background:var(--primary-h)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── Toast ────────────────────────────────────────── */
#gfsk-toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none
}
.toast{
  display:flex;align-items:center;gap:10px;
  background:#fff;color:var(--text);
  border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;font-size:13px;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.07);
  pointer-events:auto;min-width:270px;max-width:380px;
  animation:toastIn 220ms ease
}
.toast.success{background:#f0fdf4;color:#065f46;border-color:#a7f3d0}
.toast.error{background:#fef2f2;color:#991b1b;border-color:#fca5a5}
.toast.info{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.toast-icon{flex-shrink:0}
.toast-msg{flex:1;line-height:1.4}
.toast-close{
  flex-shrink:0;background:none;border:none;cursor:pointer;
  color:inherit;opacity:.4;padding:2px;display:flex;align-items:center;
  border-radius:4px;transition:opacity 150ms
}
.toast-close:hover{opacity:.8}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(6px)}}
.toast.leaving{animation:toastOut 180ms ease forwards}

/* ── Loading ──────────────────────────────────────── */
.gfsk-loading{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;color:var(--text-l)
}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin 700ms linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

<div id="gfsk">

  <!-- Header -->
  <header class="gfsk-hdr">

    <div>
      <div class="gfsk-hdr-title">GF Skill</div>
    </div>
    <div class="gfsk-hdr-sub">Central de Skills Corporativos</div>
    <div class="gfsk-hdr-sep"></div>
    <a class="gfsk-hdr-atlas" href="/gf-atlas">
      <i data-lucide="layout-dashboard" style="width:13px;height:13px"></i>
      Wiki Hub
    </a>
    <div class="gfsk-hdr-user">
      <div class="gfsk-hdr-avatar" id="gfsk-avatar">GF</div>

          <input type="text" placeholder="Buscar Skills..." id="gfsk-search" autocomplete="off">
        </div>
      </div>

      <div class="gfsk-sb-filters" id="gfsk-filters">
        <span class="gfsk-sb-filter" data-status="">Todos</span>
        <span class="gfsk-sb-filter" data-status="Draft">Draft</span>
        <span class="gfsk-sb-filter active" data-status="Submetido">Submetidos</span>

<div id="gfsk-toast"></div>

<script>
/* ════════════════════════════════════════════════════
   GF Skill App
   ════════════════════════════════════════════════════ */

const TABS = [
  { id:'general',      label:'Informações Gerais', icon:'info' },
  { id:'instructions', label:'Instruções',         icon:'list' },
  { id:'style',        label:'Estilo',             icon:'type' },
  { id:'css',          label:'Script CSS',         icon:'braces' },
  { id:'header',       label:'Cabeçalho',          icon:'layout' },
  { id:'footer',       label:'Rodapé',             icon:'layout' },
  { id:'example',      label:'Exemplo Completo',   icon:'code-2' },
  { id:'technical',    label:'Campos Técnicos',    icon:'settings' },
  { id:'prompt',       label:'Prompt Completo',    icon:'zap' },
];

const STATUS_COLORS = {
  'Draft':'draft','Em Desenvolvimento':'dev','Em Teste':'test',
  'Submetido':'submetido','Ativo':'ativo','Inativo':'inativo',
  'Obsoleto':'obsoleto','Arquivado':'arquivado'
};

const CATEGORIES = [
  'Documentação','HTML','ERPNext','Relatórios','Prompt Engineering','Automação',
  'IA e Agentes','Programação','SQL e Banco de Dados','APIs e Integrações',
  'Frontend','Backend','DevOps e Cloud','Segurança','Comercial','Engenharia',
  'Industrial','Qualidade','Financeiro','Jurídico','RH','Templates','Padrões Corporativos','Outros'
];
const STATUSES = ['Draft','Em Desenvolvimento','Em Teste','Submetido','Ativo','Inativo','Obsoleto','Arquivado'];
const OUTPUT_TYPES = ['HTML','Markdown','Texto','JSON','SQL','Python','JavaScript','CSS','XML','YAML','Relatório','Prompt','Documentação','API','Workflow','Outro'];
const PRIORITIES = ['','Baixa','Normal','Alta','Crítica'];

class GFSkillApp {
  constructor() {
    this.skills     = [];
    this.selected   = null;
    this.mode       = 'empty'; // empty | view | edit | new
    this.activeTab  = 0;
    this.editData   = {};
    this.filterQ    = '';
    this.filterSt   = 'Submetido';
    this._saving    = false;
  }

  async init() {
    try { this._setupUser(); }    catch(e) {}
    try { this._bindSidebar(); } catch(e) {}
    try { await this._loadSkills(); } catch(e) { this.skills = []; try { this._renderList(); } catch(_) {} }
    try { this._renderEmpty(); } catch(e) {
      const $m = document.getElementById('gfsk-main');
      if ($m) $m.innerHTML = `<div style="padding:40px;color:#dc2626">Erro ao inicializar: ${e.message}</div>`;
    }
    if (window.lucide) try { lucide.createIcons({ attrs:{ style:'display:block' } }); } catch(e) {}
  }

  // ── User ──────────────────────────────────────────
  _setupUser() {
    const full = frappe.session.user_fullname || frappe.session.user || 'Usuário';
    const init = full.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase() || 'GF';
    const $av  = document.getElementById('gfsk-avatar');
    const $un  = document.getElementById('gfsk-username');
    if ($av) $av.textContent = init;
    if ($un) $un.textContent = full.split(' ')[0];
  }

  // ── Load Skills ───────────────────────────────────
  // NOTE: when tabGF Skill doesn't exist yet (pre-migrate), Frappe returns HTTP 200
  // with {"exc":"...traceback..."} — it shows its own alert and silently drops both
  // callback and error handlers, leaving the Promise pending forever.
  // The timeout is the only reliable escape hatch in that scenario.
  _loadSkills() {
    return new Promise((resolve) => {
      const done = (data) => {
        clearTimeout(timer);
        this.skills = data || [];
        try { this._renderList(); } catch(e) {}
        resolve();
      };
      // 6-second safety timeout: resolves even if frappe.call never responds
      const timer = setTimeout(() => done([]), 6000);
      try {
        frappe.call({
          method: 'frappe.client.get_list',
          args: {
            doctype: 'GF Skill',
            fields: ['name','skill_name','internal_name','category','status','version',
                     'short_description','skill_owner','active','output_type','skill_priority',
                     'tags','docstatus'],
            order_by: 'modified desc',
            limit_page_length: 2000
          },
          callback: (r) => done((r && r.message) ? r.message : []),
          error:    ()  => done([])
        });
      } catch(e) { done([]); }
    });
  }

  // ── Sidebar bindings ──────────────────────────────
  _bindSidebar() {
    document.getElementById('gfsk-search').addEventListener('input', e => {
      this.filterQ = e.target.value.toLowerCase().trim();
      this._renderList();
    });
    document.getElementById('gfsk-filters').addEventListener('click', e => {
      const f = e.target.closest('.gfsk-sb-filter');
      if (!f) return;
      document.querySelectorAll('.gfsk-sb-filter').forEach(x=>x.classList.remove('active'));
      f.classList.add('active');
      this.filterSt = f.dataset.status;
      this._renderList();
    });
    document.getElementById('btn-new-skill').addEventListener('click', () => this._startNew());
  }

  // ── Render list ───────────────────────────────────
  _renderList() {
    const $list = document.getElementById('gfsk-list');
    if (!$list) return;
    let items = this.skills || [];
    if (this.filterQ) {
      items = items.filter(s =>
        (s.skill_name||'').toLowerCase().includes(this.filterQ) ||
        (s.category||'').toLowerCase().includes(this.filterQ) ||
        (s.tags||'').toLowerCase().includes(this.filterQ) ||
        (s.short_description||'').toLowerCase().includes(this.filterQ)
      );
    }
    if (this.filterSt) {
      items = items.filter(s => s.status === this.filterSt);
    }
    if (!items.length) {
      $list.innerHTML = `<div class="gfsk-sb-empty">Nenhum Skill encontrado.</div>`;
      return;
    }
    $list.innerHTML = items.map(s => {
      const stCls  = STATUS_COLORS[s.status] || 'draft';
      const active = this.selected && this.selected.name === s.name ? ' active' : '';
      return `<div class="sk-card${active}" data-name="${this._esc(s.name)}"
                   onclick="app.selectSkill('${this._esc(s.name)}')">
        <div class="sk-card-top">
          <div class="sk-card-name">${this._esc(s.skill_name||s.name)}</div>
          <div class="sk-card-ver">v${this._esc(s.version||'—')}</div>
        </div>
        <div class="sk-card-badges">
          ${s.category ? `<span class="badge badge-cat">${this._esc(s.category)}</span>` : ''}
          ${s.status   ? `<span class="badge badge-${stCls}">${this._esc(s.status)}</span>` : ''}
        </div>
        <div class="sk-card-desc">${this._esc(s.short_description||'')}</div>
      </div>`;
    }).join('');
  }

  // ── Select skill ──────────────────────────────────
  selectSkill(name) {
    const $main = document.getElementById('gfsk-main');
    $main.innerHTML = `<div class="gfsk-loading" style="flex:1"><div class="spinner"></div><span>Carregando...</span></div>`;
    frappe.call({
      method: 'frappe.client.get',
      args: { doctype:'GF Skill', name },
      callback: (r) => {
        if (r && r.message) {
          this.selected  = r.message;
          this.activeTab = 0;
          this.mode      = 'view';
          this._renderView();
          this._markActive(name);
        } else {
          this._toast('Skill não encontrado.','error');
          this._renderEmpty();
        }
      },
      error: () => { this._toast('Erro ao carregar o Skill.','error'); this._renderEmpty(); }
    });
  }

  _markActive(name) {
    document.querySelectorAll('.sk-card').forEach(c => {
      c.classList.toggle('active', c.dataset.name === name);
    });
  }

  // ── Render empty ──────────────────────────────────
  _renderEmpty() {
    const $main = document.getElementById('gfsk-main');
    $main.innerHTML = `
      <div class="gfsk-empty">
        <div class="gfsk-empty-icon">
          <i data-lucide="zap" style="width:32px;height:32px"></i>
        </div>
        <h2>Central de Skills</h2>
        <p>Selecione um Skill na lista ou crie um novo para começar.</p>
        <button class="btn-primary" onclick="app._startNew()">
          <i data-lucide="plus" style="width:15px;height:15px"></i>
          Criar Novo Skill
        </button>
      </div>`;
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this.selected = null;
    document.querySelectorAll('.sk-card').forEach(c=>c.classList.remove('active'));
  }

  // ── Render view ───────────────────────────────────
  _renderView() {
    const s = this.selected;
    const $main = document.getElementById('gfsk-main');
    const isDraft   = s.docstatus === 0;
    const isLocked  = s.status === 'Inativo' || s.status === 'Obsoleto' || s.status === 'Arquivado';
    const stCls     = STATUS_COLORS[s.status] || 'draft';

    const modified = s.modified ? s.modified.substring(0,16).replace('T',' ') : '—';

    $main.innerHTML = `
      <!-- Detail Header -->
      <div class="gfsk-det-hdr">
        <div class="gfsk-det-hdr-top">
          <div class="gfsk-det-hdr-icon">
            <i data-lucide="zap" style="width:22px;height:22px"></i>
          </div>
          <div class="gfsk-det-hdr-info">
            <div class="gfsk-det-hdr-name">${this._esc(s.skill_name||s.name)}</div>
            <div class="gfsk-det-hdr-meta">
              <span class="badge badge-${stCls}">${this._esc(s.status||'Draft')}</span>
              ${s.category ? `<span class="badge badge-cat">${this._esc(s.category)}</span>` : ''}
              ${s.output_type ? `<span class="badge badge-out">${this._esc(s.output_type)}</span>` : ''}
              ${s.skill_priority ? `<span class="badge badge-prio-${(s.skill_priority||'').toLowerCase()}">${this._esc(s.skill_priority)}</span>` : ''}
              <span class="sep">·</span>
              <span>v${this._esc(s.version||'1.0.0')}</span>
              ${s.skill_owner ? `<span class="sep">·</span><span>${this._esc(s.skill_owner)}</span>` : ''}
            </div>
          </div>
        </div>
        ${s.short_description ? `<div class="gfsk-det-hdr-desc">${this._esc(s.short_description)}</div>` : ''}
      </div>

      <!-- Version panel -->
      <div class="ver-panel">
        <div class="ver-panel-item"><i data-lucide="tag" style="width:12px;height:12px"></i><span>Versão</span><strong>v${this._esc(s.version||'1.0.0')}</strong></div>
        <div class="ver-panel-item"><i data-lucide="activity" style="width:12px;height:12px"></i><span>Status</span><strong>${this._esc(s.status||'—')}</strong></div>
        <div class="ver-panel-item"><i data-lucide="clock" style="width:12px;height:12px"></i><span>Modificado</span><strong>${modified}</strong></div>
        ${s.skill_owner ? `<div class="ver-panel-item"><i data-lucide="user" style="width:12px;height:12px"></i><span>Responsável</span><strong>${this._esc(s.skill_owner)}</strong></div>` : ''}
        ${s.docstatus===1 ? `<div class="ver-panel-submitted"><i data-lucide="check-circle" style="width:12px;height:12px"></i> Submetido</div>` : ''}
      </div>

      <!-- Action toolbar — botões variam por docstatus e status -->
      <div class="gfsk-toolbar">
        ${isLocked ? `
          <div class="skill-locked-notice">
            <i data-lucide="lock" style="width:13px;height:13px"></i>
            Este Skill está <strong>&nbsp;${this._esc(s.status)}&nbsp;</strong> — somente duplicação é permitida para preservar rastreabilidade.
          </div>
          <div class="gfsk-toolbar-sep"></div>
          <button class="btn-act" onclick="app._duplicateSkill()">
            <i data-lucide="copy" style="width:13px;height:13px"></i> Duplicar
          </button>
        ` : `
          ${isDraft ? `
            <button class="btn-act btn-primary" onclick="app._startEdit()">
              <i data-lucide="edit-2" style="width:13px;height:13px"></i> Editar
            </button>
            <button class="btn-act btn-accent" onclick="app._submitSkill()">
              <i data-lucide="send" style="width:13px;height:13px"></i> Submeter
            </button>
            <div class="gfsk-toolbar-sep"></div>` : ''}
          <button class="btn-act" onclick="app._duplicateSkill()">
            <i data-lucide="copy" style="width:13px;height:13px"></i> Duplicar
          </button>
          ${s.status === 'Submetido' && s.active ? `
          <button class="btn-act" onclick="app._newVersion()">
            <i data-lucide="git-branch" style="width:13px;height:13px"></i> Nova Versão
          </button>` : ''}
          ${!isDraft ? `
            <button class="btn-act" onclick="app._viewHistory()">
              <i data-lucide="history" style="width:13px;height:13px"></i> Histórico
            </button>` : ''}
          <div class="gfsk-toolbar-sep"></div>
          <button class="btn-act btn-warn" onclick="app._markObsolete()">
            <i data-lucide="archive" style="width:13px;height:13px"></i> Marcar Obsoleto
          </button>
          ${isDraft ? `
            <div class="gfsk-toolbar-sep"></div>
            <button class="btn-act btn-danger" onclick="app._deleteSkill()">
              <i data-lucide="trash-2" style="width:13px;height:13px"></i> Excluir
            </button>` : ''}
          <div class="gfsk-toolbar-sep"></div>
          <button class="btn-act btn-outline" onclick="app._startNew()">
            <i data-lucide="plus" style="width:13px;height:13px"></i> Novo Skill
          </button>
        `}
      </div>

      <!-- Tabs -->
      ${this._buildTabBar()}

      <!-- Tab body -->
      <div class="gfsk-tab-body" id="gfsk-tab-body">
        ${this._renderTabContent(this.activeTab)}
      </div>`;

    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this._initFieldViewers();
    if (this.activeTab === 3) this._initCssViewer();
    if (this.activeTab === 8) this._initPromptViewer();
  }

  // ── Tab bar ───────────────────────────────────────
  _buildTabBar() {
    return `<div class="gfsk-tabs">${TABS.map((t,i)=>`
      <div class="gfsk-tab${i===this.activeTab?' active':''}" onclick="app._switchTab(${i})">
        <i data-lucide="${t.icon}" style="width:11px;height:11px"></i>
        ${t.label}
        <div class="gfsk-tab-dot"></div>
      </div>`).join('')}</div>`;
  }

  _switchTab(idx) {
    this.activeTab = idx;
    // Re-render tabs bar active state
    document.querySelectorAll('.gfsk-tab').forEach((el,i)=>{
      el.classList.toggle('active', i===idx);
    });
    const $body = document.getElementById('gfsk-tab-body');
    if ($body) {
      $body.innerHTML = this.mode==='edit' || this.mode==='new'
        ? this._renderTabForm(idx)
        : this._renderTabContent(idx);
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
      if (this.mode==='edit'||this.mode==='new') this._initTabEditors();
      else { this._initFieldViewers(); if (idx===3) this._initCssViewer(); }
      if (idx === 8) this._initPromptViewer();
    }
  }

  // ── Tab content (view) ────────────────────────────
  _renderTabContent(idx) {
    const s = this.selected || {};
    const v = (f) => s[f] || '';
    const fld = (label, val, mono=false) => {
      const empty = !val;
      return `<div class="fld-box">
        <div class="fld-lbl">${label}</div>
        <div class="fld-val${mono?' mono':''}${empty?' empty':''}">${empty?'—':this._esc(val)}</div>
      </div>`;
    };
    const fldFull = (label, val, mono=false) => {
      if (!val) return `<div class="fld-box"><div class="fld-lbl">${label}</div><div class="fld-val empty">—</div></div>`;

        <div class="fld-lbl">${label}</div>
        <div class="fld-val${mono?' mono':''}">${this._esc(val)}</div>
      </div>`;
    };
    const chk = (label, val) => `<div class="fld-box">
      <div class="fld-lbl">${label}</div>
      <div class="fld-val check">
        ${val ? `<i data-lucide="check-circle" style="width:14px;height:14px" class="fld-check-yes"></i><span>Sim</span>`
              : `<i data-lucide="x-circle" style="width:14px;height:14px" class="fld-check-no"></i><span>Não</span>`}
      </div>

    const fldCM = (label, val, id, mode='markdown') => {
      if (!val) return `<div class="fld-box" style="grid-column:1/-1">
        <div class="fld-lbl">${label}</div>
        <div class="fld-val empty">—</div>
      </div>`;
      const lines = val.split('\n').length;

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px">

          <div class="prompt-meta" style="margin:0">
            <div class="prompt-meta-item"><i data-lucide="list" style="width:12px;height:12px"></i> <strong>${lines}</strong> linhas</div>
            <div class="prompt-meta-item"><i data-lucide="hash" style="width:12px;height:12px"></i> <strong>${val.length}</strong> chars</div>
            <button class="btn-copy" onclick="app._copyViewerById('${id}',this)">
              <i data-lucide="copy" style="width:12px;height:12px"></i> Copiar
            </button>
          </div>
        </div>
        <textarea data-view-cm="${id}" data-view-mode="${mode}" style="display:none">${this._esc(val)}</textarea>

    switch(idx) {
      case 0: {

            <div class="skill-tech-sep"></div>
            ${v('output_type') ? `
              <div class="skill-tech-chip">

            ${v('default_language') ? `
              <div class="skill-tech-chip">

            ${v('skill_priority') ? `

          <!-- Propósito -->
          ${v('purpose') ? `

          <!-- Quando usar / Quando NÃO usar -->
          ${(v('when_to_use') || v('when_not_to_use')) ? `

                  <div class="skill-when-hdr no">

            ${v('short_description') ? `

  // ── Field data helper ─────────────────────────────
  _fd(field, val) {
    this.editData[field] = val;
    // Auto-fill internal_name from skill_name (new mode only)
    if (field === 'skill_name' && (!this.editData.internal_name || this.mode === 'new')) {
      const slug = val.toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g,'')
        .replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
      this.editData.internal_name = slug;
      const inp = document.querySelector('[oninput*="internal_name"]');
      if (inp) inp.value = slug;
    }
    // Auto-desativa quando status bloqueado
    if (field === 'status' && ['Inativo','Obsoleto','Arquivado'].includes(val)) {
      this.editData.active = 0;
      const chk = document.getElementById('chk_active');
      if (chk) chk.checked = false;
    }
  }

  // ── Start Edit ────────────────────────────────────
  _startEdit() {
    this.mode      = 'edit';
    this.activeTab = 0;
    this.editData  = Object.assign({}, this.selected);
    this._renderEditMode();
  }

  // ── Start New ─────────────────────────────────────
  _startNew() {
    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = {
      status: 'Draft', version: '1.0.0', active: 1,
      skill_owner: frappe.session.user
    };
    document.querySelectorAll('.sk-card').forEach(c=>c.classList.remove('active'));
    this._renderEditMode();
  }

  // ── Render edit/new mode ──────────────────────────
  _renderEditMode() {
    const isNew       = this.mode === 'new';
    const isNewVer    = isNew && !!this.editData._isNewVersion;
    const title       = isNewVer
      ? `Nova Versão — ${this.editData.skill_name || '—'} (v${this.editData.version || '—'})`
      : isNew ? 'Novo Skill'
      : `Editando: ${this.editData.skill_name || this.editData.name || '—'}`;
    const saveLabel   = isNewVer ? 'Salvar Nova Versão' : 'Salvar Skill';
    const saveIcon    = isNewVer ? 'git-branch' : 'save';
    const $main = document.getElementById('gfsk-main');
    $main.innerHTML = `
      <div class="gfsk-form-hdr">
        <div>
          <div class="gfsk-form-hdr-title">${this._esc(title)}</div>
          <div class="gfsk-form-hdr-sub">Preencha as abas e clique em Salvar para gerar o Prompt Completo.</div>
        </div>
      </div>
      <div class="gfsk-toolbar">
        <button class="btn-act btn-primary" id="gfsk-btn-save" onclick="app._save()">
          <i data-lucide="${saveIcon}" style="width:13px;height:13px"></i> ${saveLabel}
        </button>
        <button class="btn-act" onclick="app._cancelEdit()">
          <i data-lucide="x" style="width:13px;height:13px"></i> Cancelar
        </button>
        ${this.mode !== 'new' ? `
        <div class="gfsk-toolbar-sep"></div>
        <button class="btn-act btn-outline" onclick="app._startNew()">
          <i data-lucide="plus" style="width:13px;height:13px"></i> Novo Skill
        </button>` : ''}
      </div>
      ${this._buildTabBar()}
      <div class="gfsk-tab-body" id="gfsk-tab-body" style="flex:1;overflow-y:auto">
        ${this._renderTabForm(this.activeTab)}
      </div>
      <div class="gfsk-form-foot">
        <button class="btn-cancel" onclick="app._cancelEdit()">Cancelar</button>
        <button class="btn-save" onclick="app._save()">
          <i data-lucide="${saveIcon}" style="width:14px;height:14px"></i>
          ${saveLabel}
        </button>
      </div>`;
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    this._initTabEditors();
  }

  // ── Tab Editors (CodeMirror — todos os campos longos) ──
  _initTabEditors() {
    if (!window.CodeMirror) return;
    document.querySelectorAll('#gfsk-tab-body textarea[data-cm]').forEach(ta => {
      const field  = ta.dataset.cm;
      const mode   = ta.dataset.mode || 'markdown';
      const height = ta.dataset.height || '456px';
      const wrap   = !ta.dataset.mode; // markdown quebra linha; css não
      const cm = CodeMirror.fromTextArea(ta, {
        mode:           mode,
        theme:          'material-darker',
        lineNumbers:    true,
        lineWrapping:   wrap,
        tabSize:        2,
        indentWithTabs: false,
        extraKeys: { Tab: cm => cm.execCommand('indentMore'), 'Shift-Tab': cm => cm.execCommand('indentLess') }
      });
      cm.setSize('100%', height);
      cm.on('change', (cm) => { this._fd(field, cm.getValue()); });
    });
  }

  // ── Field Viewers (CodeMirror read-only — todos os campos de texto) ──
  _initFieldViewers() {
    if (!window.CodeMirror) return;
    if (this._cmViewers) {
      Object.values(this._cmViewers).forEach(cm => { try { cm.toTextArea(); } catch(e){} });
    }
    this._cmViewers = {};
    document.querySelectorAll('#gfsk-tab-body textarea[data-view-cm]').forEach(ta => {
      const id   = ta.dataset.viewCm;
      const mode = ta.dataset.viewMode || 'markdown';
      const wrap = mode === 'markdown';
      const cm = CodeMirror.fromTextArea(ta, {
        mode,
        theme:        'material-darker',
        lineNumbers:  true,
        lineWrapping: wrap,
        readOnly:     true,
        tabSize:      2
      });
      cm.setSize('100%', '540px');
      this._cmViewers[id] = cm;
    });
  }

  _copyViewerById(id, btn) {
    const cm = this._cmViewers && this._cmViewers[id];
    const text = cm ? cm.getValue() : '';
    if (text) this._copyText(text, btn);
  }

  // ── CSS Viewer (CodeMirror read-only) ────────────
  _initCssViewer() {
    if (!window.CodeMirror) return;
    const ta = document.getElementById('gfsk-css-viewer');
    if (!ta) return;
    if (this._cmCssView) { try { this._cmCssView.toTextArea(); } catch(e){} this._cmCssView = null; }
    this._cmCssView = CodeMirror.fromTextArea(ta, {
      mode: 'css',
      theme: 'material-darker',
      lineNumbers: true,
      lineWrapping: false,
      readOnly: true,
      tabSize: 2
    });
    this._cmCssView.setSize('100%', '420px');
  }

  _copyCssView(btn) {
    const text = this._cmCssView ? this._cmCssView.getValue() : '';
    if (text) this._copyText(text, btn);
  }

  // ── Prompt Viewer (CodeMirror read-only) ─────────
  _initPromptViewer() {
    if (!window.CodeMirror) return;
    const ta = document.getElementById('gfsk-prompt-viewer');
    if (!ta) return;
    if (this._cmPrompt) { try { this._cmPrompt.toTextArea(); } catch(e){} this._cmPrompt = null; }
    this._cmPrompt = CodeMirror.fromTextArea(ta, {
      mode: 'markdown',
      theme: 'material-darker',
      lineNumbers: true,
      lineWrapping: true,
      readOnly: true,
      tabSize: 2
    });
    this._cmPrompt.setSize('100%', '540px');
  }

  _copyPrompt(btn) {
    const text = this._cmPrompt ? this._cmPrompt.getValue() : '';
    if (text) this._copyText(text, btn);
  }

  // ── Cancel edit ───────────────────────────────────
  _cancelEdit() {
    if (this.selected) {
      this.mode = 'view';
      this._renderView();
    } else {
      this._renderEmpty();
    }
  }

  // ── Save ──────────────────────────────────────────
  async _save() {
    if (this._saving) return;
    const d = this.editData;

    // Basic validation
    const required = [
      ['skill_name','Skill Name'],['internal_name','Internal Name'],
      ['category','Category'],['status','Status'],
      ['version','Version'],['skill_owner','Owner'],
      ['short_description','Short Description'],
      ['purpose','Purpose'],['main_instructions','Main Instructions'],
      ['mandatory_rules','Mandatory Rules'],
      ['writing_style','Writing Style'],['visual_style','Visual Style'],
      ['output_type','Output Type']
    ];
    for (const [f, lbl] of required) {
      if (!d[f] || !String(d[f]).trim()) {
        this._toast(`Campo obrigatório: ${lbl}`, 'error');
        return;
      }
    }

    this._saving = true;
    const $btn = document.getElementById('gfsk-btn-save');
    const resetBtn = () => {
      if ($btn) { $btn.disabled = false; $btn.innerHTML = '<i data-lucide="save" style="width:14px;height:14px"></i> Salvar Skill'; if(window.lucide)lucide.createIcons({attrs:{style:'display:block'}}); }
      this._saving = false;
    };
    if ($btn) { $btn.disabled = true; $btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Salvando...'; }

    const originToDeactivate = (this.mode === 'new') ? (d._originSkillName || null) : null;

    // Em modo edição, busca o doc mais recente para evitar erro de timestamp desatualizado
    const buildAndSave = (baseDoc) => {
      const method = this.mode === 'new' ? 'frappe.client.insert' : 'frappe.client.save';
      const doc    = this.mode === 'new'
        ? Object.assign({ doctype:'GF Skill' }, d)
        : Object.assign({}, baseDoc, d, { doctype:'GF Skill', name:this.selected.name, modified:baseDoc.modified });

      frappe.call({
        method,
        args: { doc },
        callback: (r) => {
          if (r && r.message) {
            const saved = r.message;
            const finish = () => {
              this._saving = false;
              this._loadSkills().then(() => {
                this.selected  = saved;
                this.mode      = 'view';
                this.activeTab = 0;
                this._renderView();
                this._markActive(saved.name);
              });
            };
            if (originToDeactivate) {
              frappe.call({
                method: 'frappe.client.set_value',
                args: { doctype:'GF Skill', name:originToDeactivate, fieldname:'active', value:0 },
                callback: () => { this._toast('Skill salvo! Versão anterior desativada.', 'success'); finish(); },
                error:    () => { this._toast('Skill salvo, mas não foi possível desativar a versão anterior.', 'info'); finish(); }
              });
            } else {
              this._toast('Skill salvo com sucesso!', 'success');
              finish();
            }
          } else {
            this._toast('Erro ao salvar o Skill.', 'error');
            resetBtn();
          }
        },
        error: () => { this._toast('Erro ao salvar o Skill.', 'error'); resetBtn(); }
      });
    };

    if (this.mode === 'edit') {
      // Busca doc fresco para garantir modified timestamp atualizado
      frappe.call({
        method: 'frappe.client.get',
        args: { doctype: 'GF Skill', name: this.selected.name },
        callback: (r) => {
          if (!r.message) { this._toast('Erro ao carregar o Skill.', 'error'); resetBtn(); return; }
          buildAndSave(r.message);
        },
        error: () => { this._toast('Erro ao carregar o Skill.', 'error'); resetBtn(); }
      });
    } else {
      buildAndSave(null);
    }
  }

  // ── Submit ────────────────────────────────────────
  _submitSkill() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.confirm('Submeter o Skill? Após submetido, não poderá ser editado diretamente.',
      () => {
        // Busca o doc mais recente para evitar erro de "modified after you opened it"
        frappe.call({
          method: 'frappe.client.get',
          args: { doctype: 'GF Skill', name },
          callback: (r) => {
            if (!r.message) { this._toast('Erro ao carregar o Skill.', 'error'); return; }
            frappe.call({
              method: 'frappe.client.submit',
              args: { doc: r.message },
              callback: () => { this._toast('Skill submetido!', 'success'); this.selectSkill(name); },
              error:    () => { this._toast('Erro ao submeter o Skill.', 'error'); }
            });
          },
          error: () => { this._toast('Erro ao carregar o Skill.', 'error'); }
        });
      }
    );
  }

  // ── Delete ────────────────────────────────────────
  _deleteSkill() {
    if (!this.selected) return;
    const name  = this.selected.name;
    const label = this.selected.skill_name || name;
    frappe.confirm(`Excluir o Skill "${label}"? Esta ação não pode ser desfeita.`,
      () => {
        frappe.call({
          method: 'frappe.client.delete',
          args: { doctype:'GF Skill', name },
          callback: () => {
            this._toast('Skill excluído.', 'info');
            this.selected = null;
            this._loadSkills().then(() => this._renderEmpty());
          },
          error: () => { this._toast('Erro ao excluir. Verifique permissões.', 'error'); }
        });
      }
    );
  }

  // ── Duplicate ─────────────────────────────────────
  _duplicateSkill() {
    if (!this.selected) return;
    const s = this.selected;
    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = Object.assign({}, s, {
      name: undefined,
      internal_name: (s.internal_name || '') + '_copia',
      skill_name:    (s.skill_name || '') + ' (Cópia)',
      status:        'Draft',
      docstatus:     0,
      version:       '1.0.0',
      full_prompt:   ''
    });
    document.querySelectorAll('.sk-card').forEach(c => c.classList.remove('active'));
    this._renderEditMode();
    this._toast('Skill duplicado. Ajuste os campos e salve.', 'info');
  }

  // ── New Version ───────────────────────────────────
  _newVersion() {
    if (!this.selected) return;
    const s   = this.selected;
    const ver = s.version || '1.0.0';
    const parts = ver.split('.').map(Number);
    parts[1] = (parts[1] || 0) + 1;
    parts[2] = 0;
    const newVer = parts.join('.');
    const today  = new Date().toLocaleDateString('pt-BR');
    const originRef = s.internal_name || s.name || '—';

    // Append new entry to existing version history
    const prevHistory = (s.version_history || '').trim();
    const historyEntry = `v${newVer} → Draft criado a partir de "${originRef}" v${ver} em ${today}`;
    const newHistory   = prevHistory ? prevHistory + '\n' + historyEntry : historyEntry;

    this.mode      = 'new';
    this.activeTab = 0;
    this.selected  = null;
    this.editData  = Object.assign({}, s, {
      name:             undefined,
      internal_name:    (s.internal_name || '') + '_v' + newVer.replace(/\./g,'_'),
      status:           'Draft',
      docstatus:        0,
      version:          newVer,
      version_notes:    `v${newVer} — Criado a partir de "${originRef}" v${ver} em ${today}.`,
      version_history:  newHistory,
      full_prompt:      '',
      previous_version: s.name,  // rastreabilidade: referência ao skill de origem
      _originSkillName: s.name,  // usado em _save() para desativar a versão anterior
      _isNewVersion:    true     // diferencia "nova versão" de "novo skill do zero"
    });
    document.querySelectorAll('.sk-card').forEach(c => c.classList.remove('active'));
    this._renderEditMode();
    this._toast(`Nova versão v${newVer} criada a partir de v${ver}. Ajuste e salve.`, 'info');
  }

  // ── Mark Obsolete ─────────────────────────────────
  _markObsolete() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.confirm('Marcar este Skill como Obsoleto? O campo Ativo será desativado automaticamente.', () => {
      frappe.call({
        method: 'frappe.client.set_value',
        args: { doctype:'GF Skill', name, fieldname:'active', value:0 },
        callback: () => {
          frappe.call({
            method: 'frappe.client.set_value',
            args: { doctype:'GF Skill', name, fieldname:'status', value:'Obsoleto' },
            callback: () => { this._toast('Skill marcado como Obsoleto.', 'info'); this.selectSkill(name); },
            error:    () => { this._toast('Erro ao atualizar status.', 'error'); }
          });
        },
        error: () => { this._toast('Erro ao atualizar.', 'error'); }
      });
    });
  }

  // ── Inactivate / Activate ─────────────────────────
  _inactivate() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.confirm('Inativar este Skill? O status será alterado para Inativo.', () => {
      frappe.call({
        method: 'frappe.client.set_value',
        args: { doctype:'GF Skill', name, fieldname:'active', value:0 },
        callback: () => {
          frappe.call({
            method: 'frappe.client.set_value',
            args: { doctype:'GF Skill', name, fieldname:'status', value:'Inativo' },
            callback: () => { this._toast('Skill inativado.', 'info'); this.selectSkill(name); },
            error:    () => { this._toast('Erro ao atualizar status.', 'error'); }
          });
        },
        error: () => { this._toast('Erro ao inativar.', 'error'); }
      });
    });
  }

  _activate() {
    if (!this.selected) return;
    const name = this.selected.name;
    frappe.call({
      method: 'frappe.client.set_value',
      args: { doctype:'GF Skill', name, fieldname:'active', value:1 },
      callback: () => {
        frappe.call({
          method: 'frappe.client.set_value',
          args: { doctype:'GF Skill', name, fieldname:'status', value:'Ativo' },
          callback: () => { this._toast('Skill ativado com sucesso.', 'success'); this.selectSkill(name); },
          error:    () => { this._toast('Erro ao atualizar status.', 'error'); }
        });
      },
      error: () => { this._toast('Erro ao ativar.', 'error'); }
    });
  }

  // ── View History ──────────────────────────────────
  _viewHistory() {
    this.activeTab = 7;
    document.querySelectorAll('.gfsk-tab').forEach((el,i) => el.classList.toggle('active', i===7));
    const $body = document.getElementById('gfsk-tab-body');
    if ($body) {
      $body.innerHTML = this._renderTabContent(6);
      if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    }
  }

  // ── Copy helper ───────────────────────────────────
  _copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      if (btn) {
        const orig = btn.innerHTML;
        btn.classList.add('copied');
        btn.innerHTML = '<i data-lucide="check" style="width:12px;height:12px"></i> Copiado!';
        if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; if(window.lucide)lucide.createIcons({attrs:{style:'display:block'}}); }, 2000);
      }
    }).catch(() => this._toast('Erro ao copiar.','error'));
  }

  // ── Confirm dialog ────────────────────────────────
  _confirm(msg) {
    return new Promise(resolve => {
      frappe.confirm(msg, () => resolve(true), () => resolve(false));
    });
  }

  // ── Toast ─────────────────────────────────────────
  _toast(msg, type='info') {
    const icons = { success:'check-circle', error:'x-circle', info:'info' };
    const $t = document.getElementById('gfsk-toast');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `
      <i data-lucide="${icons[type]||'info'}" class="toast-icon" style="width:16px;height:16px;flex-shrink:0"></i>
      <span class="toast-msg">${this._esc(msg)}</span>
      <button class="toast-close" onclick="this.closest('.toast').remove()" title="Fechar">
        <i data-lucide="x" style="width:14px;height:14px"></i>
      </button>`;
    $t.appendChild(el);
    if (window.lucide) lucide.createIcons({ attrs:{ style:'display:block' } });
    const dismiss = () => {
      el.classList.add('leaving');
      setTimeout(() => el.remove(), 200);
    };
    setTimeout(dismiss, 5000);
  }

  // ── Escape helpers ────────────────────────────────
  _esc(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  _escJs(s) {
    if (!s) return '';
    return String(s).replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  }
}

// ── Boot ───────────────────────────────────────────
let app;
frappe.ready(function() {
  app = new GFSkillApp();
  app.init();
});
</script>
